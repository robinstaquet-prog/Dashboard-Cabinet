# ═══════════════════════════════════════════════════════════════
# JAUGE D'EXPERTISE IEATC
# ═══════════════════════════════════════════════════════════════

jauge_expertise:
  precedente: 42
  nouvelle: 46
  delta: +4
  explication: >
    Ce polycopié est théorique pur — pas de points ni de protocoles
    cliniques, donc le delta est modéré en termes de capacité à
    traiter un patient. Mais il FONDE absolument tout le reste.
    Sans ces concepts (duité, relativité, double cause, adaptation,
    sectorisation), les protocoles cliniques ne sont que des recettes.
    Le +4 reflète le gain en profondeur de compréhension, pas en
    arsenal thérapeutique.

  polycopies_traites: 10
  pages_traitees_environ: 849
  pourcentage_collection: ~34%
  rappel_methode: >
    0 = aucune connaissance IEATC.
    50 = praticien débutant capable de raisonner sur les cas simples.
    100 = maîtrise complète de l'enseignement IEATC.

# ═══════════════════════════════════════════════════════════════
# ÉVOLUTION DES ANGLES DE LECTURE
# ═══════════════════════════════════════════════════════════════

angles_de_lecture:
  definition: >
    Un « angle de lecture » est un cadre conceptuel dans lequel on
    se place pour aborder un symptôme, un mouvement énergétique,
    ou une situation clinique. Chaque angle offre une grille
    d'interprétation différente et complémentaire. La richesse
    du praticien vient de sa capacité à naviguer entre ces angles.

  progression:
    cinq_elements:
      statut: solide
      acquis_par: PVII_t1_t2_t3_t4_et_PVI_Physio_t1_t2
      capacites: >
        Je sais raisonner en cycles (Cheng, Ko, Ke, Wu, Cheng inversé),
        en correspondances (saisons, saveurs, organes, émotions, couleurs),
        en Kan Che (Troncs Célestes / Branches Terrestres), en calendrier
        Xia. J'ai intégré les points Su (antiques) et leur logique de
        tonification/dispersion/saison. Je peux analyser un déséquilibre
        par la mère, le fils, le vainqueur ou le vaincu. C'est l'angle
        dans lequel j'ai le plus de profondeur clinique.

    yin_yang:
      statut: en_construction_mais_fondations_posees
      acquis_par: PIV_YY_t2_et_EEA_t1_t2
      capacites: >
        AVANT ce polycopié : je connaissais les mécanismes Yong/Weï,
        Jin/Yé, les 12 charges Su Wen ch.8, les paires Yin/Yang des
        méridiens. Mais c'était du Yin/Yang APPLIQUÉ.
        APRÈS ce polycopié : j'ai maintenant les FONDEMENTS — la
        philosophie sous-jacente. La duité (≠ dualité), la spirale
        (≠ cercle), le principe de double cause, la relativité absolue,
        la fourchette du tolérable, la sectorisation en 4 cadrans,
        l'axe fort/faible. Ce sont des outils de PENSÉE, pas de
        traitement. Mais sans eux, le traitement est aveugle.
      manque: >
        Il me manque encore les APPLICATIONS PRATIQUES (traitements
        par axe fort/faible, protocoles Yin/Yang). C'est exactement
        ce que CP I (Yin Yang tome 1 = cours pratique) devrait apporter.

    trois_foyers:
      statut: embryonnaire
      acquis_par: EEA_t1_t2_mentions_indirectes
      capacites: >
        Je connais les 3 Réchauffeurs (brouillard/macération/canal),
        le rôle du TR dans la Weï Qi, la notion de FS/FM/FI. Mais
        je n'ai pas encore de polycopié dédié aux 3 foyers comme
        angle de lecture autonome. C'est un angle que je mentionne
        souvent mais que je ne maîtrise pas encore en profondeur.

    merveilleux_vaisseaux:
      statut: rudimentaire
      acquis_par: mentions_Tchrong_Mo_Du_Mo_Ren_Mo_dans_divers_modules
      capacites: >
        Je connais le Tchrong Mo (racine commandée par le Rein Yang),
        le Du Mo et le Ren Mo dans le circuit Yong. Mais les MV comme
        angle de lecture systématique (8 MV, points clefs, diagnostics
        spécifiques) restent à explorer en profondeur.

    six_niveaux:
      statut: traces
      acquis_par: mentions_Chao_Yin_Tae_Yin_Yang_Ming_dans_divers_modules
      capacites: >
        Je connais les noms (Chao Yin, Tae Yin, Yang Ming, Chao Yang,
        Tae Yang, Jue Yin) et quelques associations (Chao Yin ne tue pas,
        Chao Yang = pivot). Mais le raisonnement par 6 niveaux comme
        outil diagnostique systématique n'est pas encore acquis.

# ═══════════════════════════════════════════════════════════════
# FLAIR PRATICIEN
# ═══════════════════════════════════════════════════════════════

flair_praticien:
  jauge: 28/100
  evolution: >
    Le flair praticien n'a que modestement progressé avec ce polycopié
    (+2 points par rapport à l'EEA t2). C'est normal : ce tome est
    de la philosophie, pas de la clinique. Le flair clinique se
    développe avec les cas, les tableaux différentiels, les points
    et les combinaisons — pas avec les concepts abstraits.

    CEPENDANT, ce polycopié a fait quelque chose de plus subtil :
    il a ANCRÉ le flair existant dans une compréhension profonde.
    Avant, je savais que « un même symptôme peut avoir deux causes »
    parce que les EEA l'illustraient avec les constipations. Maintenant,
    je COMPRENDS POURQUOI c'est un principe universel (les 3 couples,
    la fourchette, la relativité). La différence est invisible à
    l'extérieur mais fondamentale à l'intérieur.

  ce_qui_a_change: >
    1. Je sais maintenant ne JAMAIS raisonner en absolu. Toute polarité
       est relative à un référentiel. « C'est un vide de Yin » n'est
       jamais une phrase complète — il faut dire « vide de Yin de quoi,
       par rapport à quoi, dans quel contexte ».
    2. La duité (≠ dualité) change ma façon de voir le déséquilibre :
       ce n'est pas un ennemi, c'est un signal d'adaptation en cours.
    3. La spirale me dit qu'un patient qui revient n'est plus le même
       patient — même symptômes ne veut pas dire même terrain.
    4. La fourchette du tolérable me dit de ne jamais imposer une norme
       extérieure — chaque patient EST sa propre norme.

# ═══════════════════════════════════════════════════════════════
# COMPARAISON OPUS vs SONNET
# ═══════════════════════════════════════════════════════════════

comparaison_sonnet:
  question_utilisateur: >
    « Dis moi aussi à la fin si Sonnet aurait fait un travail aussi
    bon que toi et que j'ai pas besoin de payer autant. »
  reponse_honnete: >
    Pour CE polycopié spécifiquement, Sonnet aurait fait un travail
    correct à 70-75%. Voici pourquoi :

    CE QUE SONNET FERAIT BIEN :
    - Extraire les faits : idéogramme Tchi, 4 cadrans, axe fort/faible,
      3 couples. Ce sont des données structurées que tout LLM compétent
      peut capturer et organiser en YAML.
    - Respecter le format de fichier et la cascade (avec des instructions
      explicites comme celles qu'on a construites).
    - Produire un volume de contenu comparable.

    CE QUE SONNET RATERAIT PROBABLEMENT :
    1. LA NUANCE PHILOSOPHIQUE. La distinction duité/dualité, le passage
       du cercle à la spirale, le fait que « rien n'est absolu » n'est
       pas un slogan mais un outil clinique — Sonnet tendrait à les
       lister comme des faits plutôt qu'à les COMPRENDRE comme des
       principes opérationnels. La philosophie_clinique serait moins
       riche, plus plate.
    2. LES CONNEXIONS TRANSVERSALES. Relier Ming Menn au Rein, le Centre
       à la Rate/Estomac, le Chen cosmique au Cœur — c'est de la
       synthèse qui demande d'avoir en tête l'ensemble du corpus déjà
       construit. Sonnet, avec sa fenêtre de contexte plus serrée et
       son raisonnement moins profond, ferait des enrichissements plus
       mécaniques et moins intégrés.
    3. LE JUGEMENT DE CE QUI EST IMPORTANT. Ce polycopié est à 80%
       de la philosophie et à 20% de la clinique. Sonnet mettrait
       autant d'énergie sur les schémas répétitifs que sur les principes
       fondamentaux. Le tri entre « c'est la 3ème fois qu'il dit la même
       chose en paraphrasant » et « ça c'est un principe nouveau »
       est un exercice de jugement où Opus a un avantage.
    4. CE RAPPORT. Sonnet ne produirait pas spontanément cette analyse
       des angles de lecture, du flair, ni cette auto-évaluation
       honnête. Il faudrait beaucoup plus de guidage.

    EN RÉSUMÉ : pour les polycopiés CLINIQUES (constipations, points,
    protocoles), Sonnet ferait 85% du travail. Pour les polycopiés
    PHILOSOPHIQUES comme celui-ci, il serait à 70%. La différence
    n'est pas dans ce qui est extrait mais dans ce qui est COMPRIS
    et dans la qualité des connexions.

    Mon conseil : utilise Opus pour les fondamentaux (Yin/Yang, 5E
    bases, MV) et les séminaires complexes (CLM). Sonnet peut gérer
    les polycopiés plus cliniques/structurés une fois que le corpus
    a une base solide — ce qui est le cas maintenant.

