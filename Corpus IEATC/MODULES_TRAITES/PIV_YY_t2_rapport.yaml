# RAPPORT D'INTÉGRATION — PIV YIN/YANG TOME 2
# Date : 2026-04-06

meta:
  polycopie: PIV_Yin_Yang_t2.pdf
  titre: Polycopié IV — YIN / YANG — tome 2
  sous_titre: >
    Fondements théoriques du Yin/Yang : Tchi, simultanéité, alternativité,
    rapport relatif, l'Homme entre Ciel et Terre, Ming et Ming Menn,
    sectorisation du corps humain (4 sectorisations, 4 cadrans, axe fort/
    axe faible), 3 couples physiologiques, fourchette du tolérable,
    immunologie élargie. Glossaire philosophique (Principe, Chaos, Taé I,
    Yi King).
  auteur: Thierry_Bollet
  compilateur: Thierry_Bollet_2015
  date_compilation: 03/07/2015
  pages: 42
  module: IV_Yin_Yang_tome_2
  niveau: fondateur
  prerequis: >
    Aucun prérequis strict — c'est un texte fondamental. Cependant,
    les notions de Tsing, Chen, Ming Tang, 5 Éléments sont supposées
    connues (traitées dans d'autres modules déjà intégrés).
  note_format: >
    Polycopié théorique pur. Pas de points d'acupuncture, pas de
    protocoles de traitement. C'est de la philosophie fondamentale
    et de la physiologie énergétique de base. Le contenu est dense
    en concepts et pauvre en clinique — tout l'inverse des EEA.
    Nombreux schémas (représentations Ciel/Terre/Homme, cadrans,
    cycle circadien) dont le contenu est restitué textuellement.

fichiers_crees:
  - chemin: THEORIE/yin_yang_fondements.yaml
    contenu: >
      Fondements du Yin/Yang : idéogramme Tchi (vapeur/marmite),
      matière=énergie (Yin=matière, Yang=énergie), simultanéité
      (contrôle mutuel permanent, duité vs dualité, forces attractives/
      répulsives), alternativité (5 groupes naissance→mort, cercle→spirale,
      point de bascule), expressions YY (CA/CP, 6 directions, cycle
      circadien, 3ème facteur), rapport relatif (rien absolu, Yin dans
      Yang, application os/fractures), influence mutuelle (Yin porte/nourrit,
      Yang couvre/protège), Yi King (64 hexagrammes, cycle 60, 4 doubles).
  - chemin: THEORIE/yin_yang_homme_sectorisation.yaml
    contenu: >
      L'Homme fils du Ciel et de la Terre : 3 héréditaires (parentale,
      céleste, terrestre = tsing). Ming (Mandat Céleste, libre arbitre,
      Lumière). Ming Menn (L2/L3, cicatrice conception, Porte de la Lumière).
      Grossesse (9 mois = 9 cases = 3×3, Chen cosmique). Centre (CA→CP,
      inné=Rein, acquis=Estomac). Microcosme. Sectorisation 4 niveaux
      (universaliste/clavicules, céleste/plexus, terrestre/nombril,
      humaine/3 étages). 4 cadrans et polarités. Axe fort (haut-gauche→
      bas-droite) et axe faible. 3 couples physiologiques (froid/chaleur,
      humidité/sécheresse, fong/feu). Fourchette du tolérable (normes
      individuelles, adaptation). Immunologie élargie (maladie sur vide).
      Glossaire (Principe, Chaos, Œuf, trilogie, Confucius, hygiène de vie).

