    contenu: >
      Fichier principal (~550 lignes). Introduction et historique,
      énergies du Ciel (lune, soleil, 6 énergies, 5 planètes, lumière),
      énergies de la Terre (tellurisme par élément, électromagnétisme
      terrestre avec orientation des ions sanguins et ADN, piézo-
      électricité, Feng Tchui), embryologie complète (conception,
      reproduction cellulaire, morula et Tao, position géographique
