# ÉVOLUTION DES ANGLES DE LECTURE
# ═══════════════════════════════════════════════════════════════

angles_de_lecture:
  progression:
    yin_yang:
      statut: OPERATIONNEL
      acquis_par: PIV_YY_t1_t2_t3_CP_I
      note: Pas de progression nouvelle par 3F t1.

    cinq_elements:
      statut: solide
      note: >
        Les 5E sont utilisés comme cadre de référence constant dans
        le poly (tellurisme par élément, énergie saisonnière des
        cellules, cycle Tcheng/Ko dans l'embryologie) mais sans
        contenu nouveau dédié.

    tsang_fou:
      statut: AVANCE
      capacites: >
        AVANT 3F t1 : 14 Tsang/Fou couverts mais sans physiologie
        détaillée de leur rôle dans le circuit des 3 foyers.
        APRÈS 3F t1 : chaque Tsang/Fou a maintenant sa place précise
        dans le circuit énergétique alimentaire. Le Rein Yin et Yang
        sont détaillés avec leurs commandes (droit/gauche). La Rate
        comme maîtresse des 5 liquides purs. Le Foie comme double
        appartenance FM/FI. Le circuit Solides purs → Foie → Cœur →
        Sang est formalisé. La VB comme ministre de Justice avec la
        bile = or liquide.

    trois_foyers:
      statut: NOUVEAU — fondations_solides
      capacites: >
        NOUVEAU angle de lecture apporté par ce poly. Je connais
        maintenant : la composition de chaque foyer, la combustion
        et la carburation (3 facteurs + catalyseur), le circuit
        complet des énergies alimentaires (7 étapes), les formules
        énergétiques (Yeung + Ku + Yuan → Tsong → Tcheung → Iong + Oé),
        le rôle de la barrière du FM avec ses pathologies et traitements,
        les 5 fonctions générales (recevoir/transformer/transporter/
        assimiler/rejeter), les points de commande du FM.

    embryologie:
      statut: NOUVEAU — complet
      capacites: >
        NOUVEAU : embryologie complète depuis la conception jusqu'à la
        grossesse extra-utérine. Morula = Chaos, 8 trigrammes, Chen
        cosmique, grossesse en 3 saisons avec ternaires, naissance et
        catécholamines, allaitement et maturation Yang Ming.

    pouls:
      statut: fondations_posees
      enrichissement: >
        Nouvelle donnée : analogie artère radiale / 3 foyers (pouce=FS,
        barrière=FM, pied=FI, gauche=Yang, droite=Yin). Technique
        japonaise des flancs.

    clinique_pratique:
      statut: en_progression
      enrichissement: >
        Pathologies de la barrière FM (Yang excès / Yin excès) avec
        traitements. Règle du drainage sur Fou. Le froid comme cause
        initiale. Les délais de survie par organe.

# ═══════════════════════════════════════════════════════════════
# FLAIR PRATICIEN
# ═══════════════════════════════════════════════════════════════

flair_praticien:
  nouveaux_reflexes:
    - >
      Organe congestionné avec chaleur → chercher un froid initial.
    - >
      Inflammation / fièvre → penser VB (pas Yuan Tchi).
    - >
      Drainage → toujours sur les Fou, jamais sur les Tsang.
    - >
      Régurgitations, reflux → barrière FM bloquée Yang (6MC t + 13F t + 12JM d).
    - >
      Digestion bloquée, stagnation → barrière FM bloquée Yin (12JM t + 6MC d + 4GI t + 36E t).
    - >
      Enfant fragile du tube digestif avant 6 ans → Yang Ming pas mature.
    - >
      Dents tôt / marche tard (ou inverse) → équilibre E/R.
    - >
      Fragilité pulmonaire congénitale → possible insuffisance de catécholamines à la naissance.

