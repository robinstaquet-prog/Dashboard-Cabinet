# RAPPORT D'INTÉGRATION — PV LES TROIS FOYERS TOME 1
# Date : 2026-04-06

meta:
  polycopie: PV_3_Foyers_tome_1.pdf
  titre: Polycopié V — Les Trois Foyers, tome 1 — Physiologie
  sous_titre: >
    Premier polycopié entièrement dédié à la physiologie énergétique
    des 3 foyers. Couvre l'embryologie complète (conception, morula,
    Ming Menn, Chen cosmique, 8 trigrammes, organisation fœtale),
    la grossesse (3 saisons, ternaires, sexe, systèmes énergétiques),
    la naissance (déclenchement, catécholamines, grossesse extra-utérine,
    lait maternel, Yang Ming enfant), les énergies Ciel/Terre
    (tellurisme, électromagnétisme, piézo-électricité, Feng Tchui),
    la physiologie énergétique (Ciel antérieur/postérieur, stimulation
    des foyers, Chen individuel, entités viscérales, thermorégulation),
    l'activité des foyers (capital initial, quantité/qualité, durée
    de vie, énergies de substitution), la combustion/carburation
    (3 facteurs, catalyseur, Roang, chaleur-humidité), la composition
    des 3 foyers (Tsang/Fou, orifices), la physiologie générale
    (supports, rôles VB/TR/Yang Ming, conditions climatiques, analogie
    artère radiale), et la physiologie détaillée de chaque foyer
    (FI: Ming Menn, Rein Yin/Yang, énergie ancestrale 3 composantes,
    GI et oé ; FM: barrière, 1er et 2ème tris, 5 liquides purs,
    points de commande, pathologies ; FS: formation du sang, Tsong Tchi,
    Tcheung Tchi, 7 orifices du cœur).
  auteur: Thierry_Bollet
  compilateur: Thierry_Bollet
  pages: 54
  module: V_Trois_Foyers
  niveau: physiologie_fondamentale
  importance: >
    CAPITAL — premier accès complet à la physiologie des 3 foyers.
    Enrichit massivement le Triple Réchauffeur et TOUS les Tsang/Fou.
    Apporte l'embryologie la plus détaillée du corpus et le circuit
    complet des énergies alimentaires.
  prerequis: PIV YY (tomes 1-3), PVII 5E (tomes 1-4)

