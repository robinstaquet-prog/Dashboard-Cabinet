      Chen cosmique), organisation fœtale (humus utérin, saveurs
      corporelles SW5), grossesse (3 saisons, ternaires énergétiques,
      sexe, séance acupuncture par trimestre), naissance (retournement,
      20TM, catécholamines, grossesse extra-utérine, lait maternel,
      Yang Ming 6 ans, constitution humaine), Ciel antérieur/postérieur,
      stimulation des foyers (Chen individuel, Roun/Pro, entités
      viscérales, thermorégulation), activité des foyers (capital initial,
      quantité/qualité, durée de vie, maladie et usure), énergies de
