# JAUGE D'EXPERTISE IEATC
# ═══════════════════════════════════════════════════════════════

jauge_expertise:
  precedente: 55
  nouvelle: 62
  delta: +7
  explication: >
    Le delta de +7 reflète un enrichissement massif et structurant :
    — La physiologie des 3 foyers est maintenant complète (composition,
      rôles, circuit énergétique, combustion, catalyseur Yuan Tchi)
    — L'embryologie est considérablement approfondie (morula, Chen
      cosmique, 8 trigrammes, grossesse en 3 saisons, naissance)
    — Le circuit complet des énergies alimentaires est formalisé
      (7 étapes depuis l'E jusqu'à la formation du sang dans le C)
    — Les formules énergétiques clés sont intégrées (Yeung Tchi +
      Ku Tchi + Yuan Tchi → Tsong Tchi → Tcheung Tchi → Iong + Oé)
    — 10 Tsang/Fou enrichis avec données physiologiques détaillées
    — La barrière du FM avec ses pathologies et traitements
    — 9 principes philosophiques cliniques fondamentaux
    — La règle du drainage sur Fou (jamais Tsang)
    — Le rôle du froid comme cause initiale des congestions
    Le passage de 55 à 62 marque l'entrée dans la physiologie
    opérationnelle : on sait maintenant COMMENT l'énergie circule,
    se transforme et se distribue dans les 3 étages du corps.

  polycopies_traites: 12
  pages_traitees_environ: 1010
  pourcentage_collection: ~40%
  rappel_methode: >
    0 = aucune connaissance IEATC.
    50 = praticien débutant capable de raisonner sur les cas simples.
    100 = maîtrise complète de l'enseignement IEATC.

