      (idéogramme San Tsiao, 3 facteurs, Roang, catalyseur Yuan Tchi,
      chaleur-humidité R/Rte, ordre de l'Homme), composition des
      3 foyers (FI/FM/FS, répartition Tsang/Fou, orifices 9+2),
      physiologie générale (supports, rôles VB+TR+Yang Ming, conditions
      climatiques, citation Laville Méry, citation SW, analogie artère
      radiale, fonctions générales), FI détaillé (Ming Menn résidence,
      Tan Tienn, 6JM, Rein Yin/Yang, énergie ancestrale 3 composantes,
      vie génitale, KAO, GI et oé, vitalité), FM détaillé (barrière
      interne, E maître Yang, 1er et 2ème tris, Rate maîtresse Yin,
      5 liquides purs, Foie double appartenance, VB ministre de Justice,
      points de commande 12JM/13F/6MC, pathologies barrière Yang/Yin
      avec traitements), FS détaillé (Poumon 1er Ministre, synthèse
      Tsong/Tcheung Tchi, Cœur formation sang, propulsion, rythme,
      7 orifices du cœur), formules énergétiques synthétiques.

