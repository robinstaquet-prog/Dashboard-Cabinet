# RAPPORT D'INTÉGRATION — PIV YIN/YANG COURS PRATIQUE I (CP I)
# Date : 2026-04-06

meta:
  polycopie: PIV_Yin_Yang_t4_t5.pdf
  titre: Polycopié IV — YIN / YANG — tomes 4 et 5 (Cours Pratique I)
  sous_titre: >
    Le polycopié le plus important du cursus IEATC. Première application
    clinique complète du Yin/Yang : 8 règles diagnostiques, 4 principes
    du pouls chinois, 4 combinaisons du bilan (I Sou Jen), méthode
    Siao Tse (4 niveaux anatomiques), sectorisation 4 cadrans, protocole
    4 temps, blocage YY, Yang/Yin apparents, points généraux YY
    (3 Yang + 3 Yin), zones de blocage par méridien, protocole
    thérapeutique complet, 9 cas pratiques avec raisonnement détaillé.
  auteur: Thierry_Bollet
  compilateur: Thierry_Bollet
  pages: 107
  module: IV_Yin_Yang_CP_I
  niveau: clinique_fondamental
  importance: CAPITAL — pont entre théorie et pratique
  prerequis: >
    PIV YY tomes 1 à 3 (théorie YY), PVII 5E (les 4 tomes),
    PVI Physiologie (tomes 1-2), notions de pouls.
  note_format: >
    Polycopié mixte théorie/pratique. Tome 4 = théorie du bilan
    (8 règles, pouls, combinaisons, méthodes). Tome 5 = protocole
    thérapeutique + 9 cas pratiques complets avec interrogatoire,
    pouls, palpation, analyse et traitement. Densité clinique
    exceptionnelle. Nombreux enseignements pratiques non trouvés
    ailleurs (café au lait et VB, tendinites = Yin, zones de blocage).

fichiers_crees:
  - chemin: DIAGNOSTIC/bilan_yin_yang.yaml
    contenu: >
      Fichier fondateur du diagnostic YY. 8 règles diagnostiques
      complètes, tableaux YY général/local, vide/plénitude,
      externe/interne, 4 combinaisons bilan (YY, Y/Yin, Yin/Y, Yin/Yin),
      4 déséquilibres + Yin/Yang apparents, 2 lois du traitement,
      méthode I Sou Jen (4 cas + points), méthode Siao Tse
      (4 niveaux + saisons + points Su), sectorisation 4 cadrans,
      protocole 4 temps, 5 temps bilan cursus, 3 plans humain,
      blocage YY avec points, éthique du thérapeute.
  - chemin: DIAGNOSTIC/pouls_chinois_principes.yaml
    contenu: >
      Technique complète du pouls: fondements physiologiques,
      emplacement, 3 méthodes, technique de prise (positions,
      sensibilité, anomalies, prise au pouce). 4 principes:
      1er (gauche=Yang/droite=Yin + fondement astronomique),
      2ème (superficie=Yang/profondeur=Yin), 3ème (3 secteurs
      I/II/III = 3 foyers), 4ème (6 énergies avec tableau
      synthèse gauche/droite × 3 niveaux).
  - chemin: POINTS/points_yin_yang.yaml
    contenu: >
      Tous les points YY organisés par fonction: 3 généraux Yang
      (20TM, 14TM, 12JM) + 3 généraux Yin (6MC, 6Rte, 6JM),
      locaux Yang haut (4GI, 5TR, 3IG, 10IG, 15GI) + Yang bas
      (36E, 62V, 41VB, 30VB, 3TM, 4TM), locaux Yin haut (7P)
      + Yin bas (7R, 6R, 4JM), déblocage YY (27TM/24JM +
      complémentaires), points des cas pratiques.
  - chemin: CLINIQUE/protocole_therapeutique_yy.yaml
    contenu: >
      Protocole thérapeutique complet: tradition vs symptomatique,
      idées guides, 8 étapes première séance, choix matériel
      (aiguilles, électricité, laser, moxas, massage), 14 notions
      fondamentales, états dépassés, rythme séances + lune,
      résumé organes/méridiens clinique (VB chef d'orchestre,
      E fabrique Yang, etc.), transpiration et rêves, cervicales.
  - chemin: CLINIQUE/cas_pratiques_yin_yang.yaml
    contenu: >
      9 cas cliniques complets: Florence (genou+mono), Jean-Charles
      (goutte), Marie-Paule (digestion+émotionnel), Monique 1
      (VB+fibrome), Monique 2 (migraines chroniques), Patricia
      (jambe+dépression), Martine (cervicales+migraines), Virginie
      (angines+R Yang), Marie (lombalgies+règles+migraines),
      Pierre-André (fatigue+blocage inapparent). Chacun avec
      interrogatoire, observation, pouls, palpation, analyse et
      traitement détaillés. Synthèse pédagogique.

