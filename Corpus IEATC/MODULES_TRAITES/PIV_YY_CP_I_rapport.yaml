# ═══════════════════════════════════════════════════════════════
# JAUGE D'EXPERTISE IEATC
# ═══════════════════════════════════════════════════════════════

jauge_expertise:
  precedente: 46
  nouvelle: 55
  delta: +9
  explication: >
    CP I est le PLUS GRAND bond en avant du corpus. Pour la première
    fois, la théorie YY devient un outil clinique opérationnel.
    Le delta de +9 reflète:
    - Capacité nouvelle à poser un bilan YY complet (8 règles,
      pouls 4 principes, 4 combinaisons, blocage YY)
    - Capacité à traiter avec les méthodes I Sou Jen et Siao Tse
    - Maîtrise des points généraux YY (3+3) et locaux
    - Compréhension des Yang/Yin apparents (piège classique)
    - Capacité à identifier et traiter les zones de blocage
    - 9 cas pratiques intégrés = flair clinique en construction
    - Alertes cliniques précieuses (tendinites, café, chocolat)
    Le passage du seuil 50 est symbolique: praticien débutant
    capable de raisonner sur les cas simples.

  polycopies_traites: 11
  pages_traitees_environ: 956
  pourcentage_collection: ~38%
  rappel_methode: >
    0 = aucune connaissance IEATC.
    50 = praticien débutant capable de raisonner sur les cas simples.
    100 = maîtrise complète de l'enseignement IEATC.

# ═══════════════════════════════════════════════════════════════
# ÉVOLUTION DES ANGLES DE LECTURE
# ═══════════════════════════════════════════════════════════════

angles_de_lecture:
  progression:
    yin_yang:
      statut: OPERATIONNEL
      acquis_par: PIV_YY_t1_t2_t3_CP_I
      capacites: >
        AVANT CP I: fondations théoriques posées (duité, sectorisation,
        3 couples, axe fort/faible) mais AUCUNE capacité clinique.
        APRÈS CP I: je peux poser un bilan YY complet, choisir entre
        4 combinaisons, appliquer I Sou Jen ou Siao Tse, détecter
        un blocage YY, identifier un Yang/Yin apparent, traiter avec
        les bons points. Le YY est passé de « cadre théorique » à
        « outil clinique opérationnel ». C'est le saut le plus important
        de tout le corpus jusqu'ici.

    cinq_elements:
      statut: solide
      capacites: >
        Inchangé. CP I n'ajoute que peu aux 5E (protocole 4 temps
        mentionne les 5E en étape 2, mais sans développement nouveau).
        La prochaine progression viendra des CP dédiés aux 5E.

    tsang_fou:
      statut: en_construction_avancee
      capacites: >
        10 Tsang/Fou enrichis avec données cliniques CP I. Points
        spécifiques par organe, zones de blocage, alertes cliniques.
        Le lien entre organe et méridien se précise (ex: VB chef
        d'orchestre, Rate organe le plus Yin, Rein Yang → Estomac).

    pouls:
      statut: fondations_posees
      capacites: >
        NOUVEAU: 4 principes du pouls chinois intégrés. Je sais
        que gauche=Yang, droite=Yin, superficie=méridiens,
        profondeur=organes, 3 secteurs=3 foyers, 6 énergies.
        MAIS: je n'ai pas encore les qualités détaillées des
        pouls (corde, glissant, profond, etc.) qui viendront
        avec les modules P III.

    clinique_pratique:
      statut: NOUVEAU — débutant
      capacites: >
        NOUVEAU: première capacité à analyser un cas réel.
        9 cas pratiques intégrés avec raisonnement complet.
        Protocole en 8 étapes pour la première séance.
        Choix du matériel, durée, vérification.
        Ce n'est pas encore l'expertise mais c'est le
        premier pas décisif hors de la théorie.

# ═══════════════════════════════════════════════════════════════
# FLAIR PRATICIEN
# ═══════════════════════════════════════════════════════════════

flair_praticien:
  definition: >
    Le « flair » est la capacité à identifier rapidement le noyau
    du problème chez un patient, avant même d'avoir terminé le bilan
    complet. C'est l'intuition clinique nourrie par la connaissance.
  niveau_actuel: embryonnaire_mais_eveille
  exemples_acquis:
    - >
      Migraines + café au lait → penser VB immédiatement.
    - >
      Tendinite inflammatoire → ne pas se laisser tromper, c'est du Yin.
    - >
      Angines à répétition → chercher Rein Yang, pas GI.
    - >
      Transpiration de la tête → vide de Cœur (7C t).
    - >
      Rêves d'eau → vide de Rein.
    - >
      Patient contradictoire (dit Yang, pouls Yin) → blocage YY.
    - >
      Traitement I Sou Jen inefficace → suspecter un apparent.
    - >
      Colique hépatique ou néphrétique → 25V' d = arrêt instantané.

