concepts_cles:
  cosmologie:
    - "6 énergies du Ciel ≠ 5 éléments : Ciel = base 6, Terre = base 5"
    - "Cycle 60 = 10 Kan × 12 Che (depuis −2697) — pilier de la société chinoise"
    - "Tienn Tou = renforcement par coïncidence céleste/terrestre"
    - "Années impaires = Yang = excès ; années paires = Yin = insuffisance"
  embryologie:
    - "Matrice énergétique PRÉCÈDE le corps physique"
    - "3ème mois de grossesse : méridiens Yin+Yang par élément"
    - "Naissance : axes Yin/Yin et Yang/Yang reçoivent les infos du Ciel"
    - "Maturité des points : 5 ans (Terre) et 6 ans (Ciel)"
    - "Maturité de l'être : 60 ans (36+25)"
  axes_energetiques:
    - "Ordre dans l'Homme ≠ ordre céleste (inversion Yang Ming / Chao Yang)"
    - "Yang Ming exception : côté Yin car face au Sud pour synthèse lumière"
    - "Deux catégorisations : avant→arrière (surface) et profond→superficie"
    - "Tchéou = main / Tsou = pied → axe complet = Tchéou + Tsou"
  systemes:
    - "3 systèmes énergétiques × 8h = les 'trois 8'"
    - "50 circulations Iong par jour dans chaque méridien (toutes les ½h)"
    - "Axes énergétiques ≠ circuit : activés par soleil, pas de transmission entre systèmes"

