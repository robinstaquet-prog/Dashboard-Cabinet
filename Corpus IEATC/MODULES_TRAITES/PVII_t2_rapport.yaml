# RAPPORT D'INTÉGRATION — PVII 5 ÉLÉMENTS TOME 2
# Date : 2026-04-05

meta:
  polycopie: 5_Elements_2.pdf
  titre: Polycopié VII — Les 5 Éléments — Physiologie tome 2
  sous_titre: Cycles, correspondances, lois de relations, énergie Terre/Ciel
  auteur: Thierry_Bollet
  date_document: 04/07/2015
  pages: 61
  module: VII_5_Elements_tome_2
  niveau: fondateur
  prerequis: PVII_t1_deja_integre

fichiers_crees:
  - chemin: THEORIE/cinq_elements_correspondances.yaml
    contenu: >
      5E et univers/planètes, couleurs symboliques (carré+triangle=7),
      lune et calendriers (4 calendriers, 10 Kan, critique thèmes
      énergétiques), tableau COMPLET des Tchi des 5 éléments
      (30+ correspondances par élément), Ching/Ié liquides,
      résumé activités organiques. (pp.7-22)
  - chemin: THEORIE/cinq_elements_cycles.yaml
    contenu: >
      Cycle Tcheng détaillé (transmission Yin→Yin, PAS Fou→Fou,
      rôle Rate transformation), distinction 3F vs 5E (journalier
      vs saisonnier), bilan énergétique, cycle Ko détaillé
      (CLM fléau/crosse, intelligence, Hong Fan), cycle Raé
      (révolte, n'importe quand), activité simultanée Tcheng/Ko,
      Cour Impériale (5 rôles, décalage saisonnier), loi unitaire
      (climat+saison, point Penn détaillé, 4 états, questionnaire),
      collecte annuelle Métal→Rein, importance capitale printemps,
      lois binaire et ternaire (5 ternaires, 3 triangles),
      globalité (loi So Ouen attaque toujours 2), quaternaire/
      quinaire (4 principes, auto-régulation, oscillation, mère
      faible), dominant/dominé (multi-hiérarchie), changement
      de saison (transition trilogique). (pp.23-54)
  - chemin: THEORIE/cinq_elements_energie_terre_ciel.yaml
    contenu: >
      Un élément 5 qualités (tout est dans le tout interne),
      production énergétique saisonnière (retard/avance/mauvais
      caractère), saisons vs climats (distinction fondamentale),
      Yin/Yang de la Terre (5 matières, pensée analogique),
      rapport Yin/Yang annuel (Kan/Che), nature et fonction
      (Yin descend/monte, Yang monte/descend), clarté du Ciel
      (impact psychisme/sentiments), énergie de la Terre
      (Yin/Yang Terre et Ciel, échange pluie, impact Homme).
      (pp.55-61)
  - chemin: MODULES_TRAITES/PVII_t2_rapport.yaml
    contenu: ce rapport
  total: 4

fichiers_mis_a_jour:
  - chemin: ZANG_FU/foie.yaml
    ajouts: >
      enrichissement_5E_t2 : cour impériale (Empereur au printemps),
      importance capitale printemps (starter), correspondances
      complètes (30 items), résumé activités. Liens nouveaux fichiers.
  - chemin: ZANG_FU/coeur.yaml
    ajouts: >
      enrichissement_5E_t2 : cour impériale (Empereur en été),
      Chao Yin ne tue pas (chaleur bénéfique), correspondances
      complètes. Liens nouveaux fichiers.
  - chemin: ZANG_FU/rate.yaml
    ajouts: >
      enrichissement_5E_t2 : cour impériale (Empereur en 5ème saison),
      rôle dans cycle Tcheng (transformation obligatoire),
      correspondances complètes. Liens nouveaux fichiers.
  - chemin: ZANG_FU/poumon.yaml
    ajouts: >
      enrichissement_5E_t2 : cour impériale (Empereur en automne),
      collecte annuelle (surplus tsing → Rein), correspondances
      complètes. Liens nouveaux fichiers.
  - chemin: ZANG_FU/rein.yaml
    ajouts: >
      enrichissement_5E_t2 : cour impériale (Empereur en hiver),
      réserve annuelle (stocke surplus Métal, compense urgences),
      correspondances complètes. Liens nouveaux fichiers.
  - chemin: ZANG_FU/maitre_du_coeur.yaml
    ajouts: enrichissement_5E_t2 (double Feu dans cycle Tcheng, MC interface)
  - chemin: LEXIQUE/lexique_termes_ieatc.yaml
    ajouts: >
      6 nouveaux termes : Cycle_Rae, Cour_Imperiale, Ching, Ie,
      Loi_unitaire, Loi_ternaire. 3 termes enrichis : Cycle_Tcheng,
      Cycle_Ko, Point_Penn. Version 1.5.
  - chemin: _SYSTEME/00_arbres_decision.yaml
    ajouts: >
      arbre_cinq_elements massivement enrichi : cycle Tcheng
      (règles pathologiques, transmission Yin→Yin), cycle Ko
      (relations, lois passive/active, règles pathologiques,
      Raé, loi So Ouen attaque 2), cour impériale (5 rôles,
      auto-régulation, surveillance 4x/an), lois relations
      ternaires (3 triangles, pathologies), importance printemps,
      bilan énergétique 5E. Statut → complet PVII t1+t2.
  - chemin: _SYSTEME/00_philosophie_clinique.yaml
    ajouts: >
      Nouveaux signes : symptôme lié saison/climat, printemps
      raté = année pathologique. Sections nature/fonction,
      clarté du Ciel, distinction saison/climat.
  - chemin: THEORIE/cinq_elements_fondements.yaml
    ajouts: liens vers 3 nouveaux fichiers théoriques
  - chemin: THEORIE/cinq_elements_par_element.yaml
    ajouts: liens vers correspondances et cycles
  - chemin: THEORIE/cinq_elements_saisons.yaml
    ajouts: liens vers correspondances, cycles et énergie terre/ciel

