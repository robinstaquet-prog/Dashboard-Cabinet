schemas_expliques:
  note: >
    Chaque schéma a été compris et expliqué textuellement
    dans les fichiers YAML correspondants.
  localisation_explications:
    figures_9_cour_imperiale: THEORIE/cinq_elements_cycles.yaml → cour_imperiale
    figures_10_binaires: THEORIE/cinq_elements_cycles.yaml → loi_binaire
    figures_11_a_15_ternaires: THEORIE/cinq_elements_cycles.yaml → loi_ternaire.schemas_expliques
    figure_16_globalite: >
      Pentagone avec superposition des 3 triangles (rouge, bleu,
      vert). Toutes les relations Tcheng et Ko simultanées entre
      les 4 éléments actifs. La Mère reste passive. Synthèse
      visuelle de l'ensemble du mécanisme des 5 éléments.
    figure_17_quaternaire: >
      Même pentagone simplifié avec les 4 éléments actifs et
      toutes les flèches résumées : Tcheng (Empereur→Fils,
      Ennemi→Conseiller) et Ko (Empereur→Ennemi, Fils→Conseiller,
      Conseiller→Empereur). La Mère absente.
    figures_18_19_changement_saison: THEORIE/cinq_elements_cycles.yaml → changement_de_saison.schemas_expliques
    tableau_tchi: THEORIE/cinq_elements_correspondances.yaml → tableau_tchi_complet

