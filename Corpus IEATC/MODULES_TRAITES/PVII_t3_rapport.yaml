schemas_expliques:
  note: >
    Les schémas du polycopié PVII t3 ont été intégrés
    textuellement dans les fichiers YAML. Chaque figure
    est décrite et expliquée plutôt que simplement référencée.
  figure_9_axes_Terre:
    description: >
      Croix cruciforme représentant la Terre en position antique.
      Le Sud est en haut (chaleur monte). Axe vertical N-S = Eau-Feu
      (magnétique). Axe horizontal E-O = Bois-Métal (électrique).
      Terre au centre de la croix. Montre la parfaite verticalité
      de l'Âge d'Or avant la bascule à 23°.
    localisation: THEORIE/cinq_elements_kan_che.yaml → age_or
  figure_10_inclinaison_axe:
    description: >
      Figure de la Terre inclinée à 23° par rapport à la verticale.
      La tête humaine inclinée à 75° (= 90° - 15° d'une demi-bascule)
      symbolise l'axe terrestre. Montre que l'axe terrestre actuel
      est une déviation de l'axe originel — source de toutes les
      variations saisonnières climatiques.
    localisation: THEORIE/cinq_elements_kan_che.yaml → age_or
  tableau_4_mouvements:
    description: >
      Tableau à 5 colonnes (un par élément) détaillant pour chacun :
      le mouvement physiologique dominant, les caractéristiques
      énergétiques, et les correspondances organiques.
      Lecture : Bois=expansion jaillissante, Feu=circulation chaleur,
      Terre=transformation stabilisation, Métal=rétraction collecte,
      Eau=conservation descente.
    localisation: THEORIE/cinq_elements_mouvements_5E.yaml → tableau_4
  tableau_5_points_su_Yin:
    description: >
      Tableau à 6 lignes (un par méridien Yin) × 5 colonnes
      (Ting/Iong/Iu/King/Ro). Lecture : chaque cellule contient
      le numéro du point. Ex: Foie-Ting = 1F, Foie-Ro = 8F.
      Règle des Yin : ordre des éléments Bois→Feu→Terre→Métal→Eau.
    localisation: THEORIE/cinq_elements_points_su.yaml → tableau_5_Yin
  tableau_6_points_su_Yang:
    description: >
      Tableau à 6 lignes (un par méridien Yang) × 6 colonnes
      (Ting/Iong/Iu/Iuann/King/Ro). L'Iuann est surnuméraire (6e).
      Règle des Yang : ordre inversé Métal→Eau→Bois→Feu→Terre.
      Ex: VB-Ting = 41VB, VB-Iuann = 40VB.
    localisation: THEORIE/cinq_elements_points_su.yaml → tableau_6_Yang
  figure_croix_6_directions:
    description: >
      Schéma de la Croix à 6 directions montrant chaque axe
      avec sa direction propre. Forme une double hélice en 3D.
      Yang Ming descend, Taé Yin monte, Taé Yang arrière-avant,
      Chao Yin avant-arrière, Chao Yang gauche-droite, Tsiué Yin
      droite-gauche. Analogue à la double hélice de l'ADN.
    localisation: THEORIE/cinq_elements_axes_energetiques.yaml → croix_6_directions

questions_soulevees:
  - >
    Le lien entre les lunes intercalaires et les pathologies
    chroniques n'est pas encore développé. À approfondir
    avec le module PIV t3 (Kan/Che détaillés).
  - >
    La distinction entre énergie hôtesse (planètes/mouvements)
    et énergie invitée (étoiles/pas) dans les Kan/Che mérite
    un fichier théorique dédié.

