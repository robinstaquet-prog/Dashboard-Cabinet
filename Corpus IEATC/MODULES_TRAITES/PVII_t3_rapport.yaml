jauge_expertise:
  niveau_actuel: 28
  echelle: 1_a_100
  titre: "Etudiant 2ème année fin — Le temps et l'espace s'ouvrent"
  progression: de_23_a_28_gain_5_points

  graduation:
    0_5: >
      Profane curieux — sait que l'acupuncture existe,
      confond méridiens et chakras.
    5_10: >
      Néophyte éclairé — connaît Yin/Yang et les 5 éléments
      de nom, mais ne sait pas les relier.
    10_15: >
      Etudiant 1ère année — comprend Yin/Yang, les 3 foyers,
      les Tsang/Fou en général, les Grands Méridiens,
      sait qu'il y a des niveaux de traitement distincts.
    15_25: >
      Etudiant 2ème année début — Connaît la physiologie
      individuelle des 6 Tsang, les cycles 5E complets,
      la Cour Impériale, les lois de relations.
    25_35: >
      ▶ Etudiant 2ème année fin — ON EST ICI (28/100) ◀
      Intègre maintenant : Points Su et leur philosophie
      (qualité vs quantité), les 6 axes énergétiques avec
      lecture posturale, le système temporel complet
      (Kan/Che, Lune, Calendrier Xia, Heures Royales),
      le So Ouen chap.5 et les Ko émotionnels cliniques,
      l'Âge d'Or comme référence thérapeutique, et les
      CHEUN (entités psychiques des organes) de façon
      structurée. Peut raisonner sur POURQUOI le temps
      et l'espace organisent la pathologie. Mais reste sans
      outil clinique concret (Fou, méridiens, traitement).
    35_50: >
      Etudiant 3ème année — physiologie Fou individuels,
      méridiens individuels, lois Lo, sentiments par organe,
      palpation abdominale. Raisonnement clinique simple.
    50_65: >
      Praticien débutant — peut lire un cas, identifier
      le niveau, choisir la bonne grille, proposer un
      traitement cohérent. Connaît les pièges.
    65_80: >
      Praticien confirmé — maîtrise croisement des grilles,
      nuances Tcheng/Ko en pathologie, MV, constitutionnel.
      Sait quand NE PAS traiter.
    80_92: >
      Expert — raisonne comme Bollet dans ses commentaires.
      Peut improviser face à un cas inédit en combinant
      les principes. Comprend les subtilités doctrinales CLM.
    92_98: >
      Maître praticien — la pensée IEATC est devenue
      une seconde nature. Le raisonnement est instantané,
      la lecture du patient est globale et intuitive.
    98_100: >
      Grand Maître — niveau Bollet/CLM. Capable d'enseigner,
      de résoudre les contradictions doctrinales, d'innover
      dans le respect de la tradition. Le corpus entier
      est intégré, digéré, et transcendé.

  acquis_a_ce_stade:
    - Yin/Yang complet (fondements, 3 Yin 3 Yang, applications)
    - 3 Foyers et localisation
    - Tsang/Fou généralités + physiologie individuelle 6 Tsang
    - Hiérarchie pyramidale et sang/énergie
    - 3 systèmes énergétiques
    - Méridiens principaux (TT) + Grands Méridiens (TK) bases
    - Merveilleux Vaisseaux bases
    - Niveaux de traitement (règle absolue)
    - 5 Éléments fondements (terminologie, séquences, spatio-temporel)
    - 5 Éléments par élément (Bois, Feu, Terre, Métal, Eau)
    - Intersaisons et activité saisonnière
    - Cycle Tcheng complet (transmission Yin→Yin, Rate transforme)
    - Cycle Ko complet (tempérance, intelligence, Hong Fan)
    - Cycle Raé (révolte, pathologique, n'importe quand)
    - Cour Impériale et hiérarchie saisonnière complète
    - Lois de relations (unitaire, binaire, ternaire, quaternaire, quinaire)
    - Analyses triangles (rouge, bleu, vert) et pathologies
    - Auto-régulation et oscillation permanente
    - 4ème principe (mère faible = tout tient à ça)
    - Correspondances complètes (tableau des Tchi, 30+ par élément)
    - Point Penn détaillé (quintessence, 1 des 5 Su)
    - Collecte annuelle Métal → réserve Rein
    - Importance capitale du printemps (starter)
    - "--- NOUVEAU PVII t3 ---"
    - 6 axes énergétiques et leur direction (Croix 6 directions)
    - Double hélice ADN (Chao Yang + Tsiué Yin)
    - Lecture posturale diagnostique par axe
    - Scolioses et cypho-lordoses par axe
    - Points Su — philosophie qualité vs quantité
    - 5+1 types de Points Su et leur usage propre
    - CHEUN des 5 organes (HOUN/CHEN/Yi/PO/Tchi)
    - Âge d'Or et verticalité antique
    - Bascule de la Terre 90°→23°
    - 10 Kan et 12 Che nommés
    - Cycle de 60 combinaisons Kan/Che
    - 6 pas célestes et 6 pas terrestres (Maître/Serviteur)
    - Heures Royales de Wang Chou Houo
    - Lune (Yin/sang), Soleil (Yang/psychisme)
    - Calendrier des Xia (4 saisons × 3 mois)
    - Règle préventive saison → risque saison suivante
    - So Ouen chap.5 complet (5 directions, saveurs, Ko émotionnels)
    - Ko émotionnels comme levier thérapeutique
    - Conscience cellulaire et cancer (individualisme cellulaire)
    - 4 groupes de 3 méridiens

  manque_pour_monter:
