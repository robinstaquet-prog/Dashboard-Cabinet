# ─────────────────────────────────────────────────
# ANALYSE DE PERFORMANCE — SONNET 4.6 vs OPUS 4.6
# ─────────────────────────────────────────────────

analyse_performance_modele:
  modele_utilise: claude-sonnet-4-6
  tache_effectuee: integration_polycopie_96_pages_PVII_t3
  date: 2026-04-05

  ce_qui_a_bien_fonctionne:
    lecture_extraction: >
      Sonnet 4.6 a correctement extrait les concepts clés
      d'un texte long (96 pages en format texte). La lecture
      par chunks successifs a bien fonctionné, la cohérence
      des concepts d'un chunk à l'autre a été maintenue.
    structure_yaml: >
      La production de YAML bien structuré, imbriqué et
      cohérent a été fiable. Peu d'erreurs de syntaxe.
      Le respect du format établi par les fichiers précédents
      (mêmes clés, même style) a été assuré.
    cascade_complete: >
      Les 6 Tsang + lexique + arbres_decision +
      philosophie_clinique ont tous été mis à jour
      sans oubli. La mémoire des fichiers liés a été
      respectée.
    schemas_textuels: >
      Les descriptions textuelles des schémas (figures PDF
      non accessibles directement) ont été produites de façon
      cohérente avec le contenu environnant.
    quantite: >
      5 fichiers créés + 8 fichiers mis à jour en une seule
      session. Volume considérable traité sans dégradation
      qualitative notable.

  limites_observees:
    raisonnement_nuance: >
      Sur les subtilités doctrinales (ex : distinction précise
      entre Chao Yang et Taé Yang dans les axes, nuances des
      Ko émotionnels en clinique), Opus 4.6 aurait probablement
      produit des formulations plus riches et des connexions
      plus nombreuses entre les concepts.
    gestion_longueur: >
      La session a nécessité deux "continues" de l'utilisateur.
      Le contexte a été perdu entre les deux sessions (résumé
      de compaction), ce qui a créé un risque de perte de
      cohérence. Opus 4.6 avec sa fenêtre de contexte plus large
      aurait pu tenir davantage en une seule session.
    liens_inter_concepts: >
      Opus 4.6 aurait mieux intégré les nouveaux concepts
      (Points Su, Kan/Che) avec les connaissances déjà acquises
      (cycles 5E, Tsang individuels). Sonnet tend à traiter les
      nouveaux concepts de façon plus isolée.
    auto_critique_active: >
      Opus 4.6 aurait probablement questionné lui-même
      certaines traductions ou interprétations ambiguës
      (ex : 10 Kan dans l'ordre exact, correspondances
      des 12 Che aux 12 méridiens).

  estimation_apport_opus_4_6:
    degre_utilite_supplementaire: 35_pourcent_environ
    domaines_ou_il_excelle:
      - raisonnement_multi_niveaux_complexe
      - connexions_inter_concepts_spontanees
      - nuance_doctrinale_et_contextuelle
      - textes_denses_ambigus_necessite_interpretation
      - questions_ouvertes_et_innovations_conceptuelles
    domaines_ou_sonnet_suffit:
      - extraction_structuree_texte_clair
      - production_yaml_volume_important
      - cascade_mise_a_jour_fichiers_multiples
      - respect_format_etabli
      - quantite_brute_sans_besoin_de_nuance

  verdict: >
    Pour cette tâche spécifique (extraction + structuration
    d'un polycopié IEATC en YAML, cascade de mises à jour),
    Sonnet 4.6 est suffisant à ~75% de la qualité d'Opus 4.6.
    Le manque se ressent surtout sur :
    — la richesse des commentaires cliniques (trop concis)
    — les liens spontanés entre modules déjà intégrés
    — la gestion du contexte long sans compaction.

    Opus 4.6 serait nettement préférable pour :
    — les modules psychisme (PVIII) avec interprétation subtile
    — les modules cliniques (cas complexes, croiser grilles)
    — tout ce qui demande une synthèse inter-modules profonde.

    Sonnet 4.6 est le bon outil pour les tâches d'extraction
    et de structuration volumineuse — ce que ce polycopié
    représentait en grande partie.
