fichiers_crees:
  - chemin: THEORIE/cinq_elements_axes_energetiques.yaml
    contenu: >
      Terre double position (entre Eau-Feu ET entre Bois-Métal),
      tableau 5E↔6 axes, La Cellule (conscience cellulaire, cancer
      = individualisme), Eau et Feu précurseurs, Bois/Métal horizontal,
      Ciel féconde Terre (4 groupes méridiens, tableaux 8 et 9),
      Croix 6 directions + double hélice ADN, scolioses et
      cypho-lordoses. (pp.1-27)
  - chemin: THEORIE/cinq_elements_mouvements_5E.yaml
    contenu: >
      Tableau 4 des 5 mouvements (Bois=naissance/souplesse,
      Feu=expansion/circulation, Terre=maturité/transformation,
      Métal=rétraction/respiration, Eau=conservation/fluidité),
      So Ouen chap.5 complet par direction (Est/Bois, Sud/Feu,
      Centre/Terre, Ouest/Métal, Nord/Eau) avec saveurs, CHEUN
      associés, Ko émotionnels, blessures climatiques, Ko climatiques.
      (pp.27-44)
  - chemin: THEORIE/cinq_elements_points_su.yaml
    contenu: >
      Tableaux 5 (Yin, 5 points) et 6 (Yang, 6 points avec Iuann),
      points pour tous les méridiens Yin et Yang. Propriétés de
      chaque type (Ting puits/ongle, Iong chaleur-froid,
      Iu porte perversités, Iuann code barre, King énergie défensive,
      Ro 4 barrières communication interne-externe). Règle : Su
      agissent sur QUALITÉS, pas quantités. 66 énergies dans iong.
      (pp.10-20)
  - chemin: THEORIE/cinq_elements_kan_che.yaml
    contenu: >
      Âge d'Or (So Ouen chap.69, verticalité antique 90°, axes
      électrique E-O et magnétique N-S, éternel printemps, bascule
      90°→23°), figures 9 et 10 expliquées textuellement,
      6 pas célestes (succession immuable, Maître/Serviteur),
      6 pas terrestres FIXE (inversion Chao Yang/Taé Yin notable),
      10 Kan nommés (Kia/I/Ping/Ting/Wou/Tchi/Keng/Hsin/Jen/Koui),
      12 Che (Tse/Tcheou/Yin/Mao/Tchen/Seu/Ou/Wei/Chen/Yeou/Siu/Hai),
      cycle 60 ans (1984=1ère combinaison, 2044=prochain cycle),
      Heures Royales de Wang Chou Houo, Lune (soleil=Yang/psychisme,
      lune=Yin/sang), 10 premières lunes par Kan, lunes intercalaires.
      (pp.44-79)
  - chemin: THEORIE/cinq_elements_calendrier_xia.yaml
    contenu: >
      4 saisons × 3 mois, thèmes (Jaillir/Gravir/Construire/Maintenir),
      règle médicale (contrarier le souffle = blesser l'organe +
      préparer maladie saison suivante), synthèse clinique préventive
      (Printemps→Foie/risque été, Été→Cœur/fièvre automne-hiver,
      Automne→Poumon/douleurs hiver, Hiver→Rein/épuisement printemps).
      (pp.80-96)
  total: 5

