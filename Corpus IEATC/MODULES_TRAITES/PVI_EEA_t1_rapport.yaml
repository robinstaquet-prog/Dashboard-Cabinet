  sous_titre: >
    Transcriptions du séminaire CLM de décembre 1981.
    Dr Jean Schatz, Elisabeth Rochas de la Vallée.
    Compilé par Thierry Bollet (2015). Systémique des méridiens,
    énergies héréditaires, cinq Shen, embryologie, Ming Men.
  auteurs:
    - Dr_Jean_Schatz
    - Elisabeth_Rochas_de_la_Vallee
  compilateur: Thierry_Bollet_2015
  dates_seminaires: decembre_1981
  pages: 68
  module: VI_Seminaires_CLM_EEA_tome_1
  niveau: fondateur_philosophique_et_embryologique
  prerequis: PVI_t1_t2_t3_et_PVII_t1_t2_t3_t4_deja_integres
  note_format: >
    Format séminaire dialogué CLM, compilé 34 ans après.
    Très dense philosophiquement : Dao, Taé I, embryologie,
    Ming Men, Shen. Peu de clinique directe mais fondements
    doctrinaux profonds qui sous-tendent toute la pratique.

fichiers_crees:
  - chemin: THEORIE/energies_hereditaires_seminaire.yaml
    contenu: >
      Yuan Qi (C.A. uniquement, principielle, métaphore ADN, via 3R
      depuis Ming Men), Jing Qi (C.A. + C.P., essentielle,
      chlorophyllienne, double sens), Zong Qi (C.P. uniquement,
      ancestrale, métaphore ARN, Tan Zhong 17VC, Xu Li grand Lo).
      Synthèse topologique CA/CP, répartition 3R, deux voies
      centrifuge/centripète. Yin/Yang originels et authentiques
      (4 termes, code gauche/droite). Jing des aliments
      (Jing Weï, Jing Yé, Su Wen chap.21 circuit).
  - chemin: THEORIE/shen_cinq_esprits_seminaire.yaml
    contenu: >
      Nature générale des Shen (non-dualité, miniaturisation,
      indestructibilité). Hiérarchie : groupe supérieur
      (Shen/Hun/Po) + groupe inférieur (Yi/Zhi). Couple Shen
      céleste / Gui terrestre. 5 Shen individuels détaillés :
      Shen(C), Hun(F), Po(P), Yi(Rte), Zhi(R). Embryologie
      des Shen (textes 10è siècle, Huai Nan Zi, mois par mois).
      Relations inter-Shen et 5E. Xing/Ti/Shen = 3 angles du corps.
  - chemin: THEORIE/meridiens_systemique_seminaire.yaml
    contenu: >
      Principes systémiques (Mo/Mai, mécanisme, Jing = systématique
      autonome). Hiérarchie embryologique des méridiens :
      Qi Mo → Jing Jin → Jing Mo → Lo Mo → Jing Bié
      (5 niveaux de surface à profondeur). Solénoïdes (pas cercles),
      Fong (communication/douleur), Neï/Waï vs Biao/Li.
      Dao et Taé I, Ming Men approfondi avec embryologie.
  total: 3

