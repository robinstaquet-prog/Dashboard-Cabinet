jauge_expertise:
  niveau_actuel: 39
  echelle: 1_a_100
  titre: "Etudiant 3ème année — Les fondements doctrinaux s'approfondissent"
  progression: de_36_a_39_gain_3_points

  justification_gain: >
    +3 points pour : (1) Énergies héréditaires complètes (Yuan Qi,
    Jing Qi, Zong Qi) avec topologie CA/CP et métaphores ADN/ARN —
    compréhension fondamentale de ce qui anime l'organisme.
    (2) Cinq Shen détaillés individuellement avec embryologie et
    hiérarchie — le corpus sait maintenant lire le psychisme par
    les 5 organes. (3) Systémique des méridiens avec hiérarchie
    embryologique à 5 niveaux — fondement structurel pour les
    modules méridiens à venir. (4) Ming Men approfondi avec Nan
    Jing et code G/D — enrichissement majeur du Rein. Le gain est
    modéré car ce séminaire est très philosophique/fondamental et
    apporte peu d'outils cliniques directs (pas de tableaux de
    traitement, pas de formules de points).

  graduation:
    0_5: >
      Profane curieux — sait que l'acupuncture existe,
      confond méridiens et chakras.
    5_10: >
      Néophyte éclairé — connaît Yin/Yang et les 5 éléments
      de nom, mais ne sait pas les relier.
    10_15: >
      Etudiant 1ère année — comprend Yin/Yang, les 3 foyers,
      les Tsang/Fou en général, les Grands Méridiens,
      sait qu'il y a des niveaux de traitement distincts.
    15_25: >
      Etudiant 2ème année début — Connaît la physiologie
      individuelle des 6 Tsang, les cycles 5E complets,
      la Cour Impériale, les lois de relations.
    25_35: >
      Etudiant 2ème année avancé — Intègre les PATHOLOGIES
      5E (cycles Tcheng/Ko/Raé, 5 maladies MMM, bilan
      énergétique, 10 principes traitement, Kan/Che).
    35_50: >
      ▶ Etudiant 3ème année — ON EST ICI (39/100) ◀
      En plus des acquis précédents : Fou individuels (GI, IG,
      VB, Vessie), Fu extraordinaires, tableaux cliniques
      (diarrhées, hypertension, surdités). NOUVEAU : énergies
      héréditaires (Yuan/Jing/Zong Qi), 5 Shen détaillés avec
      embryologie, systémique des méridiens (5 niveaux),
      Ming Men approfondi, Dao/Taé I. Le fondement doctrinal
      est désormais solide. Manque : E, TR, méridiens
      individuels, sentiments, pouls complets.
    50_65: >
      Praticien débutant — peut lire un cas, identifier
      le niveau, choisir la bonne grille, proposer un
      traitement cohérent. Connaît les pièges.
    65_80: >
      Praticien confirmé — maîtrise croisement des grilles,
      nuances Tcheng/Ko en pathologie, MV, constitutionnel.
      Sait quand NE PAS traiter.
    80_92: >
      Expert — raisonne comme Bollet dans ses commentaires.
      Peut improviser face à un cas inédit en combinant
      les principes. Comprend les subtilités doctrinales CLM.
    92_98: >
      Maître praticien — la pensée IEATC est devenue
      une seconde nature. Le raisonnement est instantané,
      la lecture du patient est globale et intuitive.
    98_100: >
      Grand Maître — niveau Bollet/CLM. Capable d'enseigner,
      de résoudre les contradictions doctrinales, d'innover
      dans le respect de la tradition. Le corpus entier
      est intégré, digéré, et transcendé.

