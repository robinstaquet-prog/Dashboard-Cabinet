schemas_expliques:
  note: >
    Format séminaire oral CLM — pas de schémas visuels formels.
    Les explications topologiques (3 Réchauffeurs CA/CP,
    hiérarchie embryologique des méridiens, code G/D du Rein)
    ont été structurées en YAML à partir du discours oral.

questions_soulevees:
  - >
    La distinction Yuan Qi / Jing Qi / Zong Qi avec les métaphores
    ADN/ARN ouvre des perspectives sur la compréhension moderne
    de l'hérédité en MTC. Le lien clinique (comment diagnostiquer
    un déficit de l'une vs l'autre) reste à approfondir.
  - >
    Les 5 niveaux embryologiques de méridiens (Qi Mo → Jing Bié)
    sont posés mais leur utilisation en diagnostic et traitement
    (quel niveau traiter en priorité ?) sera développée dans
    les modules méridiens individuels.
  - >
    Le couple Hun/Po (père/mère, archétypes/instincts) et son
    rapport à la psychothérapie acupuncturale mérite un
    développement clinique (probablement dans P VIII sentiments).
  - >
    L'embryologie des Shen mois par mois (Huai Nan Zi) fournit
    un cadre pour comprendre les pathologies néonatales et
    pédiatriques — pas encore exploité cliniquement dans le corpus.

lacunes_critiques:
  - Estomac (E) et Triple Réchauffeur (TR) toujours manquants
  - Méridiens individuels détaillés (CP méridiens non traité)
  - Sentiments détaillés par organe (P VIII non traité)
  - Cas cliniques complets avec raisonnement intégral
  - Pouls complets (28 pouls chinois)
  - Jing Jin et Lo Mo en détail individuel

