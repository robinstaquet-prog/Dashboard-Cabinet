fichiers_crees:
  - chemin: THEORIE/cinq_elements_fondements.yaml
    contenu: >
      Terminologie élément/mouvement, 4 énergies originelles,
      séquences de la vie (30 temps en 3 groupes), Yin/Yang
      source des 5E, organisation spatio-temporelle, espace-
      temps-rythme, correspondances générales, natures
      fonctionnelles, tout est dans le tout (pp.7-37)
  - chemin: THEORIE/cinq_elements_par_element.yaml
    contenu: >
      Étude individuelle de chaque élément : Bois (foie, vent,
      fong, vert), Feu (coeur, MC, double Feu, tann tienn,
      rouge), Terre (rate, centre, TOU, déplacement 50km,
      double activité, jaune), Métal (poumon, rigueur, blanc),
      Eau (rein, sagesse, eaux primordiales, noir/vermillon).
      Point Penn. (pp.38-47)
  - chemin: THEORIE/cinq_elements_saisons.yaml
    contenu: >
      Saisons et éléments, cycle Tcheng (engendrement),
      5ème saison et intersaisons (18 jours × 4), durée des
      saisons (73 jours), activité énergétique saisonnière,
      restitution des énergies, période Terre (30 jours fin
      d'été), double activité Rate. (pp.34-55)
  - chemin: MODULES_TRAITES/PVII_t1_rapport.yaml
    contenu: ce rapport
  total: 4

