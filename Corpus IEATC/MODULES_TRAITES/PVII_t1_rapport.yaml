schemas_expliques:
  note: >
    Chaque schéma a été compris et expliqué textuellement
    dans les fichiers YAML correspondants. L'assistant futur
    peut reconstituer mentalement chaque schéma à partir
    de ces explications sans avoir besoin du PDF.
  localisation_explications:
    figures_1_2: THEORIE/cinq_elements_fondements.yaml → yin_yang_source.schema_explique
    figure_3: >
      Triangle Rein→Rate→Foie : les 3 organes fondamentaux.
      Le Rein (inné) et la Rate (acquis) en haut, le Foie
      (impulsion de vie) en bas, nourri par les deux.
      Le Bois nécessite l'action conjuguée du R et du Rte.
    figure_4: >
      Croix cardinale : Sud/Été/Chaleur en haut,
      Nord/Hiver/Froid en bas, Est/Printemps/Vent à gauche,
      Ouest/Automne/Sec à droite. Centre = Humidité/5ème saison.
    figures_5_6_7_8: THEORIE/cinq_elements_fondements.yaml → mouvements_centripete_centrifuge.schemas_expliques
    figures_9_10: THEORIE/cinq_elements_saisons.yaml → saisons_et_elements.schemas_expliques
    figures_11_12: THEORIE/cinq_elements_saisons.yaml → cinquieme_saison.intersaison.schema_explique
    figures_13_14_15: THEORIE/cinq_elements_saisons.yaml → restitution_energies.schemas_expliques
    figures_16_17: THEORIE/cinq_elements_saisons.yaml → periode_Terre.schemas_expliques

