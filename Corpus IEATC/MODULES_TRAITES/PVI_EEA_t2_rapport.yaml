# RAPPORT D'INTÉGRATION — PVI SÉMINAIRES CLM TOME 2 (EEA 2è)
# Date : 2026-04-06

meta:
  polycopie: EEA_2e.pdf
  titre: Polycopié VI — Séminaires CLM — EEA tome 2
  sous_titre: >
    Deux séminaires CLM : mai 1982 (Dr Schatz + ERDLV) et
    juin 1984 (Père Larre + ERDLV). Énergies héréditaires
    approfondies, Jin Yé, Yong/Weï, constipations, Su Wen ch.8
    (12 charges des viscères commentées intégralement).
  auteurs:
    - Dr_Jean_Schatz
    - Elisabeth_Rochas_de_la_Vallee
    - Pere_Larre
  compilateur: Thierry_Bollet_2015
  dates_seminaires: mai_1982_et_juin_1984
  pages: 49
  module: VI_Seminaires_CLM_EEA_tome_2
  niveau: fondateur_et_clinique
  prerequis: PVI_t1_t2_t3_EEA_t1_et_PVII_t1_t2_t3_t4_deja_integres
  note_format: >
    Deux séminaires CLM réunis. Le premier (1982) apporte Jin Yé,
    Yong/Weï et constipations. Le second (1984) est un commentaire
    magistral du Su Wen ch.8 par le Père Larre et ERDLV —
    exceptionnellement riche en philosophie. Présence d'un 3ème
    intervenant (Père Larre) par rapport aux tomes précédents.

fichiers_crees:
  - chemin: THEORIE/jin_ye_liquides_seminaire.yaml
    contenu: >
      Théorie complète des Jin Yé. Circuit Su Wen ch.21 (liquides).
      Jin (clair, Yang, gué, extérieur, GI) vs Yé (trouble, Yin,
      marais, intérieur, IG). Yé qui montent au cerveau. Rôle des
      3 Réchauffeurs (brouillard/macération/canal). Souffles Zhen Qi
      (authentiques), Zheng Qi (corrects), Xié Qi (pervers). Points
      He (jonction) et Hui (rassemblement).
  - chemin: THEORIE/yong_wei_energies_seminaire.yaml
    contenu: >
      Énergie Yong (nutritive) : nature, origine RM, circuit 12
      méridiens 25x jour/nuit, formation du sang, idéogramme YING.
      Énergie Weï (défensive) : nature, origine RI, circuit diurne
      (3 Yang 25x via œil) et nocturne (5 Zang 25x via Rein).
      Points R.6 (insomnie) et V.62 (somnolence). Chuan (transmission).
      Paradoxe Yong/Weï et cycle nycthémère.
  - chemin: CLINIQUE/pathologies_constipations.yaml
    contenu: >
      6 tableaux cliniques différentiels complets. Plein : chaleur
      (R.6 t, F.1 d, GI.4 d), Souffles/psychique (VC.4, Rte.6 moxa),
      vent (V.12, VG.16, V.25 d), aliments (VC.12, E.36 d).
      Vide : Yang/froid (V.17 t, V.18 t, E.25 t), Yin (nourrir Yin).
      Terminologie Bian Bi, ZAO JIE/BI JIE. Principes de latéralité
      et piqûre MIU.
  total: 3

