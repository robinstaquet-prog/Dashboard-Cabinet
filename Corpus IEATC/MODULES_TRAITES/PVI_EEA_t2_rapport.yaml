# JAUGE D'EXPERTISE — NIVEAU DE L'ASSISTANT
# ─────────────────────────────────────────────────

jauge_expertise:
  niveau_actuel: 42
  echelle: 1_a_100
  titre: "Etudiant 3ème année avancé — Les énergies physiologiques prennent corps"
  progression: de_39_a_42_gain_3_points

  justification_gain: >
    +3 points pour : (1) Jin Yé complet — le corpus comprend maintenant
    les liquides du corps avec leur dichotomie Jin/Yé et les circuits.
    (2) Yong Qi et Weï Qi avec leurs circuits diurne/nocturne — les
    énergies physiologiques fondamentales sont posées, avec des points
    concrets (R.6, V.62). (3) Constipations 6 tableaux cliniques
    complets — le corpus gagne un 4ème domaine clinique avec traitement.
    (4) Su Wen ch.8 intégral commenté par Père Larre + ERDLV enrichit
    TOUS les Tsang/Fou (10 fichiers) avec la hiérarchie des charges.
    Le gain est significatif car ce polycopié apporte à la fois de la
    théorie fondamentale (Jin Yé, Yong/Weï) et de la clinique concrète
    (constipations).

  graduation:
    0_5: Profane curieux
    5_10: Néophyte éclairé
    10_15: Etudiant 1ère année
    15_25: Etudiant 2ème année début
    25_35: Etudiant 2ème année avancé
    35_50: >
      ▶ Etudiant 3ème année — ON EST ICI (42/100) ◀
      En plus des acquis précédents : Jin Yé complet (Jin/clair/GI
      vs Yé/trouble/IG), Yong Qi (nutritive, circuit 12 méridiens)
      et Weï Qi (défensive, diurne/nocturne, R.6/V.62). Souffles
      Zhen/Zheng/Xié. Su Wen ch.8 intégral (12 charges commentées).
      Constipations 6 tableaux. Le corpus possède maintenant les
      4 grandes physiologies (héréditaire, Shen, Jin Yé, Yong/Weï)
      et 4 domaines cliniques (diarrhées, HTA, surdités, constipations).
      Manque : E et TR individuels, méridiens détaillés, sentiments,
      pouls complets.
    50_65: Praticien débutant
    65_80: Praticien confirmé
    80_92: Expert
    92_98: Maître praticien
    98_100: Grand Maître

  acquis_a_ce_stade:
    - "Tous les acquis précédents (voir PVI_EEA_t1_rapport.yaml)"
    - "--- NOUVEAU PVI EEA t2 ---"
    - Jin Yé théorie complète (Jin/clair/Yang/GI vs Yé/trouble/Yin/IG)
    - Jin = gué, rivière, extérieur, peau, transpiration
    - Yé = marais, intérieur, cerveau, moelles, liquides synoviaux
    - Yé qui montent au cerveau (catégorie capitale)
    - Circuit Su Wen ch.21 des liquides (E → Rte → P → V/R)
    - P toit des Zang (abaissement liquides, marmite espagnole)
    - 3R brouillard/macération/canal
    - Yong Qi (nutritive, claire, RM, 12 méridiens, 25x jour/nuit)
    - Weï Qi (défensive, RI, diurne 3 Yang via œil / nocturne 5 Zang via R)
    - R.6 pour insomnie (activer circuit nocturne)
    - V.62 pour somnolence (activer circuit diurne)
    - Paradoxe Yong/Weï et nycthémère
    - Zhen Qi (authentiques CA+CP réunis, CHONG)
    - Zheng Qi (corrects, vents normatifs des saisons)
    - Xié Qi (pervers, au mauvais moment/endroit)
    - Chuan (transmission de proche en proche, pas cycle)
    - Su Wen ch.8 intégral (12 charges des viscères)
    - C = Seigneur et Maître (1er, JUN ZHU) → Shen Ming
    - P = Ministre Chancelier (2ème, XIANG) → TIE nœuds bambou
    - F = Général en chef (3ème) → plans, pas décision
    - VB = censeur (4ème, Fu spécial) → détermination/décision
    - Tan Zhong = 5ème charge → XIN ZHU, Feu Suzerain/Ministre
    - Rte/E = granges et greniers (6ème) → 5 saveurs, YUN HUA
    - GI = transit (7ème) → changement radical, commande Jin
    - IG = réceptionner et prospérer (8ème) → commande Yé
    - R = puissance (10ème) → savoir-faire, Jing Shen
    - TR = ouvrir passages (11ème) → irrigation, Shao Yang
    - V = territoires et provinces (12ème) → Qi Hua, fermoir cyclique
    - Constipations 6 tableaux (chaleur/Souffles/vent/aliments/vide Yang/vide Yin)
    - Bannière Ma Wang Du (nœud Yin/Yang, vide nécessaire)
    - Fil unique des 12 charges (interdépendance absolue)

  manque_pour_monter:
    pour_45: Estomac_et_TR_individuels_complets
    pour_50: meridiens_individuels_complets_sentiments_debut
    pour_60: cas_cliniques_pouls_complets_strategies_avancees
    pour_80: tout_le_programme_IEATC_integre_et_croise

dependances_modules_suivants:
  priorite_1: PVIII_sentiments_psychisme_par_organe
  priorite_2: CP_meridiens_Lo_individuels
  priorite_3: PIV_t3_Kan_Che_appliques
  priorite_4: Physio_Ext_et_autres_modules_avances
  note: >
    EEA t2 a posé les grandes physiologies (Jin Yé, Yong/Weï)
    et enrichi tous les Tsang/Fou via Su Wen ch.8. Le corpus
    possède maintenant 4 domaines cliniques. E et TR restent
    individuellement incomplets (mais leurs charges Su Wen ch.8
    sont intégrées via les fichiers existants).

