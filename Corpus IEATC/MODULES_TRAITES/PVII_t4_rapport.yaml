      plénitude), arbre_10_interrogatoire_tchi (principe général
      vide/plénitude, 5 tableaux par élément).
  - chemin: _SYSTEME/00_philosophie_clinique.yaml
    ajouts: >
      9 nouvelles sections : trois_niveaux_homme (3 plans
      simultanés), morphotype_precede_tout (terrain avant
      symptôme), ne_jamais_disperser_sentiment (So Ouen),
      huit_activites_et_unite (Chen souverain), gravite_vitale_
      trois_elements (Feu/Métal/Eau), corps_comme_paysage
      (palpation = dialogue), dix_principes_traitement (synthèse
      opérationnelle), Kan_Che_et_temporalite (moment optimal),
      spirales_et_alchimie (matière↔esprit).

