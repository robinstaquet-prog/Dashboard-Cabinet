# RAPPORT D'INTÉGRATION — PVII 5 ÉLÉMENTS TOME 4
# Date : 2026-04-05

meta:
  polycopie: 5_Elements_4.pdf
  titre: Polycopié VII — Les 5 Éléments — Pathologies tome 4
  sous_titre: >
    Pathologies des 5 Éléments : synthèse, traitement,
    cycles pathologiques, bilan énergétique, Kan/Che prévisionnel
  auteur: Thierry_Bollet
  date_document: 2019
  pages: 91
  module: VII_5_Elements_tome_4
  niveau: fondateur_clinique
  prerequis: PVII_t1_t2_t3_deja_integres

fichiers_crees:
  - chemin: THEORIE/cinq_elements_pathologies_synthese.yaml
    contenu: >
      Taé I et genèse Yin/Yang, Ciel/Terre/Homme, 6 énergies
      et 5 mouvements, 3 niveaux de l'Homme (organique, affectif,
      psychique), morphotype 5E, 8 activités psychiques du Ling Tchrou
      chap.8 (Chen, Roun, I, Si, Pro, Lü, Tche, Zhi), pathologie
      sentimentale (ne jamais disperser un sentiment), pathologie
      psychique (5 personnalités), nutrition et phytothérapie,
      Yin/Yang et Penn (4 divisions : Yang/Yang=8C, Yin/Yang=8P,
      Yang/Yin=1F, Yin/Yin=10R), spirales ascendante (Eau→Bois→Feu)
      et descendante (Feu→Métal→Eau). (pp.8-22, 55-62)
  - chemin: THEORIE/cinq_elements_pathologies_traitement.yaml
    contenu: >
      Principes thérapeutiques : points Penn (quintessence de chaque
      méridien), tableau complet Penn Yin et Yang, points Mère
      (tonification) et Fils (dispersion) avec loi mère-fils,
      points actifs/neutres/horaires selon saison, règles d'utilisation
      des Su en traitement, 10 principes résumé de tout le traitement
      5E. (pp.23-36, 80-81)
  - chemin: THEORIE/cinq_elements_pathologies_cycles.yaml
    contenu: >
      Tcheng pathologique (déblocage par dispersion point Fils),
      Ko pathologique (double règle grand-mère/petit-fils),
      Raé (inversion du Ko = révolte = gravité), Cour Impériale
      pathologique (victoire vs défaite), 5 maladies de MMM
      (véritable, vide, plénitude, victoire, défaite), So Ouen
      plénitude (attaque TOUJOURS 2 éléments : ennemi + conseiller),
      exemples développés avec prescriptions de points. (pp.37-54)
  - chemin: THEORIE/cinq_elements_pathologies_bilan.yaml
    contenu: >
      Bilan énergétique en 4 temps, 8 règles, interrogatoire Tchi
      complet (5 tableaux vide/plénitude par élément avec saveurs,
      comportements, saisons, signes physiques), palpation abdominale
      (6 zones avec localisation et point de déblocage), zones
      Hong Kong, pouls Chu Li, pouls saisonniers (corde, ample,
      souple, plumeux, profond), aorte abdominale et Tchrong Mo.
      (pp.64-79)
  - chemin: THEORIE/cinq_elements_pathologies_kan_che.yaml
    contenu: >
      Kan/Che en prévision pathologique, 3 analyses croisées
      (étoiles→planètes, planètes→Terre, étoiles→Terre),
      périodes favorables et défavorables par élément,
      compensations énergétiques, traitement par axes et
      systèmes énergétiques (mêmes points Su, compensation
      dans l'axe et entre axes). (pp.82-91)
  total: 5

fichiers_mis_a_jour:
  - chemin: ZANG_FU/foie.yaml
    ajouts: >
      enrichissement_5E_t4 : morphotype Bois (robuste, tendons,
      articulaire), interrogatoire vide/plénitude (acide, colère,
      printemps), point Penn 1F (Yang du Yin), palpation flanc
      gauche (déblocage 2F/3F d), gravité (pas vitale immédiate
      mais retentissement total), ko pathologique (Bois excès →
      attaque Terre ET s'emballe), traitement So Ouen.
  - chemin: ZANG_FU/coeur.yaml
    ajouts: >
      enrichissement_5E_t4 : Chen autorité (5 personnalités sous
      son contrôle), interrogatoire (amer, excité/triste, été),
      point Penn 8C (Yang du Yang), palpation sous sternum 14JM
      (déblocage 7C/7MC d), gravité vitale (vide en automne/hiver
      peut tuer l'été suivant), pouls Chu Li, traitement So Ouen
      (plénitude 7C d/1R d/5P d, vide + 1F t).
  - chemin: ZANG_FU/rate.yaml
    ajouts: >
      enrichissement_5E_t4 : Terre essentielle (36E maître Yang,
      3Rte maître Yin), interrogatoire (sucre, soucieux/insouciant,
      5ème saison), point Penn 3Rte, palpation 2 zones Terre
      (centre nombril 5Rte d, digestive sus-ombilicale 6Rte d),
      schéma classique (Terre vide = le plus fréquent, Rate+Rein
      vides = épuisement ancestrale), souplesse pouls permanente.
  - chemin: ZANG_FU/poumon.yaml
    ajouts: >
      enrichissement_5E_t4 : interrogatoire (piquant, triste,
      automne), point Penn 8P (Yin du Yang), palpation flanc droit
      (déblocage 5P/5P' d), gravité vitale (Feu+Métal+Eau les 3
      plus graves), spirale descendante (conduit Yang au Yin),
      Hong Kong sous-claviculaire.
  - chemin: ZANG_FU/rein.yaml
    ajouts: >
      enrichissement_5E_t4 : interrogatoire (salé, téméraire/
      peureux, hiver), point Penn 10R (Yin du Yin), palpation
      sous nombril 4-6JM (déblocage 5R d), gravité vitale
      (Rate+Rein vides = signe grave), zone Hong Kong sous-
      ombilicale 25VB (pulsations = diagnostic), aorte abdominale
      (montre énergie Tchrong Mo).
  - chemin: ZANG_FU/maitre_du_coeur.yaml
    ajouts: >
      enrichissement_5E_t4 : rôle sentiments (stockés 17JM sous
      gestion MC), point Penn 7MC (Iu Terre), zone Feu partagée
      avec Coeur (14JM, déblocage 7MC d alternatif), traitement
      sentiments So Ouen (ne jamais disperser, renforcer Penn
      dominant Ko), douleur coeur par foie (6MC t = efficacité
      immédiate et définitive).
  - chemin: LEXIQUE/lexique_termes_ieatc.yaml
    ajouts: >
      18 nouveaux termes : Maladie_veritable, Maladie_de_vide,
      Maladie_de_plenitude, Maladie_de_victoire, Maladie_de_defaite,
      MMM_Mishi_Mesa_Mishisawa, Cycle_Rae, Double_regle_Ko,
      Point_Penn, Palpation_abdominale, Pouls_Chu_Li, Zone_Hong_Kong,
      Morphotype_5E, Spirale_ascendante, Spirale_descendante,
      Huit_activites_psychiques, Interrogatoire_Tchi,
      Pouls_saisonniers, Kan_Che_pathologique, Dix_principes_traitement.
  - chemin: _SYSTEME/00_arbres_decision.yaml
    ajouts: >
      3 nouveaux arbres : arbre_8_palpation_abdominale (6 zones,
      déblocages, zones spéciales Chu Li/Hong Kong/aorte,
      interprétation), arbre_9_cinq_maladies_MMM (classification
