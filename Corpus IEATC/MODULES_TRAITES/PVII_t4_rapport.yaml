schemas_expliques:
  note: >
    Les schémas du polycopié PVII t4 ont été intégrés
    textuellement dans les fichiers YAML. Chaque figure
    est décrite et expliquée dans le corps du fichier correspondant.
  tableau_Penn_Yin:
    description: >
      Tableau des points Penn pour les 6 méridiens Yin.
      Chaque méridien a son point Penn = le point Su de son
      propre élément sur son propre méridien. Foie=1F (Ting Bois),
      Coeur=8C (Iong Feu), MC=7MC (Iu Terre par extension),
      Rate=3Rte (Iu Terre), Poumon=8P (King Métal), Rein=10R (Ro Eau).
    localisation: THEORIE/cinq_elements_pathologies_traitement.yaml → tableau_Penn_Yin
  tableau_Penn_Yang:
    description: >
      Tableau des points Penn pour les 6 méridiens Yang.
      Ordre inversé des éléments (Métal→Eau→Bois→Feu→Terre).
      VB=41VB (Ting Bois), IG=5IG (Iong Feu), TR=3TR (Iu Bois),
      E=36E (Iu Terre), GI=1GI (Ting Métal), V=66V (Ting Métal).
    localisation: THEORIE/cinq_elements_pathologies_traitement.yaml → tableau_Penn_Yang
  tableau_Mere_Fils:
    description: >
      Tableau loi mère-fils : pour chaque méridien, le point Mère
      (élément qui engendre = tonification) et le point Fils
      (élément engendré = dispersion). Ex : Foie — Mère=8F (Eau
      engendre Bois), Fils=2F (Feu engendré par Bois).
    localisation: THEORIE/cinq_elements_pathologies_traitement.yaml → loi_mere_fils
  tableaux_interrogatoire_5E:
    description: >
      5 tableaux complets d'interrogatoire vide/plénitude, un par
      élément. Chaque tableau compare les signes de vide et de
      plénitude : saveur (recherchée vs détestée), comportement
      émotionnel, saison (aggravation vs amélioration), signes
      physiques spécifiques. Outil diagnostique fondamental.
    localisation: THEORIE/cinq_elements_pathologies_bilan.yaml → interrogatoire_Tchi
  schema_palpation_abdominale:
    description: >
      Schéma des 6 zones de palpation abdominale, chacune
      associée à un élément : Métal=flanc droit, Bois=flanc
      gauche, Terre centre=nombril, Terre digestive=sus-ombilical,
      Feu=sous sternum, Eau=sous nombril. Chaque zone a son
      point de déblocage en dispersion.
    localisation: THEORIE/cinq_elements_pathologies_bilan.yaml → palpation_abdominale
  schema_spirales:
    description: >
      Double spirale montante et descendante autour de la Terre
      centrale. Spirale ascendante : Eau→Bois→Feu (matière vers
      esprit). Spirale descendante : Feu→Métal→Eau (esprit vers
      matière). La Terre est le pivot central. Représente le
      mouvement fondamental de la vie.
    localisation: THEORIE/cinq_elements_pathologies_synthese.yaml → complements_spirales
  schema_Yin_Yang_Penn:
    description: >
      Schéma des 4 divisions Yin/Yang appliquées aux points Penn.
      Yang du Yang = 8C (Feu dans Feu, foyer supérieur Yang).
      Yin du Yang = 8P (Métal dans Yang, foyer supérieur Yin).
      Yang du Yin = 1F (Bois dans Yin, foyer inférieur Yang).
      Yin du Yin = 10R (Eau dans Eau, foyer inférieur Yin).
    localisation: THEORIE/cinq_elements_pathologies_synthese.yaml → yin_yang_et_penn

questions_soulevees:
  - >
    Les points Penn des méridiens Yang présentent des anomalies
    apparentes (TR=3TR Iu Bois au lieu de Feu). L'IEATC explique
    cela par le double Feu, mais la logique complète mériterait
    un fichier dédié aux subtilités des Su Yang.
  - >
    La relation exacte entre les 3 analyses Kan/Che et la
    stratégie thérapeutique concrète n'est qu'esquissée.
    Le module PIV t3 devrait l'approfondir.
  - >
    Le traitement So Ouen du Coeur en vide (7C d + 1R d + 5P d
    + 1F t) combine dispersion et tonification — la logique
    précise (pourquoi disperser quand c'est vide ?) mérite
    un commentaire doctrinal approfondi.

lacunes_critiques:
