jauge_expertise:
  niveau_actuel: 33
  echelle: 1_a_100
  titre: "Etudiant 2ème année avancé — Le raisonnement pathologique s'installe"
  progression: de_28_a_33_gain_5_points

  graduation:
    0_5: >
      Profane curieux — sait que l'acupuncture existe,
      confond méridiens et chakras.
    5_10: >
      Néophyte éclairé — connaît Yin/Yang et les 5 éléments
      de nom, mais ne sait pas les relier.
    10_15: >
      Etudiant 1ère année — comprend Yin/Yang, les 3 foyers,
      les Tsang/Fou en général, les Grands Méridiens,
      sait qu'il y a des niveaux de traitement distincts.
    15_25: >
      Etudiant 2ème année début — Connaît la physiologie
      individuelle des 6 Tsang, les cycles 5E complets,
      la Cour Impériale, les lois de relations.
    25_35: >
      ▶ Etudiant 2ème année avancé — ON EST ICI (33/100) ◀
      En plus de la physiologie complète des 5E (t1-t3),
      intègre maintenant les PATHOLOGIES : cycles Tcheng/Ko/Raé
      en maladie, 5 maladies de MMM, double règle Ko, bilan
      énergétique complet (interrogatoire Tchi, palpation
      abdominale, pouls saisonniers), principes de traitement
      par les 5E (Penn, Mère-Fils, 10 principes), morphotype,
      spirales ascendante/descendante, 8 activités psychiques,
      Kan/Che en prévision. Possède désormais un cadre
      diagnostique ET thérapeutique cohérent dans les 5E.
      Manque encore : Fou individuels, méridiens, sentiments
      détaillés, cas cliniques réels.
    35_50: >
      Etudiant 3ème année — physiologie Fou individuels,
      méridiens individuels, lois Lo, sentiments par organe,
      pouls complets. Raisonnement clinique complet.
    50_65: >
      Praticien débutant — peut lire un cas, identifier
      le niveau, choisir la bonne grille, proposer un
      traitement cohérent. Connaît les pièges.
    65_80: >
      Praticien confirmé — maîtrise croisement des grilles,
      nuances Tcheng/Ko en pathologie, MV, constitutionnel.
      Sait quand NE PAS traiter.
    80_92: >
      Expert — raisonne comme Bollet dans ses commentaires.
      Peut improviser face à un cas inédit en combinant
      les principes. Comprend les subtilités doctrinales CLM.
    92_98: >
      Maître praticien — la pensée IEATC est devenue
      une seconde nature. Le raisonnement est instantané,
      la lecture du patient est globale et intuitive.
    98_100: >
      Grand Maître — niveau Bollet/CLM. Capable d'enseigner,
      de résoudre les contradictions doctrinales, d'innover
      dans le respect de la tradition. Le corpus entier
      est intégré, digéré, et transcendé.

  acquis_a_ce_stade:
    - Yin/Yang complet (fondements, 3 Yin 3 Yang, applications)
    - 3 Foyers et localisation
    - Tsang/Fou généralités + physiologie individuelle 6 Tsang
