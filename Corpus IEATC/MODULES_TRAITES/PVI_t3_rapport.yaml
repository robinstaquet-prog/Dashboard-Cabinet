schemas_expliques:
  note: >
    Le format séminaire CLM ne contient pas de schémas visuels
    comme les polycopiés Bollet. Les explications sont entièrement
    textuelles et dialoguées. Les tableaux cliniques (diarrhées,
    hypertension, surdités) ont été structurés à partir du discours
    oral retranscrit.

questions_soulevees:
  - >
    Le Petit Cœur (Xiao Xin = Ming Men) est présenté comme un
    3ème pôle embryologique entre Ciel Antérieur et Postérieur.
    Son rôle exact dans la pratique clinique quotidienne reste
    à approfondir (probablement dans les modules sur le Feu).
  - >
    La latéralité Yin/Yang du Rein (G=Yang, D=Yin) et ses
    implications en diagnostic et traitement méritent un
    approfondissement clinique (palpation, choix de points).
  - >
    Le double statut de la VB (Fu + Qi Heng Zhi Fu) soulève
    la question de son traitement : quand traiter la VB comme
    Fu (transit bile) et quand la traiter comme Fu extraordinaire
    (thésaurisation) ?
  - >
    Les relations F-Rte (Bois chevauche Terre) et F-R (mère-fils
    en pathologie) sont esquissées mais pas complètement articulées
    avec les cycles 5E pathologiques de PVII t4.

lacunes_critiques:
  - Estomac (E) = Fou de la Terre, pas encore traité individuellement
  - Triple Réchauffeur (TR) = Fou du Feu Ministre, pas encore traité
  - Maître du Cœur (MC) physiologie séminaire = pas dans ce tome
  - Méridiens individuels détaillés = CP méridiens
  - Sentiments détaillés par organe = P VIII
  - Cas cliniques complets avec raisonnement intégral = modules avancés
  - Pouls complets (28 pouls chinois) = module dédié

