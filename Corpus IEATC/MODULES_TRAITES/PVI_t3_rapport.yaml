  - chemin: LEXIQUE/lexique_termes_ieatc.yaml
    ajouts: >
      ~20 nouveaux termes : MAN, SHI_plenitude, Qi_Heng_Zhi_Fu,
      Cinq_Troncs_Enracinement, Bian_Hua, Chuan_Dao, You_Men,
      Lan_Men, Xiao_Xin, JIE_articulation, QING_SU, Qi_Hua,
      Jing_Wei, Zao_Po, XIE_ecoulement, JUE_flechissement,
      ZHONG_ZHENG, Feu_du_vide.
  - chemin: _SYSTEME/00_arbres_decision.yaml
    ajouts: >
      3 nouveaux arbres de décision :
      arbre_11_diarrhees (6 tableaux différentiels),
      arbre_12_hypertension (2 tableaux différentiels),
      arbre_13_surdites (vide/plein, 6 causes, 6 formules).
  - chemin: _SYSTEME/00_philosophie_clinique.yaml
    ajouts: >
      9 nouvelles sections philosophiques : man_shi_et_decret_celeste,
      bande_de_moebius_et_retournement, homme_transformateur_energie,
      saveurs_texture_pas_gout, orifices_communication_bidirectionnelle,
      diarrhees_six_mecanismes, surdites_psychisme_et_organes_sens,
      clarifier_feu_du_vide, et une section sur la physiologie
      dialoguée comme méthode d'enseignement CLM.

