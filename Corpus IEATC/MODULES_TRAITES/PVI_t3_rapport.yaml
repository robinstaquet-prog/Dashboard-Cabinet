# RAPPORT D'INTÉGRATION — PVI SÉMINAIRES CLM TOME 3
# Date : 2026-04-06

meta:
  polycopie: EEA_3e.pdf
  titre: Polycopié VI — Séminaires CLM — Physiologie Tsang/Fou tome 3
  sous_titre: >
    Transcriptions des séminaires du Centre de Langues et Médecines (1982-83).
    Dr Schatz, Elisabeth Rochas de la Vallée, Jean-Louis Blard.
    Physiologie approfondie des Tsang et Fou, Fu extraordinaires,
    pathologies cliniques (diarrhées, hypertension, surdités).
  auteurs:
    - Dr_Jean_Schatz
    - Elisabeth_Rochas_de_la_Vallee
    - Jean-Louis_Blard
  dates_seminaires: 1982-1983
  pages: 85
  module: VI_Seminaires_CLM_tome_3
  niveau: fondateur_philosophique_et_clinique
  prerequis: PVI_t1_t2_et_PVII_t1_t2_t3_t4_deja_integres
  note_format: >
    Format séminaire dialogué, PAS un polycopié Bollet standard.
    Discours libre entre 3 intervenants avec citations Su Wen et
    Ling Shu. Richesse philosophique exceptionnelle, langage moins
    structuré mais plus profond que les polycopiés classiques.

fichiers_crees:
  - chemin: THEORIE/tsang_fou_physiologie_t3_seminaire.yaml
    contenu: >
      Fichier fondateur du séminaire. Fondements Tsang/Fou (MAN/SHI
      distinction plein/plénitude, BIAO/LI extérieur/intérieur,
      nombres 5/6), Ciel Antérieur/Postérieur (unité primitive,
      schéma CA/CP, analogie ADN/ARN), Fu extraordinaires (Qi Heng
      Zhi Fu : cerveau, moelles, os, vaisseaux, VB, utérus — tous
      thésaurisent sans évacuer), cinq troncs d'enracinement
      (C=vie, P=Souffles, R=thésaurisé, F=muscles, Rte=granges),
      circulation des énergies (Su Wen chap. 21), Petit Cœur
      (Xiao Xin = Ming Men), règle Maître/Invité (ZHU/KÉ).
  - chemin: ZANG_FU/gros_intestin.yaml
    contenu: >
      Premier fichier Fou individuel du corpus. Métal, couplé au
      Poumon. Anatomie (intestin tournant/droit, Lan Men/Po Men),
      fonctions (Bian Hua transformation, Chuan Dao transmission,
      réabsorption liquides Jin), diagnostic (nez, peau, transit),
      tableaux vide froid/plein chaud, relation Poumon (BIAO/LI).
  - chemin: ZANG_FU/intestin_grele.yaml
    contenu: >
      Fou Feu, couplé au Cœur. Anatomie (You Men pylore, Lan Men
      valvule), fonctions (recevoir/plénifier, séparation clair/
      trouble, extraction Jing Wei, liquides Yé), relation Cœur
      (BIAO/LI, pathologie croisée sueur=sang), diagnostic.
  - chemin: ZANG_FU/vesicule_biliaire.yaml
    contenu: >
      Fou Bois, couplé au Foie. DOUBLE STATUT : Fu ordinaire ET
      Qi Heng Zhi Fu (thésaurise la bile claire sans évacuer de
      résidu). Fonctions (rectitude médiane ZHONG ZHENG, décision
      Su Wen chap. 9, bile claire et limpide), relation Foie,
      relation oreille (Shao Yang = oreille moyenne), pathologie.
  - chemin: ZANG_FU/vessie.yaml
    contenu: >
      Fou Eau, couplée au Rein. Plus grand méridien (67 points).
      Fonctions (divisions territoriales des Souffles, amasser/
      excréter liquides, Qi Hua transformation, re-tri final),
      union R/V (inséparables, Eau de l'Eau), pathologie
      (plénitude R/V, vide R/V avec JUE fléchissement).
  - chemin: CLINIQUE/pathologies_diarrhees.yaml
    contenu: >
      6 tableaux cliniques complets avec symptômes et traitements.
      T1: Froid attaque Rte/E (V25 moxa, E25, VC12, VC6).
      T2: Chaleur Yang Ming (GI4, E44 t, VC10).
      T3: Humidité attaque Rte/E (VC9 moxa, Rte9, Rte4 d, V20 t).
      T4: Alimentation désordonnée (VC21, E36, V21, V25, VC12 d).
      T5: Bois chevauche Terre (V20 t, V21 t, E36 t, F3 d, F2 d).
      T6: Yang Ming Men décroît (VG4, V23, VC4, VG20 moxa, V20 t).
  - chemin: CLINIQUE/pathologies_hypertension.yaml
    contenu: >
      2 tableaux cliniques + relations inter-organes (C-F, F-R, F-Rte).
      T1: Vide Yin/Prospérité Yang (R3 t, V23 t, V15 t, F2 d, F3 d).
      T2: Feu phlegme/vent Yang (E40 d, VC12 d, F2 d, V18 d, MC7 d).
  - chemin: CLINIQUE/pathologies_oreille.yaml
    contenu: >
      Surdités et bourdonnements d'oreille. Différenciation vide/plein.
      3 zones : R=interne, Shao Yang=moyenne, Tai Yang=externe.
      6 causes : excitations externes, fermeture Souffles, feu phlegme,
      feu Foie, affaiblissement Souffles, vide Rein.
      6 formules de traitement avec points spécifiques pour chaque cause.
  total: 8

