  - chemin: ZANG_FU/coeur.yaml
    ajouts: >
      enrichissement_seminaire_t3 : terminologie hiérarchique complète
      (DI/WANG/JUN/XIANG/ZHU/ZAI/KE), souverain maître (Shen Ming,
      Jing Shen), décentralisation (règne sans gouverner), Xue Mo
      (diagnostic visage), relation œil (messager), relation oreille,
      sueur = Yé du Cœur (interdiction saignée + sudorification).
  - chemin: ZANG_FU/foie.yaml
    ajouts: >
      enrichissement_seminaire_t3 : Général des Armées (GAN bouclier),
