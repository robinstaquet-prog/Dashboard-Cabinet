    attend: [P_XI_Psychisme, P_VI_Tsang_Fou]
    contenu_prevu:

# ─────────────────────────────────────────────────
# RÈGLE ABSOLUE — NIVEAUX ET POINTS DE TRAITEMENT
# Intégrée session PVI t1
# ─────────────────────────────────────────────────

regle_absolue_niveaux_traitement:
  # Source : PVI-t1 — Bollet — RÈGLE FONDAMENTALE
  # Erreur la plus grave en acupuncture IEATC selon Bollet

  enonce: >
    Un même organe a des fonctions différentes selon la
    grille de lecture utilisée. Les points qui traitent
    ces fonctions NE SONT PAS interchangeables.
    Traiter avec les points d'un niveau pour un problème
    d'un autre niveau = traitement inefficace ou aggravant.

  les_niveaux:
    niveau_TT_meridiens_principaux:
      traite: circulation_iong_dans_les_merid_et_teguments
      points: points_des_12_TT
      ne_traite_pas: fonctions_organiques_profondes
      ne_traite_pas_2: fonctions_constitutionnelles_ancestrales

    niveau_trois_foyers:
      traite: fonctions_organiques_globales_par_etage
      points: iu_dos_et_mo_principalement
      ne_traite_pas: circulation_superficielle_TK
      ne_traite_pas_2: constitution_ancestrale

    niveau_cinq_elements:
      traite: relations_inter_organes_cycles_Sheng_Ke
      points: points_Ting_Iong_Iu_King_Ro_selon_element
      ne_traite_pas: surface_et_peau
      ne_traite_pas_2: directement_constitution_ancestrale

    niveau_grands_meridiens:
      traite: protection_et_equilibre_climatique
      points: points_Penn_et_Mere_Fils_des_GM
      ne_traite_pas: fonctions_organiques_profondes
      ne_traite_pas_2: constitution_ancestrale

    niveau_merveilleux_vaisseaux:
      traite: constitution_ancestrale_et_heredite
      points: points_des_8_MV_avec_points_cles
      ne_traite_pas: circulation_energetique_courante
      ne_traite_pas_2: climatique_superficiel

  exemple_erreur_type: >
    Traiter un vide profond de Rein (niveau ancestral)
    uniquement par les TT du Rein → inefficace.
    → Il faut les MV (Tchrong Mo, TM, JM selon le cas).

  exemple_erreur_type_2: >
    Traiter une pathologie climatique (froid/humidité)
    avec des points Iu dos / Mo → inefficace.
    → Il faut les GM (Grands Méridiens correspondants).

  critere_choix_niveau: >
    1. Lire le signe dominant (voir arbre_1)
    2. Identifier le niveau de la pathologie
    3. Choisir les points du BON niveau
    4. Ne jamais mélanger les niveaux sans intention précise

  source: PVI-t1-regle_fondamentale

# ─────────────────────────────────────────────────
# ARBRE 7 — TSANG / FOU : QUI TRAITER EN PREMIER ?
# ─────────────────────────────────────────────────

arbre_7_tsang_fou_priorite:

  regle_generale:
    vide_tsang_ou_vide_fou:
      observation_statistique: >
        Le vide du Tsang est beaucoup plus fréquent que
        le vide du Fou (Q004 — en attente de confirmation
        comme règle systématique ou simple observation).
      par_defaut: chercher_vide_tsang_en_premier
      source: PVI-t1

  criteres_vide_tsang:
    - fatigue_profonde_et_durable
    - symptômes_chroniques_anciens
    - terrain_constitutionnel_fragilise
    - pouls_profond_vide
    - zones_peripheriques_deficientes

  criteres_vide_fou:
    - symptômes_apparus_apres_surmenage_fonctionnel
    - signes_d_encombrement_ou_surcharge
    - plenitude_dans_le_FOU_precedant_le_vide
    - evolution_recente_quelques_jours_semaines

  si_vide_tsang_confirme:
    traitement_prioritaire: tonifier_le_tsang_en_cause
    points: mo_du_tsang_en_t_et_iu_dos_chauffe_en_t
    attention: >
      Ne pas disperser le Fou correspondant si le Tsang
      est en vide — cela aggraverait le vide.

  si_vide_fou_confirme:
    traitement_prioritaire: stimuler_le_fou_en_cause
    points: >
      Méridien du Fou correspondant, points selon
      la nature du blocage (plénitude → disperser d'abord)
    attention: >
      Vérifier que le Tsang couplé n'est pas en vide
      avant de traiter le Fou seul.

  si_vide_tsang_et_fou_simultanes:
    principe: >
      Traiter le Tsang en premier (tonifier).
      Le Fou se régénère secondairement quand
      le Tsang peut lui fournir l'énergie nécessaire.
    source: PVI-t1

# ══════════════════════════════════════════════════════
# ARBRE 8 — DIAGNOSTIC PAR PALPATION ABDOMINALE
# Source : PVII-t4-p71_76
# ══════════════════════════════════════════════════════

arbre_8_palpation_abdominale:
  description: >
    Arbre de diagnostic par palpation des 6 zones abdominales.
    Chaque zone correspond à un élément. Tension/douleur = blocage.
    Déblocage par point Su spécifique en dispersion.

  etape_1_palper_6_zones:
    Metal_flanc_droit:
      localisation: entre_25E_et_15Rte_droite
      si_bloque: disperser_5P_ou_5P_prime_d
      Hong_Kong: creux_sous_claviculaire_1P_peau_seche_molle_egale_vide
    Bois_flanc_gauche:
      localisation: entre_25E_et_15Rte_gauche
      si_bloque: disperser_2F_ou_3F_d
    Terre_centre:
      localisation: nombril
      si_bloque: disperser_5Rte_d
    Terre_digestive:
      localisation: sus_ombilicale
      si_bloque: disperser_6Rte_d
    Feu_sous_sternum:
      localisation: 14JM_partage_C_et_MC
      si_bloque: disperser_7C_d_ou_7MC_d
    Eau_sous_nombril:
      localisation: 4_a_6JM
      si_bloque: disperser_5R_d

  etape_2_zones_speciales:
    pouls_Chu_Li:
      localisation: sous_sein_gauche
      battements_forts_visibles: Chen_epuise_signe_grave
      douleur_coup_poignard: spasme_diaphragme_traiter_6MC_t
    zone_Hong_Kong_Rein:
      localisation: sous_ombilicale_25VB
      pulsations_paisibles_4_5_par_resp: bonne_energie
      froide_sans_pulsation: reins_vides
      chaude_pulsations_faibles: vide_Yin
    aorte_abdominale:
      pulsations_sous_ombilic: vide_Eau_vide_Rein
      montre: energie_Tchrong_Mo

  etape_3_interpretation:
    une_seule_zone_bloquee: pathologie_locale_element_concerne
    plusieurs_zones: >
      Chercher le schéma cyclique (Tcheng, Ko, Raé).
      Ex : Bois + Feu bloqués = excès Bois envahit Feu.
      Ex : Terre + Eau bloquées = vérifier Rate-Rein.
    toutes_zones_tendues: epuisement_general_verifier_ancestrale

  source: PVII-t4-p71_76

# ══════════════════════════════════════════════════════
# ARBRE 9 — 5 MALADIES MMM ET ORIENTATION TRAITEMENT
# Source : PVII-t4-p37_54
# ══════════════════════════════════════════════════════

arbre_9_cinq_maladies_MMM:
  description: >
    Arbre de classification des 5 types de maladie selon
    la relation entre saison d'apparition et organe atteint.
    Oriente le choix thérapeutique et évalue la gravité.

  etape_1_identifier_organe_et_saison:
    question: quel_organe_est_atteint_et_en_quelle_saison
    correspondances:
      Bois_Foie: printemps
      Feu_Coeur: ete
      Terre_Rate: 5eme_saison
      Metal_Poumon: automne
      Eau_Rein: hiver

  etape_2_classifier_maladie:
    si_organe_atteint_dans_sa_propre_saison:
      type: maladie_veritable
      gravite: favorable_si_traite
      traitement: point_Penn_de_l_element
    si_organe_atteint_en_saison_de_sa_Mere:
      type: maladie_de_vide
      gravite: moderee
      traitement: tonifier_Mere_point_Mere_du_meridien_fils
    si_organe_atteint_en_saison_de_son_Fils:
      type: maladie_de_plenitude
      gravite: moderee
      traitement: disperser_Fils_point_Fils_du_meridien_mere
    si_organe_atteint_en_saison_de_son_Ennemi:
      type: maladie_de_victoire
      gravite: pas_grave_mais_recidive_possible
      traitement: disperser_attaquant_dans_attaque_cycle_Ko
    si_organe_atteint_en_saison_de_son_Conseiller:
      type: maladie_de_defaite
      gravite: GRAVE_depassement_ressources
      traitement: renforcer_attaque_en_urgence

  etape_3_verifier_Ko_et_Rae:
    double_regle_Ko:
      condition: grand_mere_forte_ET_petit_fils_faible
      resultat: attaque_Ko_classique
    cycle_Rae:
      condition: domine_se_revolte_contre_dominant
      resultat: inversion_Ko_gravite_elevee
      signe: element_normalement_domine_devient_attaquant

  etape_4_So_Ouen_plenitude:
    principe: >
      Un élément en plénitude attaque TOUJOURS 2 éléments :
      son Ennemi (Ko direct) ET son Conseiller (Ko inverse/Raé).
    traitement: disperser_point_Fils_des_3_elements_bloques
    exemple_Feu_en_exces: >
      Feu attaque Métal (Ko) + Eau (Raé).
      Disperser : 7C d (Fils Feu) + 5P d (Fils Métal) + 1R d (Fils Eau).

  source: PVII-t4-p37_54

# ══════════════════════════════════════════════════════
# ARBRE 10 — INTERROGATOIRE TCHI VIDE/PLENITUDE
# Source : PVII-t4-p64_70
# ══════════════════════════════════════════════════════

arbre_10_interrogatoire_tchi:
  description: >
    Arbre d'interrogatoire systématique pour déterminer
    l'état vide ou plénitude de chaque élément.

  principe_general:
    vide: recherche_saveur_propre_ameliore_en_saison_propre
    plenitude: deteste_saveur_propre_aggrave_en_saison_propre

  par_element:
    Bois:
      saveur: acide
      plenitude: deteste_acide_colere_violente_cephalees_yeux_rouges_aggrave_printemps
      vide: recherche_acide_indecis_timide_yeux_fatigues_ameliore_printemps
    Feu:
      saveur: amer
      plenitude: deteste_amer_excite_rit_trop_sue_hypertension_aggrave_ete
      vide: recherche_amer_triste_renferme_hypotension_ameliore_ete_teint_pale
    Terre:
      saveur: doux
      plenitude: deteste_sucre_soucieux_idees_fixes_passeiste_chair_contracturee
      vide: recherche_sucre_insouciant_tete_vide_dyslexie_temporelle_chair_flasque
    Metal:
      saveur: piquant
      plenitude: deteste_piquant_tres_triste_crache_trop_energie_aggrave_automne
      vide: adore_piquant_peu_triste_pas_assez_energie_ameliore_automne
    Eau:
      saveur: sale
      plenitude: deteste_sale_temeraire_trop_volontaire_aggrave_hiver_autoritaire
      vide: recherche_sale_peureux_pas_volonte_ameliore_hiver_indecision

  source: PVII-t4-p64_70

# =============================================================================
# ARBRE 11 — DIARRHÉES : 6 TABLEAUX DIFFÉRENTIELS
# Source : PVI-t3 (séminaire Schatz)
# =============================================================================

arbre_11_diarrhees:
  description: >
    Arbre de décision pour les diarrhées (XIE XIE). 6 tableaux cliniques
    différenciés par leur mécanisme pathogénique, avec symptômes et traitements.
  entree: patient_avec_diarrhees
  etapes:
    1_evaluer_temperature:
      froid: >
        Matières claires et froides, excrements de canard, ni malaise ni soif,
        urines claires → Tableau 1 (Froid attaque Rte/E)
        Traitement : V25 moxa, E25, VC12, VC6
      chaleur: >
        Excrements jaunes/rouges/chauds, anus brûlant, langue jaune, pouls rapide,
        bouche sèche → Tableau 2 (Chaleur Yang Ming)
        Traitement : GI4, E44 t, VC10
    2_evaluer_humidite:
      si_humidite: >
        Ventre non douloureux, langue blanche et grasse, pouls imbibé/relâché,
        gros besoin semi-liquide → Tableau 3 (Humidité attaque Rte/E)
        Traitement : VC9 moxa, Rte9, Rte4 d, V20 t
    3_evaluer_alimentation:
      si_desordre_alimentaire: >
        Ventre douloureux, envie d'aller aux WC et douleur moindre après,
        poussées sales, gaz → Tableau 4 (Alimentation désordonnée)
        Traitement : VC21, E36, V21, V25, VC12 d
    4_evaluer_cycles:
      si_bois_chevauche_terre: >
        Intestins gargouillant, digestion ne se fait pas, aliments non digérés
        → Tableau 5 (Bois chevauche Terre, cycle de mépris)
        Traitement : V20 t, V21 t, E36 t, F3 d, F2 d
    5_evaluer_ming_men:
      si_diarrhees_petit_matin: >
        Diarrhées à l'aube, visage noir, Shen fatigués, pouls submergé/profond/fin,
        diarrhées qui traînent → Tableau 6 (Yang de Ming Men décroît)
        Traitement : VG4, V23, VC4, VG20 moxa, V20 t
  source: PVI-t3-p42_46

# =============================================================================
# ARBRE 12 — HYPERTENSION : 2 TABLEAUX
# Source : PVI-t3 (séminaire Schatz)
# =============================================================================

arbre_12_hypertension:
  description: >
    Arbre de décision pour l'hypertension en MTC. 2 tableaux : vide et plein.
    Symptômes communs : maux de tête, tête tourne, bourdonnements, insomnies,
    palpitations, visage rouge, pouls en corde d'arc.
  entree: patient_hypertendu
  etapes:
    1_evaluer_vide_plein:
      vide_Yin: >
        Corps amaigri, Shen malades, vue trouble, palpitations, insomnies.
        Cause : Eau ne contient pas Bois, sang ne nourrit pas F.
        → Tableau 1 : R3 t, V23 t, V15 t, F2 d, F3 d
      plein_phlegme: >
        Mange gras/sucré, violentes colères, phlegme, feu du F monte.
        Cause : humidité → phlegme → feu → vent.
        → Tableau 2 : E40 d, VC12 d, F2 d, V18 d, MC7 d
  source: PVI-t3-p61_63

# =============================================================================
# ARBRE 13 — SURDITÉS ET BOURDONNEMENTS : VIDE / PLEIN
# Source : PVI-t3 (séminaire Schatz)
# =============================================================================

arbre_13_surdites:
  description: >
    Arbre de décision pour surdités et bourdonnements d'oreille.
    Anatomie : R = oreille interne, Shao Yang = oreille moyenne, Tai Yang = oreille externe.
  entree: patient_avec_surdite_ou_bourdonnements
  etapes:
    1_evaluer_apparition:
      brusque: probable_plein
      progressive: probable_vide
    2_si_plein:
      caractere_son: croassements_flux_reflux_bruits_violents
      symptomes: tete_lourde_nez_bouche_bouche_amere_cotes_douloureuses
      causes:
        vent_pervers: >
          Douleurs tête, nez bouché, gorge sèche
          → TR5 d, P7 d, GI4 d, VB20 d, TR17 d
        fermeture_souffles_emotionnelle: >
          Colères, chagrin, peur soudaine → surdité brusque
          → VB2 d, IG12 d, TR17 d, TR3 d, TR21 d
        feu_phlegme: >
          Alimentation riche/grasse, P bloqué
          → E40 d, GI4 d, MC7 d, MC6 d, TR3 d, VB2 d
        feu_foie: >
          Vertiges, éblouissements, colère, palpitations
          → F2 d, F3 d, VB43 d, VB2 d, R3 t (droite pour Yin)
    3_si_vide:
      caractere_son: cigale_flute_continuels_tenus
      symptomes: bourdonnements_intermittents_aggrave_fatigue_lombalgies
      causes:
        affaiblissement_souffles: >
          Fatigue E/Rte, visage terne
          → VG20 t, E36 t, VC6 t
        vide_reins: >
          Confusion, douleurs lombaires, spermatorrhée
          → V23 t, VC4 t, R3 t
      traitement_general_vide: >
        Tonifier F et R + moxas : 23VB t, 4VG t, 3R t, 6Rte t, 2F t
        Clarifier Feu du vide : agir sur le fils (F) pour soigner la cause (R)
  source: PVI-t3-p79_85

# ─── Arbres ajoutés PVI EEA t1 (séminaire CLM déc. 1981) ──────

arbre_14_identification_energies_hereditaires:
  question_initiale: >
    Quel mécanisme énergétique est en jeu : C.A. ou C.P. ?
  etape_1_code_gauche_droite:
    question: Le patient parle-t-il de symptômes liés à la constitution ou à l'acquis ?
    si_constitution: >
      Penser C.A. → Yuan Qi et Jing Qi du C.A.
      Code : « à gauche le Rein, à droite Ming Men » (Nan Jing 36)
      Pôles : Yin originel (Eau) et Yang originel (Feu)
    si_acquis: >
      Penser C.P. → Zong Qi et Jing Qi du C.P.
      Lieu : Tan Zhong 17VC (mer des Souffles)
      Transmission : Xu Li (grand Lo de l'Estomac)
  etape_2_voie_energetique:
    question: Le trouble est-il centrifuge ou centripète ?
    centrifuge: >
      Voie Ming Men → 3 Réchauffeurs → Organes.
      Énergie innée, constitutionnelle. Yuan Qi.
      Traitement par les MV si profond.
    centripete: >
      Voie extérieur → Points Su → Organes.
      Énergie acquise, saisonnière. Jing du C.P.
      Traitement par les 5 éléments et points Su.
  etape_3_trois_rechauffeurs:
    RS: Zong_Qi (ancestrale, habitudes, lignée)
    RM: Jing_Qi + Iong (nutrition, sang)
    RI: Oé (défense)
  source: PVI-EEA-t1-p34_52

arbre_15_cinq_shen_diagnostic:
  question_initiale: >
    Quel Shen est perturbé chez le patient ?
  etape_1_groupe:
    question: Perturbation du groupe supérieur ou inférieur ?
    superieur_Shen_Hun_Po:
      Shen_perturbe: >
        Éclatement, folie, perte de coordination. Le Cœur
        ne commande plus les Shen Ming. Perte de discernement.
        → Traiter le Cœur (Feu)
      Hun_perturbe: >
        Projection excessive, colère, raptus, tourné vers l'avoir,
        rêves désordonnés, imaginations débridées.
        → Traiter le Foie (Bois)
      Po_perturbe: >
        Manque d'allant, énergie faible, instincts émoussés,
        perte de la « mémoire du futur ».
        → Traiter le Poumon (Métal)
    inferieur_Yi_Zhi:
      Yi_perturbe: >
        Obsession, régurgitation mentale, retour vers le passé,
        discours intérieur en boucle.
        → Traiter la Rate (Terre)
      Zhi_perturbe: >
        Perte de volonté, pas de direction, pas d'allant vers le futur,
        vouloir-vivre déficient.
        → Traiter le Rein (Eau)
  etape_2_relations_5E: >
    Les 5 Shen interagissent selon les cycles Tcheng et Ko.
    Excès de Hun (Bois) peut envahir Yi (Terre) par le Ko.
    Vide de Zhi (Eau) peut affaiblir Hun (Bois) par le Tcheng.
    Toujours vérifier l'élément Mère et l'élément Fils.
  source: PVI-EEA-t1-p56_63

# ─── Arbre 16 : Constipations — diagnostic différentiel ──────

arbre_16_constipations:
  description: >
    Différencier les 6 types de constipation selon les mécanismes
    énergétiques (plein vs vide) et choisir le traitement adapté.
  etape_1_plein_ou_vide:
    question: Constipation par plein ou par vide ?
    plein:
      signes: >
        Énergie perverse externe, chaleur, vent, excès
        alimentaire. Transit contrarié par un agent actif.
      aller_etape_2_plein: oui
    vide:
      signes: >
        Insuffisance du terrain. Yang insuffisant ou Yin
        asséché. Pas d'agent pervers mais manque de force.
      aller_etape_3_vide: oui
  etape_2_plein_4_tableaux:
    chaleur: >
      Intestin/E chaud par entassement. Haleine fétide, envie
      de boire frais, selles compactes. Jin desséchés.
      → R.6 t, F.1 d, GI.4 d
    souffles: >
      Cause psychique (soucieux, oppressé). Ventre alternance
      gonflé/diminué, côtes enflées, oppression. Foie bloqué.
      → VC.4, Rte.6 moxa
    vent: >
      Fong + sec au P, transmis au GI. Toux sèche, pharynx
      douloureux, ongles secs, peau sèche.
      → V.12, VG.16, V.25 d
    aliments: >
      Indigestion, excès alimentaire. Renvois, côtes pressées.
      Rte/E en panne.
      → VC.12, E.36 d
  etape_3_vide_2_tableaux:
    vide_yang_froid: >
      Yang insuffisant, Yin congelé. RI vide et froid.
      Parésie des liquides, tout est figé.
      → V.17 t, V.18 t, E.25 t
    vide_yin: >
      Jing Yé anéantis (après maladie ou constitution).
      Xing et sang desséchés. Souffles des Fu flétris
      comme du bois mort.
      → Nourrir le Yin (R.6 t, Rte.6 t, VC.4 t)
  points_communs_tous: E.44_E.25_V.25_Rte.15_dispersion
  source: PVI-EEA-t2-p26_31

# ─── Arbre 17 : Jin Yé — identification du déséquilibre ──────

arbre_17_jin_ye:
  description: >
    Différencier un trouble des Jin (liquides clairs, Yang,
    extérieur) d'un trouble des Yé (liquides profonds, Yin,
    intérieur) pour orienter le traitement.
  etape_1:
    question: Le trouble est-il des Jin ou des Yé ?
    jin_atteints:
      signes: >
        Peau sèche, chairs amaigries, transpiration perturbée,
        urines anormales, soif. Surface et extérieur atteints.
      organes: GI_commande_Jin_P_Wei_peau
      circuit: Suivent_Wei_Qi_3_Rechauffeurs
      traitement: >
        Traiter le GI, le P, la surface. Humidifier les chairs.
        Vérifier le mécanisme des 3 Réchauffeurs (brouillard/
        macération/canal).
    ye_atteints:
      signes: >
        Articulations raides, os fragiles, yeux secs, vertiges,
        troubles cognitifs (cerveau), moelles atteintes. Profondeur
        et intérieur atteints.
      organes: IG_commande_Ye_R_moelles_cerveau
      circuit: Suivent_Yong_Qi_meridiens_principaux
      traitement: >
        Traiter l'IG, le R, la profondeur. Nourrir le Yin profond.
        Les Yé qui montent au cerveau sont capitaux (vertiges,
        troubles mémoire/concentration).
  source: PVI-EEA-t2-p14_19

arbre_18_double_cause_symptome:
  nom: Diagnostic_différentiel_Yin_Yang_un_symptôme_deux_causes
  declencheur: >
    Un symptôme quelconque se présente (fièvre, frilosité,
    rhumatismes, œdèmes, sécheresse, etc.)
  principe: >
    TOUT symptôme en MTC peut avoir DEUX causes opposées.
    C'est le fondement absolu du diagnostic différentiel.
    Seul le POULS indique la nature du déséquilibre.
  etapes:
    1_identifier_couple:
      question: Ce symptôme relève de quel couple physiologique ?
      couples:
        thermique: froid_vs_chaleur
        hydrique: humidite_vs_secheresse
        dynamique: fong_vs_feu
    2_deux_hypotheses:
      hypothese_A: >
        EXCÈS du facteur en cause (ex: trop de chaleur → fièvre).
        = Plénitude. Traitement par dispersion de l'excès.
      hypothese_B: >
        INSUFFISANCE du facteur opposé (ex: pas assez de
        refroidissement → fièvre). = Vide. Traitement par
        tonification du déficient.
    3_discrimination:
      methode: prise_de_pouls_OBLIGATOIRE
      alerte: >
        MÊME résultante, MÊME symptôme, DEUX traitements
        DIFFÉRENTS. Traiter à l'inverse = aggraver.
  exemples:
    fievre:
      cause_exces: trop_de_chaleur_Yang_en_exces_disperser
      cause_vide: pas_assez_de_refroidissement_Yin_insuffisant_tonifier
    frilosite:
      cause_exces: trop_de_froid_Yin_en_exces_disperser
      cause_vide: pas_assez_de_rechauffement_Yang_insuffisant_tonifier
    rhumatismes_humides:
      cause_exces: trop_humidite_dans_corps
      cause_vide: insuffisance_assechement_sudation_respiration_Poumon
    oedemes:
      cause_exces: exces_humidification
      cause_vide: insuffisance_drainage_assechement
  source: PIV-YY-t2-p28_30

arbre_19_axe_fort_faible:
  nom: Diagnostic_par_axe_fort_faible_du_corps
  declencheur: >
    Symptômes latéralisés ou asymétriques entre gauche/droite
    ou haut/bas du corps.
  principe: >
    Le corps a deux axes énergétiques (So Ouen) :
    Axe fort = haut-gauche (YY) → bas-droite (YinYin).
    Axe faible = haut-droite (YinY) → bas-gauche (YYin).
  etapes:
    1_localiser:
      question: Le symptôme est localisé dans quel cadran ?
      cadrans:
        sup_gauche: Yang_du_Yang_axe_fort
        sup_droit: Yin_du_Yang_axe_faible
        inf_droit: Yin_du_Yin_axe_fort
        inf_gauche: Yang_du_Yin_axe_faible
        centre: bipolaire_equilibre_foyer_moyen
    2_qualifier:
      axe_fort_atteint: >
        Pathologie sur l'axe fort = déséquilibre majeur
        (les cadrans les plus polarisés sont touchés).
      axe_faible_atteint: >
        Pathologie sur l'axe faible = déséquilibre mineur
        mais plus insidieux (polarité mixte).
  note: >
    Les pathologies détaillées sont désormais intégrées dans CP I
    (Cours pratique 1 — PIV YY tomes 4-5). Voir arbre 20.
  source: PIV-YY-t2-p27

# ══════════════════════════════════════════════════════
# ARBRE 20 — BILAN YIN/YANG COMPLET (CP I)
# Source : PIV-YY-t4-p6_52 + PIV-YY-t5-p3_55
# ══════════════════════════════════════════════════════

arbre_20_bilan_yin_yang_complet:
  description: >
    Arbre maître du bilan Yin/Yang IEATC. Séquence complète
    de la première consultation au traitement. Synthèse du
    Cours Pratique I (CP I).

  etape_1_interrogatoire_8_regles:
    principe: >
      Classer CHAQUE signe du patient dans les 8 règles:
      Yang (chaud, plein, externe, Yang) vs Yin (froid, vide, interne, Yin).
      Totaliser: majorité Yang ou Yin → orientation générale.
    tableaux_reference: DIAGNOSTIC/bilan_yin_yang.yaml
    source: PIV-YY-t4-p6_16

  etape_2_pouls_chinois:
    4_principes:
      1er: gauche_Yang_droite_Yin
      2eme: superficie_Yang_profondeur_Yin
      3eme: 3_secteurs_I_FS_II_FM_III_FI
      4eme: 6_energies_par_niveau
    alerte: >
      Si pouls et questionnaire contradictoires → BLOCAGE YY.
      Traiter d'abord le blocage (27TM d + 24JM d) avant
      tout bilan. Complémentaires selon nature du blocage.
    source: PIV-YY-t4-p17_36

  etape_3_bilan_4_combinaisons:
    regle: local_en_premier_general_en_second
    combinaisons:
      YY:
        description: Yang_local_Yang_general_exces_Yang_partout
        traitement_I_Sou_Jen: 20TM_d_14TM_d_12JM_d
      Y_Yin:
        description: Yang_local_Yin_general_Yang_bloque_en_haut
        traitement_I_Sou_Jen: 4GI_t_12JM_t_36E_t
      Yin_Y:
        description: Yin_local_Yang_general_vide_local
        traitement_I_Sou_Jen: 6Rte_t_6JM_t_6MC_t
      Yin_Yin:
        description: Yin_local_Yin_general_exces_Yin_partout
        traitement_I_Sou_Jen: 6Rte_d_6JM_d_6MC_d
    source: PIV-YY-t4-p37_42

  etape_4_methode_Siao_Tse:
    regle: croiser_avec_niveau_anatomique
    niveaux:
      1_peau_poils: points_Ting
      2_muscles_superficiels: points_Iong
      3_muscles_profonds_articulations: points_King
      4_organes_visceres: points_Ro_via_Tching_Pie
    croisement_saison: >
      Chaque saison active un type de point Su.
      Printemps/Bois = Ting Yin ou Iu Yang.
      Été/Feu = Iong Yin ou Iuann Yang.
      5ème saison/Terre = Iu Yin ou King Yang.
      Automne/Métal = King Yin ou Ro Yang.
      Hiver/Eau = Ro Yin ou Ting Yang.
    source: PIV-YY-t4-p43_48

  etape_5_protocole_4_temps:
    sequence_obligatoire:
      1: Yin_Yang_orientation_generale
      2: 5_Elements_nature_energie
      3: Vide_Plenitude_quantite
      4: Froid_Chaleur_qualite_thermique
    regle: ne_jamais_sauter_ni_inverser
    source: PIV-YY-t4-p49_52

  etape_6_premiere_seance:
    les_8_etapes:
      1: poser_bilan_YY_et_5E
      2: choisir_cote_traitement
      3: choisir_meridien_premier
      4: tonifier_ou_disperser
      5: determiner_points_generaux
      6: determiner_points_locaux
      7: duree_aiguilles_15_a_20_min
      8: verifier_pouls_fin_seance
    source: PIV-YY-t5-p3_21

  cas_particulier_yang_yin_apparents:
    yang_apparent:
      mecanisme: vide_Yin_sous_jacent_Yang_deborde
      erreur: disperser_Yang_aggrave_le_vide_Yin
      traitement: tonifier_Yin
    yin_apparent:
      mecanisme: vide_Yang_sous_jacent_Yin_stagne
      erreur: disperser_Yin_aggrave_le_vide_Yang
      traitement: tonifier_Yang
    detection: >
      Si traitement standard (I Sou Jen) n'a aucun effet
      après 2-3 séances → suspecter un apparent.
      Vérifier la cohérence pouls/symptômes.
    source: PIV-YY-t4-p22_24

  source: PIV-YY-t4_t5

# ══════════════════════════════════════════════════════
# ARBRE 21 — ZONES DE BLOCAGE PAR MÉRIDIEN
# Source : PIV-YY-t5-p22_31
# ══════════════════════════════════════════════════════

arbre_21_zones_blocage:
  description: >
    Arbre de diagnostic et traitement des zones de blocage
    énergétique le long des méridiens. Palpation systématique.
    Technique: tonifier en aval, disperser en amont.

  Rate_5_zones:
    zone_1: cheville_interne
    zone_2: genou_interne
    zone_3: mi_cuisse
    zone_4: pli_aine
    zone_5: emotionnel_21Rte_Ta_Pao
    alerte_6Rte: >
      JAMAIS disperser 6Rte si antécédents hémorragiques.
      6Rte t = coagulation. 6Rte d = anticoagulation.

  Foie_4_zones:
    zone_1: cheville_interne
    zone_2: genou_interne
    zone_3: mi_cuisse
    zone_4: hypocondre
    test_diagnostique: >
      3F t puis 7F d → si résistance à 7F = cycle Raé en cours.
      Confirmation: 5F sensible à la palpation.

  Rein_5_zones:
    zone_1: cheville_interne
    zone_2: genou_interne
    zone_3: mi_cuisse
    zone_4: lombaires
    zone_5: gorge
    note: >
      Angines répétées → vérifier Rein Yang (chronique).
      Ponctuel gorge = traiter GI (4GI t, 11GI).

  source: PIV-YY-t5-p22_31

# ══════════════════════════════════════════════════════
# ARBRE 22 — URGENCES ET ALERTES CLINIQUES CP I
# Source : PIV-YY-t5 cas pratiques
# ══════════════════════════════════════════════════════

arbre_22_urgences_CP_I:
  description: >
    Points et protocoles d'urgence issus des cas pratiques CP I.

  colique_hepatique:
    traitement: 34VB_d_21R_d_25V_prime_d
    note: >
      25V' (branche externe, hauteur L4/L5) = point 'Spasfon'.
      ARRÊT INSTANTANÉ de la douleur. Efficace aussi sur
      colique néphrétique et tous spasmes abdominaux.

  migraine_VB:
    traitement: 34VB_d_43VB_d_20VB_d_2VB_d
    si_migraine_chronique: verifier_foie_et_diaphragme
    chocolat: aggrave_migraines_VB_theobromine
    cafe_au_lait: bloque_VB_systematiquement

  urgence_cardiaque:
    coup_de_poignard_poitrine: 6MC_d_efficacite_immediate
    note: spasme_diaphragme_pas_forcement_coeur

  tendinites_et_cystites:
    alerte: >
      PRESQUE TOUJOURS du Yin malgré signes inflammatoires.
      Ne pas se laisser tromper par l'apparence Yang.
      Traiter le Yin (tonifier) et non le Yang (disperser).

  transpiration_tete: vide_Coeur_7C_t
  reves_eau: vide_Rein

  source: PIV-YY-t5-cas_pratiques

# ═══════════════════════════════════════════════════════════════
# ARBRE 23 — CIRCUIT DES ÉNERGIES ALIMENTAIRES (3 FOYERS)
# Ajouté par PV 3 Foyers tome 1
# ═══════════════════════════════════════════════════════════════

arbre_23_circuit_energies_alimentaires:
  titre: Circuit complet des énergies à travers les 3 foyers
  source: PV-3F-t1
  description: >
    Arbre maître du circuit des énergies issues de l'alimentation
    à travers les 3 foyers, depuis l'entrée des aliments jusqu'à
    la formation du sang et la distribution de l'énergie.
  etapes:
    1_estomac_1er_tri:
      action: sépare pur/impur, fin/grossier
      produits:
        ku_tchi: monte au thorax (P) propulsé par la Rate
        solides_purs: vers Foie
        ching_ie: vers Rate
        bol_restant: vers IG
    2_IG_2eme_tri:
      action: complète le 1er tri
      produits:
        ku_tchi: monte au thorax
        solides_purs: vers Foie
        liquides: vers Rein
        bol_restant: vers GI
    3_GI:
      action: extraction énergie résiduelle de l'impur
      produit: oé (énergie défensive née de l'impur)
      elimination: selles
    4_foie:
      recoit: solides purs des 1er et 2ème tris
      transmet: au Cœur (FS)
      filtre: sang veineux de retour → bile → VB
      filtre_aussi: énergies impures → P et narines
    5_rate:
      recoit: Ching Ié (jus), liquides purs des Reins
      transmet: liquides purs au Poumon, Ku Tchi au thorax
      codifie: stimuli environnement → distribue aux Tsang
    6_poumon:
      recoit: Ku Tchi + Yeung Tchi (air) + Yuan Tchi
      synthese: Tsong Tchi (énergie complète)
      puis: Tsong Tchi + Yuan Tchi = Tcheung Tchi (énergie totale)
      distribue: Iong (nutritionnelle) + Oé (défensive)
    7_coeur:
      recoit: solides purs (du Foie) + liquides purs (du Poumon/Rate)
      forme: le SANG
      propulse: dans le circuit artériel

# ═══════════════════════════════════════════════════════════════
# ARBRE 24 — PATHOLOGIE DE LA BARRIÈRE (FOYER MOYEN)
# Ajouté par PV 3 Foyers tome 1
# ═══════════════════════════════════════════════════════════════

arbre_24_pathologie_barriere_FM:
  titre: Diagnostic et traitement de la barrière du foyer moyen
  source: PV-3F-t1-p48_49
  description: >
    Le foyer moyen = "barrière interne" (Neï Koann). Si bloqué,
    les énergies ne s'échangent pas entre Ciel et Terre de l'Homme.
  points_commande:
    12JM: Maître du Yang du FM, Mo de l'Estomac
    13F: Maître du Yin du FM, Mo de la Rate, Maître énergie 5 Tsang
    6MC: Neï Koann, Maître du Yin digestif et psychique
  si_yang_en_exces:
    mecanisme: Yang ne pénètre pas dans le Yin (E+VB bloqués)
    pouls: superficiels loge II en excès, profonds faibles
    signes: régurgitation, renvois, vomissements, reflux acides
    traitement: 6MC_t + 13F_t + 12JM_d
  si_yin_en_exces:
    mecanisme: Yin ne remonte pas vers le Yang (F+Rte bloqués)
    pouls: profonds loge II en excès, superficiels en vide
    signes: stagnation, digestion bloquée, FI plein
    traitement: 12JM_t + 6MC_d + 4GI_t + 36E_t

# ═══════════════════════════════════════════════════════════════
# ARBRE 25 — EMBRYOLOGIE ET GROSSESSE
# Ajouté par PV 3 Foyers tome 1
# ═══════════════════════════════════════════════════════════════

arbre_25_embryologie_grossesse:
  titre: Séquence embryologique et grossesse selon les 3 foyers
  source: PV-3F-t1
  sequence:
    1_conception:
      spermatozoide_ovule: union des 2 demi hélices ADN
      chen_cosmique: pénètre avec le spermatozoïde
      ming_menn: cicatrice de la pénétration (L2/L3)
    2_morula_3_semaines:
      nature: Chaos inorganisé (Taé I avant le Tao)
      survie: Eau (ancestrale) + Terre seulement
      cordon: ne se forme qu'à la fin de la 3ème semaine
    3_organisation_4eme_semaine:
      force: 8 trigrammes organisent les 6 directions
      feuillets_primaires: mise en place
    4_grossesse:
      1er_trimestre: Chao Yin/Tae Yang (Yang, mutations)
      2eme_trimestre: Tsiué Yin/Chao Yang (Yin, développement)
      3eme_trimestre: Tae Yin/Yang Ming (Yang, activation)
      seance_acupuncture: fin de chaque trimestre
    5_naissance:
      retournement: enfant tête en bas → Chen cosmique se retire
      declenchement: hormone via fontanelle = 20TM
      catecholamines: anti-stress des Reins (indispensable)
    6_grossesse_extra_uterine:
      duree: 3 mois post-naissance (4ème saison)
      allaitement: maximum 3 mois
      yang_ming_mature: vers 6 ans

# ═══════════════════════════════════════════════════════════════
# ARBRES 26-30 — 3 FOYERS TOME 2
# ═══════════════════════════════════════════════════════════════

arbre_26_diagnostic_urines:
    titre: "Diagnostic par les urines"
    source: PV-3F-t2-p37_38
    entree: "Observation des urines"
    branches:
      claires_abondantes:
        diagnostic: "Froid aux reins / FI"
        mecanisme: "Excès R Yin ou vide R Yang ou attaque de froid"
      foncees_rares_odorantes:
        diagnostic: "Chaleur aux reins / FI"
        mecanisme: "Excès R Yang ou vide R Yin"
      sang_dans_urines:
        diagnostic: "Feu de l'IG (pas des reins en général)"
        mecanisme: "Cycle Ko Feu → Eau"
        rechercher: "Cause au niveau IG même si feu apparent des reins"

arbre_27_diagnostic_selles:
  titre: "Diagnostic par les selles"
  source: PV-3F-t2-p38_39
  entree: "Observation des selles"
  branches:
    normales: "Bien moulées, marron = bon tonus GI, bonne purification"
    decolorees_molles:
      diagnostic: "Excès de bile = chaleur"
      organe: VB
    noirâtres:
      diagnostic: "Stagnation tube digestif = froid (→ chaleur si prolongé)"
    odorantes:
      diagnostic: "Chaleur (l'odeur signe l'élément déréglé)"
    fines:
      diagnostic: "Pathologie de la rate"
    aliments_non_digeres:
      diagnostic: "Pathologie du foie"
    diarrhee_matinale:
      diagnostic: "Vide des reins"
      voir_aussi: "arbre_11_diarrhees"
    diarrhee_post_prandiale:
      diagnostic: "Pathologie du foie"
    diarrhee_chronique:
      diagnostic: "Angoisse liée à pathologie de la rate"

arbre_28_mouvement_respiratoire:
  titre: "Mouvement des énergies et respiration dans le Tchrong Mo"
  source: PV-3F-t2-p32_33
  schema:
    expiration_yang:
      direction: "Vers le haut"
      trajet: "Rate → Poumon (Yin/FS) → Cœur (Yang/FS)"
    inspiration_yin:
      direction: "Vers le bas"
      trajet: "Rate → Foie (Yang/FI) → Reins (Yin/FI)"
    apnee:
