# ARBRES DE DÉCISION CLINIQUE IEATC
# Logique conditionnelle pour le raisonnement clinique
# Version 1.0 — base initiale à enrichir module par module
# Ne jamais écraser — toujours enrichir

meta:
  fichier: 00_arbres_decision.yaml
  role: >
    Fournir à l'IA une logique opérationnelle de décision
    clinique. Pas de la prose — des conditions et des
    conclusions. Ce fichier est la colonne vertébrale du
    raisonnement clinique IEATC.
  instruction_mise_a_jour: >
    À chaque module traité, si un principe de traitement,
    une règle de choix de points, ou une logique de
    diagnostic est documentée : l'ajouter ici.
    Chaque arbre est annoté de sa source exacte.
    Les nœuds incomplets sont marqués statut: a_completer
    avec le module qui comblera la lacune.

# ─────────────────────────────────────────────────
# ARBRE 1 — ORIENTATION GÉNÉRALE
# Question : par quelle grille commencer ?
# ─────────────────────────────────────────────────

arbre_1_orientation_generale:

  etape_1_yin_yang_toujours_en_premier:
    regle: >
      Toujours commencer par déterminer le Yin/Yang.
      C'est la grille de base qui oriente toutes les autres.
    determiner:
      - exces_ou_vide
      - yin_ou_yang
      - haut_ou_bas
      - interne_ou_externe
    source: CP3-t1-p9
    si_yin_yang_clair:
      suivant: etape_2_localisation
    si_yin_yang_mixte_ou_ambigu:
      suivant: croiser_avec_trois_foyers

  etape_2_localisation_trois_foyers:
    foyer_superieur_FS:
      vertebres: D1_a_D7
      organes: [coeur, poumon, tete, psychisme]
      emotion_dominante: tensions_psychiques
      source: CP3-t1-p35
    foyer_moyen_FM:
      vertebres: D8_a_D12
      organes: [estomac, rate, foie, digestion]
      emotion_dominante: problemes_affectifs
      source: CP3-t1-p35
    foyer_inferieur_FI:
      vertebres: D10_a_L5
      organes: [rein, vessie, intestins, genital]
      emotion_dominante: problemes_organiques_profonds
      source: CP3-t1-p35

  etape_3_choix_grille_principale:

    si_symptome_suit_trajet_meridien:
      grille: meridiens_principaux_TT
      statut: a_completer
      attend: P_IX_Meridiens

    si_symptome_suit_horaire_precis:
      grille: cycle_iong_horaire
      regle: >
        Disperser 12h après la tranche horaire du méridien
        (moment où il est le plus faible).
        Tonifier pendant sa tranche horaire
        (moment où il a le plus de vitalité).
      points: [lo, source, yuan_pour_meridiens]
      points_organes: [mo, iu_dos, yuan_pour_organes]
      source: CP3-t1-p19

    si_emotion_chronique_dominante_identifiable:
      grille: cinq_elements
      statut: a_completer
      attend: P_VII_5_Elements

    si_trouble_surface_peau_tendons_ligaments:
      grille: grands_meridiens_TK
      points_prioritaires:
        - ting_des_yin_et_yang
        - points_reunion_TK: [13VB, 18IG, 22_23VB, 3_4JM]
      source: CP3-t1-p16

    si_rechute_cyclique_apres_traitement_reussi:
      grille: merveilleux_vaisseaux
      source: CP3-t1-p59
      statut: a_enrichir

    si_dysfonction_organe_claire:
      grille: zang_fu
      statut: a_completer
      attend: P_VI_Tsang_Fou

    si_trouble_circulation_fluides_oedemes:
      grille: trois_foyers
      statut: a_completer
      attend: P_V_Trois_Foyers

    si_trouble_constitutionnel_depuis_enfance:
      grille: ancestrale
      points_prioritaires:
        - tchrong_mo: [11R, 30E]
        - ming_menn: [4TM, 23V_chauffes]
        - rein: [3R, 7R]
      source: CP3-t1-p61

# ─────────────────────────────────────────────────
# ARBRE 2 — LECTURE YIN/YANG DU POULS
# ─────────────────────────────────────────────────

arbre_2_pouls_yin_yang:

  distinction_capitale:
    pouls_radiaux:
      concernent: organes_uniquement
      indique_superficie: [meridiens, tete, organes_sens, haut_corps, externe, peau_TK_6_axes]
      indique_profondeur: [organes, sang, ancestrale, FM_FI, branches_profondes]
    pouls_chamfrault:
      concernent: meridiens_uniquement
      liste: [9P, 4GI, 9E_42E_5E, 11Rte, 3C, 18IG, 2V, 3R, 7MC, 23TR, 3ou4VB, 3ou11F]
    erreur_historique: confondu_avant_1980
    alerte: >
      Attention aux ouvrages antérieurs aux années 80
      qui confondent les deux types de pouls.
    source: CP3-t1-p10

  lecture_volume:
    plein: exces
    vide: insuffisance
    dicrote: statut_a_completer
    rugueux: statut_a_completer

  lecture_forme:
    tendu:
      nature: yang
      orientation: Foie_Bois_probable
      source: CP3-t1-p9
    relache:
      nature: yin
      statut: a_completer
    rapide:
      nature: chaleur
      statut: a_completer
    lent:
      nature: froid
      statut: a_completer

  lecture_situation:
    position_I_II_III: statut_a_completer_PIII
    gauche_ou_droite: statut_a_completer_PIII
    superficie_ou_profondeur:
      superficie: meridiens_haut_externe
      profondeur: organes_sang_ancestrale

# ─────────────────────────────────────────────────
# ARBRE 3 — CATÉGORIES DE MALADIES
# ─────────────────────────────────────────────────

arbre_3_categories_maladies:

  systeme_locomoteur:
    nature: atteinte_meridiens_trauma_ou_surmenage
    exemples: [accident, entorse, coups, tendinites]
    points_dans_ordre:
      1: cle_et_depart_MV_plus_points_croisement
      2: lo_et_yuan
      3: specifique_fonction_os_ou_muscles_ou_symptomatique
    source: CP3-t1-p18

  yin_yang_general:
    nature: desequilibres_generaux_etudies_1ere_annee
    points_dans_ordre:
      1: points_generaux_yin_yang
      2: points_auxiliaires_yin_yang
    source: CP3-t1-p18

  yin_yang_general_plus_local:
    appliquer: [doctrine_I_Sou_Jenn, doctrine_Siao_Seu]
    source: CP3-t1-p15_et_18

  maladie_de_surface:
    nature: peau_et_pathologies_cutanees
    exemples: [psoriasis, eczema, pityriasis, blessures, brulures]
    points_dans_ordre:
      1: ting_et_points_reunion
      2: energie_oe
      3: qualification_feu_froid
    source: CP3-t1-p20

  maladie_de_profondeur:
    nature: pathologies_organiques
    points_dans_ordre:
      1: iu_dos_mo_yuan
      2: siao_seu
      3: ro_par_TP
      4: points_transvasement_foyer_a_foyer
      5: points_sortie_surface_ou_entree_profondeur
    source: CP3-t1-p20

  maladie_aigue_soudaine:
    nature: arrivee_brutale_recente
    points_dans_ordre:
      1: tsri_a_disperser_en_premier_toujours
      2: technique_iu_d_mo_t_simultane_pour_organes
    source: CP3-t1-p21

  maladie_chronique:
    nature: rhumatismes_douleurs_constantes
    points_acupuncture:
      - iu_elements_et_king_des_yin
    complementaires_obligatoires:
      principal: phytotherapie
      autres: [homeopathie, oligotherapie, vitamines, complements]
      imperatif: reequilibration_alimentaire
    source: CP3-t1-p21

  maladie_a_rechutes:
    nature: revient_apres_traitement_reussi
    points_systematiques:
      - iu_elements_des_yin
      - king_des_yin
    effet: >
      Renforce l'énergie Iong (nutrition de la fonction)
      et l'énergie Oé (protection).
    source: CP3-t1-p21

  maladie_horaire:
    nature: troubles_aux_memes_heures_ou_tranches_horaires
    approche: regulariser_cycle_iong
    voie_meridiens: [lo, points_passage]
    voie_organes: [iu_mo, yuan]
    principe_dispersion: >
      Disperser 12h après la tranche horaire de fonction
      accrue (moment le plus faible — énergie facile à
      mobiliser).
    principe_tonification: >
      Tonifier pendant la tranche horaire
      (moment de vitalité maximale pour réagir).
    source: CP3-t1-p19

  attaque_energie_externe_fong:
    si_declenchee_par_climat_ponctuel:
      suivant: arbre_4_grands_meridiens
    si_aggravee_par_climat_chronique:
      regle: >
        Si un patient est aggravé par un climat,
        c'est parce que son organisme était préalablement
        saturé de cette énergie. Le climat n'a fait que
        faire déborder le trop-plein antérieur.
      exemples:
        - rhumatisme_humide: Tae_Yin_exces_et_ou_Yang_Ming_insuffisant
        - grippe_froid: Tae_Yang_exces_et_ou_Chao_Yin_insuffisant
      traitement: meme_principes_que_mecanisme_interne
    source: CP3-t1-p20_et_26

# ─────────────────────────────────────────────────
# ARBRE 4 — GRANDS MÉRIDIENS
# ─────────────────────────────────────────────────

arbre_4_grands_meridiens:

  presentation:
    synonyme_ieatc: axes_energetiques
    role: >
      Système de protection contre les énergies externes
      ET d'équilibration du milieu intérieur.
      DISTINCT de l'énergie Oé — ne pas confondre.
    source: CP3-t1-p22

  les_6_GM_et_leurs_couples:
    tae_yang_chao_yin:
      nature: froid_chaleur
      meridiens: [V, IG, R, C]
      elements: [Eau, Feu]
    chao_yang_tsiue_yin:
      nature: feu_fong_vent
      meridiens: [VB, TR, F, MC]
      elements: [Bois, Feu]
    yang_ming_tae_yin:
      nature: secheresse_humidite
      meridiens: [GI, E, Rte, P]
      elements: [Metal, Terre]
    precision_capitale:
      yang_ming_GI: >
        PAS la sécheresse mais l'ASSÈCHEMENT des excès
        d'humidité — nuance IEATC importante.
      tae_yang_V: >
        PAS le froid mais le RAFRAÎCHISSEMENT du corps.
    source: CP3-t1-p22_23

  5_regles_fondamentales:
    regle_1: >
      Dans chaque GM, l'énergie du méridien dominant
      l'emporte sur l'autre (ex: dans Tae Yang, le froid
      de V l'emporte sur la chaleur de IG).
    regle_2: >
      Si un GM est déréglé en excès, c'est en raison
      d'une déficience de son GM couplé.
    regle_3: >
      Un GM doit apporter son énergie dominante à son
      GM couplé pour équilibrer et compenser.
    regle_4: >
      Disperser un point d'un GM + tonifier un point
      du GM couplé = transfert automatique d'énergie.
      UNIQUEMENT par les méridiens du bas du corps :
      Tae Yang/Chao Yin → R et V (pas IG et C)
      Chao Yang/Tsiue Yin → F et VB (pas TR et MC)
      Yang Ming/Tae Yin → E et Rte (pas GI et P)
    regle_5: >
      Quand une maladie se déclenche, l'énergie de même
      nature était préalablement en plénitude dans le
      méridien (externe) ou dans l'organisme (interne).
    source: CP3-t1-p24_25_26

  traitement_1_GM_seul:
    exemple_corps_trop_chaud:
      cause_possible_1: Chao_Yin_en_exces_exces_reel
      cause_possible_2: Tae_Yang_en_vide_exces_apparent
      traitement:
        - iu_C_en_d
        - mo_R_en_t
        - point_eau_R_ro_en_t
        - point_feu_C_iong_en_d
        - preferer_point_penn_si_possible
      si_saison_contraire_au_point_penn:
        alternative: point_Mere_ou_Fils_de_element
        note: >
          Moins efficace car agit à l'échelle des saisons
          de 3 mois — pas immédiatement.
    source: CP3-t1-p24

  traitement_2_GM_couples:
    si_traitement_1GM_insuffisant:
      principe: >
        Le GM couplé est en insuffisance et n'a pas
        apporté son énergie compensatrice.
        Renforcer son énergie selon le même principe.
      exemple_froid_interne:
        cause: insuffisance_chaleur_du_Chao_Yin
        traitement: 8C_en_t_point_penn_chaleur_C_Feu_Chao_Yin
        ne_pas: renforcer_le_Rein_qui_represente_le_froid
    source: CP3-t1-p24_25

# ─────────────────────────────────────────────────
# ARBRE 5 — POINTS IU DU DOS ET MO
# ─────────────────────────────────────────────────

arbre_5_iu_dos_et_mo:

  logique_iu_dos_vs_mo:
    iu_dos:
      polarite: Yang_du_corps_dos
      agit_sur: Yang_de_l_organe
      action_principale: drainer_eliminer_energies_perverses
      indication_principale: plenitudes_et_pathologies_aigues
    mo:
      polarite: Yin_du_corps_ventre
      agit_sur: Yin_de_l_organe
      action_principale: nourrir_renforcer_accumuler_energie
      indication_principale: vides_et_maladies_chroniques
    source: CP3-t1-p34_et_39

  technique_iu_mo_simultane:
    indication: >
      Affection trop chronique ou profonde.
      L'énergie ne peut plus circuler par les techniques
      habituelles. L'organisme ne répond plus.
    protocole:
      iu_dos: disperser_arrachage_energie_perverse
      mo: tonifier_parfois_chauffer
      position_patient: assise_le_plus_souvent
    vigilance_absolue:
      populations_a_risque:
        - hypotendus
        - convalescents_tres_affaiblis
        - tres_emotifs_surtout_hommes
        - spasmophiles
      risque: syncope_vagale_par_reflexe
      si_syncope:
        1: enlever_toutes_aiguilles_immediatement
        2: allonger_pieds_en_l_air
        3: parler_constamment_obliger_a_repondre
        4: masser_plexus_faire_respirer
      note_importante: >
        Cette réaction impressionnante est TOUJOURS
        le signe de la réussite du traitement.
    source: CP3-t1-p36

  quand_tonifier_iu_dos:
    regle: chauffer_obligatoirement_pour_etre_efficace
    effet: >
      Action très puissante, parfois supérieure au Mo.
      Chaque Iu des Tsang tonifie l'ensemble des 5 Tsang
      mais plus fortement son propre Tsang.
    source: CP3-t1-p36

# ─────────────────────────────────────────────────
# ARBRE 6 — MERVEILLEUX VAISSEAUX
# ─────────────────────────────────────────────────

arbre_6_merveilleux_vaisseaux:

  quand_interviennent_les_MV:
    1: >
      Quand les voies Lo transversales n'ont pas suffi
      à réguler le déséquilibre.
    2: >
      Quand le déséquilibre est constitutionnel ou profond
      (niveau Ancestrale).
    3: >
      Quand il y a rechute systématique après traitement.
    4: >
      Quand la pathologie est bilatérale ou touche
      une chaîne entière.
    source: CP3-t1-p59

  syndromes_specifiques_MV:
    tchrong_mo:
      signes_cles:
        - problemes_genitalite_sexualite
        - douleur_lombaire_avec_brulure
        - froid_interne_profond
        - douleur_baladeuse_FI_GI
        - urticaire_plaques_rouges
      traitement_general: 11R_t_et_30E_t
      traitement_genitalite: 4TM_et_23V_t_chaufes
      source: CP3-t1-p61

    tou_mo_TM:
      signe_cle: dos_tendu_comme_un_arc
      traitement: 27TM_d_14TM_d_16V_d_20TM_d_3IG_d
      source: CP3-t1-p61

    jen_mo_JM:
      signes_cles:
        - genitalite_fecondite_sang_regles
        - douleur_FI_montant_au_C
      traitement: 4JM_t_6JM_t_7P_t
      source: CP3-t1-p62

    yang_tsiao_mo:
      signes_cles:
        - agitation_diurne
        - impatiences_jambes
        - oeil_grand_ouvert_pupille_dilatee
        - pathologie_souvent_unilaterale
      diagnostic_differentiel: Tae_Yang_V_qui_gere_agitation
      traitement: >
        Disperser 62V et 1V du côté en excès (œil ouvert)
        Tonifier mêmes points du côté opposé
      source: CP3-t1-p62

    yin_tsiao_mo:
      signes_cles:
        - agitation_nocturne_lit_defait_le_matin
        - oeil_ferme_pupille_retractee
      traitement: comme_Yang_TM_sur_6R_et_1V
      source: CP3-t1-p62

    yang_oe_mo:
      signes_cles:
        - alternance_froid_chaleur
        - atteinte_articulations_MS
      diagnostic_differentiel: [Chao_Yang, Tsiue_Yin]
      traitement: 5TR_et_63V_t
      source: CP3-t1-p62

    yin_oe_mo:
      signe_cle: douleur_C_type_dechirure_bloque_respiration
      traitement: 6MC_t
      source: CP3-t1-p62

    tae_mo:
      signes_cles:
        - comme_Tchrong_Mo_mais_avec_froid_pas_chaleur
        - lombaire_retroversion_deviation_laterale
        - comme_assis_dans_baquet_eau_froide
        - douleurs_poly_articulaires_MI
      diagnostic_differentiel_avec_Tchrong_Mo:
        - tchrong_mo: douleur_lombaire_avec_brulure
        - tae_mo: douleur_lombaire_avec_froid
      traitement: traitement_complet_du_MV
      source: CP3-t1-p62_63

  protocole_traitement_complet_MV:
    regle: >
      Poncturer TOUS les points du MV en tonification
      (car pathologie = MV ne fonctionne pas).
    minimum_requis:
      - point_cle
      - point_de_depart
      - dernier_point_du_MV
    plus: points_croisement_ou_pathologie_se_manifeste_le_plus
    tous_dans_meme_sens: point_cle_t_ou_d
    source: CP3-t1-p63

# ═══════════════════════════════════════════════════════════════
# ARBRE 31 — CINQ ÉLÉMENTS (PVII t1+t2+t3 intégrés)
# ═══════════════════════════════════════════════════════════════

arbre_31_cinq_elements:
  statut: complet_PVII_t1_t2_t3_integres
  attend_complement: pathologie_detaillee_et_traitement_modules_suivants

  principes_fondamentaux:
    axe_vertical: traiter_par_lois_Yin_Yang_montee_descente
    plan_horizontal: traiter_par_lois_5_Elements_entree_sortie
    regle: >
      Montée/descente = Yin/Yang.
      Entrée/sortie, adaptation, alimentation = 5 Éléments.
      Ne jamais confondre les deux plans.
    source: PVII-t1-p25

  natures_fonctionnelles:
    Eau: humidifier_et_descendre
    Feu: bruler_et_monter
    Bois: se_tordre_et_se_redresser
    Metal: se_modifier_et_etre_malleable
    Terre: recevoir_semences_produire_recoltes
    application_pathologique:
      Eau: oedemes_stagnation_bas_du_corps
      Feu: hypertension_hemorragies_haut_du_corps
      Bois: deformations_articulaires_scolioses
      Terre: surcharges_graisseuses_cellulite_PAS_obesite
      Metal: rigidite_caractere_tissus_cassants
    attention:
      obesite: Metal_pas_Terre
      boulimie: IG_pas_Terre
    source: PVII-t1-p35

  saisons_et_milieux:
    regle_chinoise: >
      Solstices et équinoxes sont les MILIEUX des saisons
      (pas le début comme en Occident).
    point_Penn: >
      Point le plus spécifique pour l'énergie de la saison
      et l'organe correspondant. À utiliser en priorité
      pendant la saison de l'élément.
    attend_details: PVII_t2

  cycle_Tcheng_engendrement:
    ordre: [Bois, Feu, Terre, Metal, Eau]
    principe: >
      Cycle nutritionnel. Transmission Yin→Yin (Tsang→Tsang).
      PAS Fou→Fou (antinomie 5 vs 6).
      Rate transforme l'énergie entre deux saisons.
      Énergie nourricière doit TOUJOURS venir de l'arrière (Mère).
    regles_pathologiques:
      mere_vide: fils_pas_alimente_futur_compromis
      Tcheng_bloque: Empereur_trop_fort_garde_energie_despotisme
      perversite_par_Ko: >
        Si énergie provient du Ko par problème climatique
        = trouble majeur, perversité gagne tous les organes.
    source: PVII-t2-p23_25

  cycle_Ko_temperance:
    principe: >
      Tempérance et assistance. Grand-mère→petit-fils.
      Doué d'intelligence et de discernement.
    relations: [Bois_Terre, Terre_Eau, Eau_Feu, Feu_Metal, Metal_Bois]
    loi_passive_Hong_Fan: sens_inverse
    loi_active: sens_normal
    regles_pathologiques:
      Ko_pathologique: >
        Empereur trop fort attaque ennemi vaincu.
        Ko destructeur, pas de tempérance.
      cycle_Rae: >
        Ennemi vaincu se retourne contre Empereur
        affaibli. Cycle Ko inversé = révolte.
      LOI_SO_OUEN: >
        Tout élément qui attaque en attaque toujours DEUX.
        Tout élément attaqué l'est toujours par DEUX
        (ennemi + conseiller).
      peut_survenir: >
        N'IMPORTE QUAND dans l'année, n'importe quel
        élément, en dehors de toute considération
        saisonnière. Durée : heures à toute la vie.
    source: PVII-t2-p26_53

  cour_imperiale:
    principe: >
      Hiérarchie des 5 éléments à chaque saison.
      Seuls les Tsang comptent (les mères donnent la vie).
    roles:
      Empereur: le_plus_fort_regne
      Mere: faible_tranquille_TOUT_depend_de_sa_faiblesse
      Fils: vigoureux_futur_Empereur
      Ennemi_vaincu: soumis_petit_fils
      Conseiller: energique_grand_mere_tempere
    auto_regulation: >
      L'Empereur engendre lui-même les critères de
      son propre contrôle. Système oscillant permanent.
    surveillance: >
      Examiner patients 4 fois/an à chaque changement
      de saison chinoise, même en bonne santé.
    source: PVII-t2-p31_51

  lois_relations_ternaires:
    triangle_rouge: Empereur_Fils_Ennemi_Tcheng_Ko
    triangle_bleu: Empereur_Fils_Conseiller_Tcheng_Ko
    triangle_vert: Empereur_Ennemi_Conseiller_Ko_Tcheng
    pathologie_Empereur_faible: >
      Ennemi + Conseiller s'unissent pour attaquer.
      Raé de l'Ennemi + Ko du Conseiller = simultanés.
    pathologie_Empereur_fort: >
      Ko pathologique contre Ennemi + Raé contre Conseiller.
    source: PVII-t2-p42_49

  importance_printemps:
    regle: >
      Printemps raté = année ratée. Foie = starter.
      Conditionne toutes les activités organiques de l'année.
      Carence → ancestrale non régénérée → fatigue toute l'année.
    source: PVII-t2-p40_41

  bilan_energetique_5E:
    methodes: [palpation_abdominale, visage_couleurs, langue, questionnaire]
    pouls_radial: >
      Ne donne PAS d'indication directe sur les 5E.
      Recoupements nécessaires.
    questionnaire: >
      Capital si troubles liés à phénomène saisonnier
      ou qualité précise d'énergie.
    source: PVII-t2-p37_38

  # ── Enrichissement PVII t3 ──────────────────────────

  points_su_clinique:
    principe: >
      Les points Su = capteurs/adaptateurs des énergies externes.
      Agissent sur les QUALITÉS (pas les quantités).
      Ordre Yin : Bois→Feu→Terre→Métal→Eau.
      Ordre Yang : inversé Métal→Eau→Bois→Feu→Terre.
    points_urgents:
      Iu: >
        Porte de pénétration de la perversité. Puncturer Iu
        avant que la perversité pénètre plus profond.
        Si Iu faible → perversité atteint le Ro puis le Tsang.
      Ro: >
        Porte interne/externe. Communication Tsang ↔ méridien.
        Voie de distribution d'urgence par le Tsang.
    code_barre: >
      Le Iuann appose un code barre aux énergies externes.
      Seul l'organe correspondant reconnaît « sa » énergie.
      66 qualités d'énergie circulent mélangées dans l'iong.
    source: PVII-t3-p37_45

  kan_che_clinique:
    principe: >
      Chaque année caractérisée par une énergie (Maître = Ciel/étoiles)
      ET un mouvement (Terre/planètes). Leur relation détermine
      si l'année est harmonieuse ou pathologique.
    lecture_roue:
      1ere_analyse: energie_vs_mouvement_annee
      2eme_analyse: resultante_vs_saison
      3eme_analyse: impact_sur_patient_specifique
    impair: par_exces_energies_puissantes
    pair: par_insuffisance_element_ko_prend_sa_place
    source: PVII-t3-p50_83

  heures_royales_clinique:
    principe: Une_journee_vaut_une_annee
    Bois: matin_3h_9h
    Feu: midi_9h_15h
    Metal: fin_apres_midi_15h_21h
    Eau: nuit_21h_3h
    Terre: repas_4_fois
    application: >
      Conjoncture exceptionnelle (heure Bois + jour Bois + saison Bois
      + année Bois...) peut déclencher ou guérir des pathologies
      incurables autrement.
    source: PVII-t3-p77

  so_ouen_chap5_ko_emotionnels:
    note: Application directe du cycle Ko aux émotions
    colere: Ko_par_chagrin_Metal
    joie: Ko_par_peur_Eau
    meditation: Ko_par_colere_Bois
    anxiete: Ko_par_joie_Feu
    peur: Ko_par_pensee_Terre
    source: PVII-t3-p28_36

  axes_energetiques_clinique:
    Tsiue_Yin_stagnation_bas: varices_congestion_uterine
    Chao_Yang_stagnation_haut: migraines_vertiges
    Tae_Yang_Chao_Yin: cypho_lordoses
    Chao_Yang_Tsiue_Yin: scolioses
    source: PVII-t3-p23_26

  calendrier_xia_preventif:
    regle: >
      Contrarier le souffle de sa saison blesse l'organe correspondant
      ET prépare la pathologie de la saison suivante.
    Printemps_contrarié: foie_fourbu_risque_maladie_ete
    Ete_contrarié: coeur_patit_fievre_automne_hiver
    Automne_contrarié: poumon_blesse_douleurs_diarrhees_hiver
    Hiver_contrarié: reins_meurtris_perte_appetit_printemps
    source: PVII-t3-p88_96

  deplacement_et_centre:
    regle_50km: >
      Tout déplacement > 50 km perturbe le centre (Rate).
      5 jours d'adaptation. Changement de fuseau = Rate + Rein.
      Changement d'hémisphère = tout l'organisme.
    source: PVII-t1-p43

  intersaison_5eme_saison:
    duree: 18_jours_9_plus_9_a_cheval
    frequence: 4_fois_par_an
    fonction: Terre_neutralise_et_transforme_energie_saisonniere
    rate_constante: >
      La Rate est dite "constante" tout au long de l'année.
      Pas de variation notable. Mais sa période propre
      = 30 jours fin d'été pour sa propre régénération.
    source: PVII-t1-p43_54

