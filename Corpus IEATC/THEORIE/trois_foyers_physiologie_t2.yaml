meta:
  titre: "Les Trois Foyers — tome 2"
  source: PV-3F-t2
  auteur: Thierry Bollet
  date: 2019-08-26
  pages: 48
  sujets_principaux:
    - Tchrong Mo (Chong Mai)
    - 8 Merveilleux Vaisseaux
    - Hérédités (céleste, terrestre, parentale)
    - Détail de chaque énergie (Yuan à Tcheung)
    - Sang rouge et blanc
    - Liquides organiques (Ching Ié)
    - Nutrition des Tsang et chaudrons alchimiques
    - Interdépendance des fonctions
    - Mouvement des énergies et respiration
