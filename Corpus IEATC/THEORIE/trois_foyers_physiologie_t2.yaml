    - Assimilation détaillée (1er et 2ème tri)
    - Éliminations (urines, selles)
    - Trajets complets des liquides, solides et énergies

# ══════════════════════════════════════════════════════════════
# 1. TCHRONG MO — CHONG MAI
# ══════════════════════════════════════════════════════════════

tchrong_mo:
  definition: >
    Premier Merveilleux Vaisseau à se développer dans l'embryon.
    Expansion de Yuan Tchi à partir de Ming Menn. Matrice énergétique
    pour l'ensemble du système des méridiens. Vaisseau interne principal
    pour les connexions entre foyers, tsang et fou.

  huit_merveilleux_vaisseaux:
    origine: "8 MV = 8 trigrammes = 8 directions cardinales"
    systeme_embryonnaire: >
      Les 8 MV se développent dans les 8 premiers mois de grossesse.
      Au 9ème terme (nombre 9 = aboutissement), le système embryonnaire
      est complet, prêt à vivre dans la dimension extérieure.
    fonction: >
      Donner naissance au système des méridiens. Les MV sont la matrice
      énergétique dont les méridiens sont l'expression fonctionnelle.

  maturite_energetique:
    femme:
      cycle: 7
      maturite: "21 ans (3×7)"
      explication: "Cycle de 7 ans, maturité énergétique complète à 21 ans"
    homme:
      cycle: 8
      maturite: "24 ans (3×8)"
      explication: "Cycle de 8 ans, maturité énergétique complète à 24 ans"

  systeme_meridiens:
    points_su_5E: >
      60 points (5 points Su × 12 méridiens) correspondant aux 60 climats
      du cycle de 60 ans. Chaque point = 1 climat = 1 énergie spécifique.
    total_points_acupuncture: >
      360 points par hémicorps = 720 points au total. 360 = nombre de
      degrés du cercle, nombre de jours de l'année ancienne.
    energies_totales: >
      1440 énergies sur 2 années consécutives = un cycle complet.
      Extrême potentialité du système.
    totalite: >
      La totalité des énergies de l'univers est contenue dans le
      patrimoine énergétique du corps.

  racine_tchrong_mo:
    circulation: >
      Ming Menn → 4JM Koann Yuan (Barrière de Yuan Tchi) →
      6JM Tan Tienn → 11R (début trajet superficiel).
    fonction: "Distribuer l'énergie ancestrale au foyer inférieur"
    points_commande:
      - "4TM — Ming Menn (source)"
      - "4JM — Koann Yuan (barrière Yuan Tchi)"
      - "6JM — Tan Tienn (champ de cinabre inférieur)"
    pathologie:
      obstruction: "Blocage de la distribution Yuan Tchi"
      pouls: "3R (pouls diagnostique)"
      symptomes:
        - "Douleurs lombaires brûlantes"
        - "Douleurs abdominales"
        - "Problèmes génitaux (fonctions génitales perturbées)"
      traitement:
        - "23V + 4TM chauffés"
        - "11R + 30E"
        - "3R + 4JM + 6JM chauffés"

  trajets_superficiels:
    local: "30E (point de départ local)"
    inferieur: "3R → 4Rte"
    anterieur: "11R → 21R → 17JM (Trann Tchong) → 27R → cerveau"
    posterieur: "Utérus → 10V, branches D8/D9 vers les Fou"
    note: >
      Trajet ascendant de 11R à 21R, mais pas de circulation
      unidirectionnelle : les énergies des 3 foyers s'y mêlent
      et se mélangent pour produire Tcheung Tchi.

  division_uterine:
    principe: >
      Dans l'utérus, le Tchrong Mo donne naissance au Tou Mo
      (vaisseau gouverneur) et au Jen Mo (vaisseau conception).
    division_esoterique:
      branche: "Utérus → cœur = 'Couleur du Chen'"
      conditions:
        - "Union des corps, des cœurs et des esprits"
        - "Calme des sentiments"
        - "MC filtre (maître du cœur = filtre protecteur)"
      note: "F + MC = Tsiué Yin (axe de l'intimité profonde)"

  fonctions_tchrong_mo_resume:
    distribution: "Distribue énergie ancestrale via 3 foyers"
    connexion: "Connexions foyers ↔ tsang/fou ↔ méridiens"
    production: "Lieu de mélange final → Tcheung Tchi"
    nutrition: "→ voir energies_detaillees.tcheung_tchi.distribution"

# ══════════════════════════════════════════════════════════════
# 2. HÉRÉDITÉS
# ══════════════════════════════════════════════════════════════

heredites:
  innee:
    nom: "Yuan Tchi"
    description: "Hérédité spécifique, étincelle de Vie individuelle"

  celeste:
    sources:
      - "Étoiles"
      - "Soleil"
      - "Lune"
      - "Planètes"
    description: >
      Influences cosmiques au moment de la conception et de la grossesse.
      Programme inscrit dans le Chen cosmique.

  terrestre:
    sources:
      - "Saisons (saison de naissance)"
      - "Terroir (lieu géographique)"
      - "Alimentation de la mère pendant grossesse"
    description: >
      Progression de potentialité liée aux 12 mois de grossesse
      (12 mois solaires / 12 lunes). La nourriture de la mère
      et le terroir déterminent une partie du patrimoine héréditaire.
    memoire: >
      Le patrimoine héréditaire terrestre constitue une mémoire
      inscrite dans les tissus et les énergies du nouveau-né.

  parentale:
    mecanisme: >
      Tsing du père + Tsing de la mère, porteurs chacun de leur
      Chen, Roun et Pro. Fusion au moment de l'instant de conception.
    composantes:
      pere: "Tsing paternel + Chen + Roun + Pro du père"
      mere: "Tsing maternel + Chen + Roun + Pro de la mère"

