# CINQ ÉLÉMENTS — PETIT CALENDRIER DES XIA (PRESCRIPTIONS MENSUELLES)
# Source : PVII Les 5 Éléments — Physiologie tome 3, pp. 88-96
# Auteur : Thierry Bollet — IEATC

meta:
  fichier: cinq_elements_calendrier_xia.yaml
  source: PVII_5Elem_t3_p88_96
  statut: complet
  liens:
    - THEORIE/cinq_elements_saisons.yaml
    - THEORIE/cinq_elements_par_element.yaml
