trilogie_identite_tsang:
  principe: >
    Chaque tsang est une entité indivisible à 3 plans,
    tous expressions de son énergie tsing propre.
  trois_plans:
    physique: activité_fonctionnelle_organique
    sentimental: émotion_spécifique_à_cet_organe
    psychique: entité_et_activité_psychique_spécifique
  citation_CLM: >
    Un tsang est une "entité", un "tout", capable d'une
    sentimentalité et doué d'une activité psychique
    spécifique, propre, particulière et totalement indépendante.
  individuel: racine_de_indivisible
  pathologie: >
    L'indépendance devient pathologique quand le tsang agit
    sans tenir compte des 3 foyers.
    Analogie directe avec le cancer (cellules individualistes).
  source: PVI-t1-p7

cancer_et_Chao_Yang:
  analogie_fonctionnelle: >
    Les cellules cancéreuses = individualisme absolu.
    Sortie de la loi fonctionnelle nécessaire à l'ensemble.
    Elles étouffent les autres cellules par leur masse excessive.
    Ce n'est pas le cancer qui tue directement mais l'étouffement
    des autres fonctions vitales.
  role_Chao_Yang_prevention: >
    TR + VB (Chao Yang) = rôle énergétique essentiel
    dans la prévention du cancer en socialisant les organes.
  source: PVI-t1-p8

regle_niveaux_points_traitement:
  REGLE_ABSOLUE: >
    Chaque organe a une fonction DIFFÉRENTE selon le niveau
    considéré. Une pathologie d'un niveau ne pourra JAMAIS
    être traitée par les points d'un autre niveau.
  niveaux:
    fonctionnel_propre:
      description: fonction spécifique de l'organe
      exemple: coeur_bat_rein_filtre_estomac_malaxe
      points: mo_iu_dos_yuan
    trois_foyers:
      description: interrelations dans la gestion des 3F
      exemple: foie_metabolise_les_solides_purs
      points: maitres_des_foyers
    cinq_elements:
      description: énergie saisonnière_engendrement_tissus_sentiment_psychisme
      exemple: foie_genere_muscles_gere_fong
      points: antiques_ting_iong_iu_king_ro
    quatre_energies:
      correspondances: [rate=iong, poumon=oé, foie=sang, rein=ancestrale]
    yin_yang_6_couches:
      exemples:
        Chao_Yin: rein_coeur_puissance_evolution_être
        Chao_Yang: TR_VB_moteur_carburant_protection
        Tae_Yin: rate_poumon_distribution_energie_sang
      points: lo_yuan
  exemple_foie_multi_niveaux:
    niveau_3F: réception et métabolisation des solides purs
    niveau_5el: génère muscles gère fong Roun
    niveau_individuel: filtre sang veineux source sexualité
    niveau_axe: sentimentalité MC dans Tsiue Yin
    note: peut être pathologique à un niveau sans l'être aux autres
  source: PVI-t1-p41_42

axes_energetiques_amont_aval:
  loi_generale: >
    Dans tout axe énergétique :
    AMONT (3 Yin du bas + 3 Yang du haut) = ÉMETTEUR :
    fournit l'intelligence et l'énergie de la fonction.
    AVAL (3 Yin du haut + 3 Yang du bas) = EFFECTEUR :
    réalise l'action commandée par l'amont.
  exemple_yang_ming_tae_yin:
    sens_centripete:
      GI_1: réception et adaptation énergies externes (Ciel)
      E_2: absorption et transmission au Yin (Terre)
      Rte_3: réception et synthétisation (Terre)
      P_4: thésaurisation (Ciel)
    sens_centrifuge:
      ordre_de_depart: Rte_P_GI_E
  total_symbolique_couple: toujours_5
  implication: >
    La paresse d'un foie, fatigue des reins, insuffisance du poumon
    peuvent provenir d'un vide d'énergie du FOU couplé.
  source: PVI-t1-p44_45_48

