revolution_5_elements_tsing:
  ALERTE: MECANISME_CONFIRME_PAR_PRATICIEN
  affirmation_Bollet: >
    Ce qui circule dans le cycle des 5 éléments (cycle Tcheng)
    est le TSING des tsang, CONTENU DANS l'Iong.
  mecanisme_complet_confirme: >
    1. L'Iong circule partout et contient les Tsing de TOUS les Tsang
    2. La RATE trie et étiquette chaque Tsing pour son Tsang destinataire
    3. Les FOU COUPLÉS captent dans l'Iong la Tsing étiquetée
       pour leur Tsang et la lui transmettent
    Il n'y a pas contradiction avec la tradition (Iong circule)
    mais PRECISION : l'Iong est le véhicule, la Tsing est le contenu.
  argument_1: >
    So Ouen : "Les tsang se transmettent jalousement leur énergie
    sans jamais la laisser s'écouler au-dehors."
    → Cette phrase décrit la circulation des 5 éléments.
  argument_2: >
    Loi des 5 éléments : "Un élément est nourri par l'énergie de
    sa mère et EXCLUSIVEMENT par celle-ci. Toute autre énergie
    lui serait toxique."
    → Si c'était Iong (énergie neutre), cette loi serait caduque.
    → Seul Tsing des tsang correspond à une énergie propre à chaque élément.
  implication_therapeutique: >
    MAJEURE — affecte la conception même du traitement par les 5 éléments.
  conflit_reference: C004_RESOLU
  statut: confirme_par_praticien_2026-04-05
  source: PVI-t1-p51
