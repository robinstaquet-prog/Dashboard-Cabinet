# YIN / YANG — L'HOMME, SECTORISATION ET PHYSIOLOGIE
# Source : Polycopié IV — YIN/YANG tome 2, pp. 17-32
# Auteur : Thierry Bollet — IEATC (compilation 03/07/2015)

