# CINQ ÉLÉMENTS — ÉTUDE PAR ÉLÉMENT
# Source : PVII Les 5 Éléments — Physiologie tome 1, pp. 38-47
# Auteur : Thierry Bollet — IEATC

meta:
  fichier: cinq_elements_par_element.yaml
  source: PVII_5Elem_t1_p38_47
  statut: complet
  liens:
    - THEORIE/cinq_elements_fondements.yaml
    - THEORIE/cinq_elements_saisons.yaml
    - THEORIE/cinq_elements_correspondances.yaml
    - THEORIE/cinq_elements_cycles.yaml
    - ZANG_FU/foie.yaml
    - ZANG_FU/coeur.yaml
