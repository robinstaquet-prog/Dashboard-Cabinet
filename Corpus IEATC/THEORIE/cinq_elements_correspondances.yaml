# ─────────────────────────────────────────────────
# RÉSUMÉ ACTIVITÉS ORGANIQUES
# ─────────────────────────────────────────────────

resume_activites_organiques:
  Foie:
    resume: >
      Bouclier de l'organisme, défenses (oé), sang veineux,
      métabolismes (acides gras, bilirubine, sucres, protéines),
      anticoagulant, IG dans FM (métabolise solides purs).
  Coeur:
    resume: >
      Propulse sang artériel, siège du Chen (conscience,
      psychisme, mentalité), dirige la langue et la parole.
      MC = sentiments et émotions → mots de la parole.
  Rate:
    resume: >
      Grenier de l'organisme, toutes les mutations du sang
      et de l'énergie, gère liquides organiques, maintient
      les formes (chair, muscles, membres, organes en place).
  Poumon:
    resume: >
      Énergie de l'air, maître de la peau et des poils,
      rythme cardiaque via l'énergie, nez et odorat,
      énergie physique de l'organisme.
  Rein:
    resume: >
      Énergie ancestrale, tsing, sens du regard profond,
      os et cheveux, oreille et audition.
      R Yin = Eau/filtration. R Yang = Feu/vitalité.
      Racines du Yin et du Yang de tout l'organisme.
  VB:
    resume: justice_jugement_decision
  Estomac:
    resume: mer_de_l_energie_1er_tri
  IG:
    resume: 2eme_tri_chaleur_separation_pur_impur
  GI:
    resume: impur_elimination
  Vessie:
    resume: gestion_liquides_urines
  Trois_Foyers:
    resume: FS_respiration_FM_alimentation_FI_elimination
  source: PVII-t2-p20_22
