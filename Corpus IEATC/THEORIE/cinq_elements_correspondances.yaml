# CINQ ÉLÉMENTS — CORRESPONDANCES COMPLÈTES, UNIVERS, COULEURS, LUNE
# Source : PVII Les 5 Éléments — Physiologie tome 2, pp. 7-22
# Auteur : Thierry Bollet — IEATC

meta:
  fichier: cinq_elements_correspondances.yaml
  source: PVII_5Elem_t2_p7_22
  statut: complet
  liens:
    - THEORIE/cinq_elements_fondements.yaml
    - THEORIE/cinq_elements_par_element.yaml
    - THEORIE/cinq_elements_saisons.yaml

# ─────────────────────────────────────────────────
# 5 ÉLÉMENTS ET UNIVERS / SYSTÈME SOLAIRE
# ─────────────────────────────────────────────────

cinq_elements_et_univers:
  principe: >
    Chaque planète est la cristallisation d'une des 5 énergies.
    Seule la Terre (planète) réalise l'équilibre parfait des 5
    en les réunissant toutes. Les autres planètes sont le
    miroir d'une seule énergie dominante.
  planetes:
    Bois: Jupiter
    Feu: Mars
    Terre: Saturne
    Metal: Venus
    Eau: Mercure
  classification:
    telluriques_Yin: [Mercure, Venus, Terre, Mars]
    gazeuses_Yang: [Jupiter, Saturne, Uranus, Neptune]
  soleil_et_lune:
    Soleil: psychisme_mentalite_Chen
    Lune: emotions_sentimentalite
  double_effet_planetaire:
    1: miroir_reflechissant_energie_galaxie
    2: masse_propre_emettant_energie_specifique
  reference_Steiner: >
    Anthroposophie de Rudolf Steiner confirme ces
    correspondances planètes-énergies dans le cadre
    de la médecine anthroposophique.
  source: PVII-t2-p7_9

# ─────────────────────────────────────────────────
# COULEURS SYMBOLIQUES DES 5 ÉLÉMENTS
# ─────────────────────────────────────────────────

couleurs_symboliques:
  correspondances:
    Bois: bleu_vert
    Feu: rouge
    Terre: jaune_safran
    Metal: blanc
    Eau: noir
  precision: >
    Noir et blanc ne sont PAS des couleurs au sens strict.
    Les 3 couleurs fondamentales sont bleu, rouge, jaune.

  construction_symbolique:
    carre:
      nombre: 4
      signification: vie_materielle
      elements: [Metal_blanc, Eau_noir, Terre_jaune, Bois_bleu_vert]
      position: Metal_et_Eau_en_bas_Terre_et_Bois_en_haut
    triangle:
      nombre: 3
      signification: esprit_immateriel
      element: Feu_pourpre_au_sommet
      position: au_dessus_du_carre
    union_carre_triangle:
      nombre_sacre: 7
      signification: >
        Nombre sacré universel = union de la matière (4)
        et de l'esprit (3). On le retrouve dans toutes
        les traditions : 7 jours, 7 notes, 7 chakras, etc.
    charnieres:
      Bois: entre_Ciel_et_Terre_Yang_montant
      Terre: entre_Ciel_et_Terre_centre_reference
  source: PVII-t2-p10_13

# ─────────────────────────────────────────────────
# LUNE ET 5 ÉLÉMENTS — CALENDRIERS
# ─────────────────────────────────────────────────

lune_et_cinq_elements:
  4_calendriers:
    astronomique: base_soleil_365j
    civil_agricole: base_soleil_adapte_saisons
    lunaire_Tet: base_lune_12_lunes_354j
    energetique_acupuncteur: >
      Combinaison solaire + lunaire. L'acupuncteur
      travaille avec les deux simultanément.
  lune:
    nombre_lunes_par_an: 12
    duree_lune: 29_jours_12_heures
    total: 354_jours
    ecart_solaire: 11_jours_par_an
  cycle_60_lunes:
    duree: 5_ans
    base: 10_Kan_x_6
    tableau_10_Kan:
      Yang_Bois: Kia
      Yin_Bois: I
      Yang_Feu: Ping
      Yin_Feu: Ting
      Yang_Terre: Meou
      Yin_Terre: Ke
      Yang_Metal: Keng
      Yin_Metal: Sin
      Yang_Eau: Jenn
      Yin_Eau: Kouei
    alternance: Yang_puis_Yin_pour_chaque_element

  critique_themes_energetiques:
    position_Bollet: >
      Les "thèmes énergétiques" fondés sur le R.P. Houang
      sont problématiques car les tables chinoises ont subi
      257 changements de calendrier en 2000 ans, avec
      réinitialisations impériales à chaque dynastie.
    fiabilite: 80_pourcent_exactitude_previsions_Bollet
    consequences: >
      Ne pas se fier aveuglément aux thèmes énergétiques
      basés sur les dates de naissance. Les utiliser comme
      indication, pas comme certitude.
  source: PVII-t2-p14_17

