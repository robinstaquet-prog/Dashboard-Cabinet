# BILAN ENERGETIQUE, INTERROGATOIRE, PALPATION, POULS
# Source : PVII 5 Éléments tome 4, pp. 64-79
# Auteur : Thierry Bollet — IEATC

meta:
  fichier: cinq_elements_pathologies_bilan.yaml
  source: PVII_5E_t4_p64_79
  statut: complet
  liens:
    - THEORIE/cinq_elements_pathologies_cycles.yaml
    - THEORIE/cinq_elements_pathologies_traitement.yaml
    - THEORIE/cinq_elements_correspondances.yaml

# =======================================================
# BILAN ENERGETIQUE GENERAL
# =======================================================
bilan_energetique:
  titre: Bilan énergétique général — rappels
  ordre:
    1: bilan_Yin_Yang_general
    2: bilan_Yin_Yang_local
    3: bilan_dans_5_elements
    4: surface_couche_energetique_ou_meridien
    5: profondeur_foyer_tsang_fou_fonction
    6: etat_vide_ou_plenitude
    7: nature_chaude_ou_froide
    8: energie_touchee_iong_oe_sang_ancestrale
  traitement: >
    Le niveau de l'atteinte détermine le traitement
    dans le même ordre, au cours de la même séance
    ou sur plusieurs séances.
  nombre_points: >
    Le meilleur nombre de points traités est généralement
    de 8 (16 aiguilles). Moins l'on fait de points, plus
    le résultat est percutant. Plus on en pique, plus on
    disperse l'énergie et moins le résultat est probant.

# =======================================================
# DIAGNOSTIC — 4 TEMPS ET 8 REGLES
# =======================================================
diagnostic:
  quatre_temps:
    - inspection
    - audition_et_odoration
    - interrogatoire_Yin_Yang_5E_vide_plenitude_froid_chaleur_surface_profondeur
    - palpation_abdominale_et_pouls
  huit_regles:
    couples: [[Yin, Yang], [froid, chaleur], [vide, plenitude], [interne, externe]]
  principes_generaux:
    origine: >
      Toute pathologie provient d'abord et avant tout
      d'un déséquilibre du Yin/Yang.
    theorie: >
      Pathologie Yin = froid + vide + interne (et inversement).
      Mais prendre cet énoncé avec beaucoup de réserves.
    circulation: >
      Plus sang et énergie circulent rapidement, plus ils
      circulent en surface et génèrent chaleur. Et inversement.
    maladies_externes: dereglement_climats_saisons_energies_perverses_traumatismes
    maladies_internes: heredite_sentiments_alimentation
    pathologies_psy: >
      Pathologies psychiques et sentimentales = ressort
      essentiel, voire exclusif, des 5 éléments.
    Yang_leger: >
      Pathologies Yang : légères, rapides, faciles.
      Le Yang est mobile.
    Yin_profond: >
      Pathologies Yin : profondes, difficiles. Le Yin est
      lent et profond. Vides de Yin très longs à traiter.
    tonifier_Yin: >
      Quand on tonifie le Yin, on tonifie toujours un
      point Yang avec, ou on chauffe au moxa.
    Terre_essentiel: >
      Estomac = maître du Yang (36E).
      Rate = maître du Yin (3Rte).
      La Terre est essentielle pour tout l'organisme.
    attaques_preferentielles:
      humidite: bas_du_corps
      froid: haut_du_dos
      chaleur: sommet_de_la_tete
      secheresse: face_poitrine
      fong: cotes_du_corps_et_interstices
  source: PVII-t4-p64_65

# =======================================================
# INTERROGATOIRE PAR LES TCHI DES ELEMENTS
# =======================================================
interrogatoire_tchi:
  titre: Interrogatoire par les Tchi des éléments
  principe: >
    Un individu dont un élément est pathologique présente
    des signes correspondants, plus marqués sur l'attaqué
    que l'attaquant.
  regle: >
    Le besoin ou la recherche = vide.
    Le rejet ou la fuite = plénitude.
  traitement_vide:
    - tonifier_penn_du_tsang_pathologique
    - traiter_conseiller_en_d_ou_mere_en_t
  traitement_plenitude:
    - disperser_le_fils
    - traiter_ennemi_vaincu_en_t
  seuil_pathologie: >
    La pathologie est acquise dès qu'il y a prédominance
    évidente sur un élément et que les signes sont des
    2/3 en excès ou en insuffisance.

  tableaux_vide_plenitude:
    Bois_F_VB:
      plenitude:
        - deteste_acide_calme_par_sucre
        - colereux_la_colere_aggrave
        - larmoyant
        - aime_jaune
        - polyglobulie
        - aggrave_au_printemps
        - fatigue_par_marche
        - muscles_tendons_contractes
        - deteste_mouton_millet
        - aime_odeur_douce_deteste_rance
        - craint_vent
        - ongles_cassants
        - troubles_vue
      vide:
        - recherche_acide_aggrave_par_sucre
        - trop_serein_colere_fait_du_bien
        - yeux_secs_vue_faible
        - recherche_vert
        - anemie
