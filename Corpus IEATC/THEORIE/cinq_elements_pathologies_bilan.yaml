# =======================================================
# PALPATION ABDOMINALE
# =======================================================
palpation_abdominale:
  titre: Palpation abdominale — atout majeur du diagnostic 5E
  geste:
    main: doigts_replies_rejoints_en_sphere
    prealable: >
      Passer le dos de la main sur l'abdomen à la
      recherche de déséquilibre thermique (chaleur=excès,
      froid=vide) et d'humidification (humidité=stagnation,
      sécheresse=atteinte Yin).
    palpation: >
      Appuyer légèrement puis en profondeur pour sentir
      tonicité, résistance, mollesse, gêne ou douleur.
  zones:
    Metal: flanc_droit_entre_25E_et_15Rte
    Bois: flanc_gauche_entre_25E_et_15Rte
    Terre_centre:
      localisation: nombril
      signification: >
        L'Être dans la vie, ce qu'il est intimement.
        Douleurs = tension, personne se cherchant.
    Terre_digestive: au_dessus_nombril_9_10JM
    Feu: sous_sternum_14JM
    Eau:
      localisation: sous_nombril_4_6JM
      attention: >
        Un fibrome présente une zone Eau pleine, dure,
        gonflée et douloureuse.

  interpretation_generale:
    plenitude: plein_tendu_douleur_superficielle_chaleur_Yang_blocage
    vide: vide_mou_douleur_profonde_froid_Yin_stagnation
    superficiel: Yang_de_element_fou_touche_pathologie_recente
    profond: Yin_de_element_tsang_touche_pathologie_ancienne_sentiments

  indurations:
    infra_cardiaque: intoxication_viande_beurre
    cardiaque: volailles_lait_oeufs_fruits_mer
    infra_ombilicale: exces_poissons
    ombilicale: sucreries_feculents
    9JM: alcool_graines_fruits

  sus_et_sous_ombilical:
    Rate_pleine: sus_pleine_gonflée_resistante
    Rate_pleine_sous: sous_vide_creux_molle
    cause_opposee: Rein_vide
    Rate_Estomac: sus_gonflee_tendue_sous_faible_molle
    cause_RE: Rein_Vessie_vides
    Estomac: sus_gonflee_dure_sous_creux_vide
    cause_E: Estomac_vide
    Rein_gyneco: sus_pleine_dure_douleur_sous_vide_mou
    cause_gyneco: general_Yin_vide

  regle_capitale: >
    Si une perturbation est présente sur une ou plusieurs
    zones, les points de déblocage sont traités AVANT
    tout autre traitement, même le Yin/Yang.
  note_pratique: >
    Rééquilibrer uniquement le Yin/Yang général puis
    refaire la palpation : la plupart des troubles
    disparaissent. Le Yin/Yang est la racine de tous
    les déséquilibres.
  schemas_classiques:
    le_plus_frequent: Terre_vide_ou_bloquee_ou_Eau_Terre_vides
    grave: rein_et_rate_vides_epuisement_ancestrale
    axe_horizontal: [Terre_centre_ou_digestive, Metal, Bois]

  points_deblocage:
    Terre_centre: 5Rte_d
    Terre_digestive: 6Rte_d
    Eau: 5R_d
    Bois: 2F_ou_3F_d
    Metal: 5P_et_ou_5P_prime_d
    Feu: 7C_ou_7MC_d
    note: >
      5P' est situé 1 distance sous le 5P.
      Ces points sont traités quel que soit l'état
      (vide ou plénitude) de la zone.
    efficacite: >
      Surprenant d'efficacité, vérifié aux pouls et
      à la palpation. Quelques secondes suffisent.
      Souvent, le praticien peut s'arrêter à cette
      première étape.
  source: PVII-t4-p69_72

# =======================================================
# PALPATIONS COMPLEMENTAIRES
# =======================================================
palpations_complementaires:
  aorte_abdominale:
    signification: energie_totale_Tchrong_Mo
    pulsations_visibles:
      sous_sternum: vide_Feu_et_coeur
      sternum_a_ombilic: vide_Feu_et_Eau_Chao_Yin
      sous_ombilic: vide_Eau_rein
  VB_plenitude:
    signe: >
      Abdomen tendu partout, y compris défense
      abdominale (spasme musculaire) = plénitude VB.
    traitement:
      - 38VB_d_a_gauche
      - 44VB_saigne_a_gauche
      - 34VB_d_a_droite_si_38VB_insuffisant
  palpation_Hong_Kong:
    zone_poumon:
      localisation: sous_claviculaire_1P
      vide: peau_seche_blanche_molle
      plein: muscles_durs_tendus_poitrine_elargie
    zone_estomac:
      localisation: sous_costale_12JM
      vide_E_et_P: molle_et_vide
    zone_coeur:
      localisation: sous_sternale_14JM
      plenitude: tendue_sans_perception_battements
      C_vide: battements_augmentent_avec_pression
      C_et_R_vides: battements_s_etendent_au_nombril
    zone_rate:
      localisation: centrale_sus_ombilicale_13F
      E_vide: gonflee_atone
      Rte_E_vides: tendue_et_molle
    zone_foie:
      localisation: flancs_14F
      normal: peau_muscles_forts_pleins
      F_vide: vides_et_faibles
      accumulation: indurations_nodosites_energie_homme_sang_femme
      F_Yang_exces: pulsations_flanc_gauche
    zone_rein:
      localisation: sous_ombilicale_25VB
      bonne_energie: pulsations_paisibles_fortes_4_5_par_respiration
      R_vides: froide_sans_pulsation
      vide_Yin: chaude_pulsations_faibles_rapides_montant_au_nombril
      R_epuises: souple_en_surface_tendue_en_profondeur
      signe_ancestrale: region_chaude_preservation_ancestrale
  correspondances_membres:
    rein: pied_cheville_mollet
    rate: genou_cuisse
    VB: hanche
    foie: flancs
    poumon: epaule_bras_coude
    coeur: avant_bras_main_rouge_paume
    psychisme: tension_relachement_muscles_avant_bras
  variante_quadrants:
    Terre: foyer_moyen
    Eau: MI_fosse_iliaque_droits
    Bois: MI_fosse_iliaque_gauches
    Feu: MS_hemi_poitrine_gauches
    Metal: MS_hemi_poitrine_droits
  pouls_Chu_Li:
    localisation: sous_sein_gauche_4eme_5eme_cotes
    nature: >
      Émergence du grand Lo de l'estomac. Pouls
      systématique dans les dépressions nerveuses
      (Chen et état énergétique du coeur).
    interpretation:
      battements_forts: Chen_coeur_epuise_vraie_depression
      legers_disparaissant_pression: energie_Chen_vide
      forts_diminuant_pression: >
        Sang au coeur en vide. Chercher vide de sang
        par vide/blocage foie et/ou rate.
    traitement_foie_vide: >
      Débloquer le Yin en bas : 6Rte et 9Rte d.
    traitement_foie_congestione: >
      Spasme diaphragme comprime veine cave :
      16JM d, 18JM d, 14JM t, 6MC t.
    traitement_rate: >
      Chercher points douloureux Rate 17-21 et disperser,
      puis 7C t.
    douleur_coeur_par_foie: >
      Comme un coup de poignard qui déchire et
      empêche de respirer, quelques secondes.
      Traiter par 6MC t = efficacité totale, immédiate
      et définitive. Nombreuses "cardiopathies" et
      tachycardies entrent dans ce champ.
  foyers:
    appreciation: froid_chaleur_vide_plenitude_humidite_secheresse
    points_cles:
      6JM_Tsri_Rae: doit_etre_tonique_contraire_vide_energie
      12JM_Tchong_Koann: ferme_resistant_sans_durete
      15JM_Tsiou_Mi: souple_detendu_sans_mollesse
  MMM_complements:
    gonflement_sous_costal: plenitude_VB
    spasme_musculaire_sous_costal: plenitude_VB_meme_cote_gauche
    spasmes_hypogastriques: sang_vicie_rate
    palpitations_ombilicales: vide_reins
    9JM_Choe_Fenn: Feu_a_F_et_R
  source: PVII-t4-p72_76

# =======================================================
# POULS SAISONNIERS
# =======================================================
pouls_saisonniers:
  titre: Les pouls de la médecine chinoise — qualité saisonnière
  principe: >
    Il y a un pouls physiologique correspondant à chaque
    saison. Le pouls doit marquer la qualité de la saison
    ("la forme du pouls"). Pris globalement sur les 3 loges.
  formes:
    Printemps_Bois: >
      Superficiel, tendu comme une corde de violon,
      résistant mais souple. Comme un fil de funambule.
    Ete_Feu: >
      Superficiel, ample, large, vaste, débordant, plein,
      glissant. On ne peut l'écraser, l'artère roule sous
      le doigt.
    5eme_saison_Terre: >
      Souple, rebondit bien. La souplesse doit être
      présente toute l'année en trame de fond.
    Automne_Metal: >
      Plumeux, superficiel, tendu, léger. Disparaît
      en surface pour légère pression, réapparaît en
      profondeur. Léger comme plume sur l'eau.
    Hiver_Eau: >
      Profond, dur, comme une pierre au fond de l'eau.
      On sent moins le bord de l'artère que pour le Feu.
  souplesse_Terre: >
    La souplesse est le facteur tempérant indispensable.
    Montre que la synthétisation de l'énergie est bonne
    (point iu des Yin en activité). Les excès du Bois et
    Feu sont dans la perte de souplesse.
  trois_pouls_superficiels: [Bois, Feu, Metal]
  intersaison: >
    18 jours de passage inter-saisonnier (9 début + 9 fin).
    Le pouls perd le caractère précédent, retrouve l'aspect
    Terre (souplesse) avant de prendre la nouvelle forme.
  diagnostic:
    pas_de_forme_correcte: >
      L'individu ne synthétise pas l'énergie de la saison.
      Le point penn ne fonctionne pas.
    forme_trop_forte: >
      L'individu synthétise trop l'énergie de la saison.
    forme_autre_saison: >
      Énergie perverse ayant pénétré l'organisme.
      La nature du pouls indique la nature de l'attaque.
  exemples_diagnostiques:
    Eau_au_printemps: >
      Froid au foie = la mère empiète sur le fils.
    Metal_en_ete: >
      Sécheresse au coeur = cycle raé.
    Bois_en_5eme_saison: >
      Fong à la rate = cycle ko.
    Feu_au_printemps: >
      Feu au foie = énergie en rébellion = tcheng inversé.
  traitements:
    pouls_en_exces: disperser_point_penn
    pouls_en_vide: tonifier_point_penn
    pouls_autre_saison: >
      Disperser le point de l'autre saison sur le tsang
      de la saison en cours.
  pouls_des_elements:
    pas_de_pouls_specifique: >
      Il n'existe pas de pouls spécifique des éléments,
      seulement celui des qualités/formes saisonnières.
    moyen_terme: >
      Chaque loge (I-II-III) : fou en surface, tsang en
      profondeur. Le pouls médian (ni surface ni profondeur)
      donne l'image de l'élément correspondant à la loge.
  source: PVII-t4-p77_79
