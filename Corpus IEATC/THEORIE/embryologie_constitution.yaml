# EMBRYOLOGIE ET CONSTITUTION DES ORGANES — IEATC
# Source : PVI Physiologie tome 1, pp. 10-14
# Auteur : Thierry Bollet

meta:
  fichier: embryologie_constitution.yaml
  source: PVI_Physio_t1_p10_14
  statut: complet
  liens:
    - THEORIE/tsang_fou_physiologie_t1.yaml
    - ZANG_FU/role_general_tsang.yaml

conception_et_Ming:
  instant_cle: moment_penetration_spermatozoide_dans_ovule
  evenements_simultanes:
    1: Chen_cosmique_expression_Tae_I_entre_dans_ovule
    2: etincelle_de_vie_donnee_a_1ere_cellule
    3: Ming_Mandat_celeste_inscrit_programme_la_Vie
  Ming_definition: >
    Programmation de la Vie du futur être.
    Tout ce qui est à venir est déjà écrit et inscrit.
  citation_CLM: >
    "La vie se déroule comme un ruban magnétique sur
    lequel tout est déjà enregistré et pré programmé.
    L'histoire de cette vie est décidée et voulue par le Tao
    et nul ne peut y échapper."
  memoire_cellulaire: >
    Toute cette histoire est mémorisée dans la 1ère cellule
    qui en transmet l'information à toutes les autres.
    Tout au long de la vie, les cellules se la transmettent.
  source: PVI-t1-p10

nidation_et_astrologie:
  definition: fixation_oeuf_sur_muqueuse_uterine
  position_geographique: selon_constellation_au_meridien_au_moment_de_nidation
  importance_dans_IEATC: >
    L'instant de la CONCEPTION (nidation) = vraie carte astrologique.
    PAS l'instant de la naissance comme en astrologie occidentale.
  influence: 3_Yin_et_3_Yang_du_Ciel_conditionnent_developpement_embryonnaire
  source: PVI-t1-p10

trois_niveaux_determination:
  niveau_1_conception_etoiles:
    moment: instant_nidation
    determine: Yin_Yang_de_base_3_Yin_3_Yang_developpement_embryonnaire
    correspondance: influence_du_Tao
  niveau_2_naissance_planetes:
    moment: instant_naissance
    determine: fonctionnement_energetique_5_tsang
    formulation: Les_planetes_determinent_COMMENT_l_etre_realisera_son_destin
  niveau_3_vie_sur_terre:
    moment: respiration_et_alimentation_des_la_naissance
    determine: fonctionnement_organique_3_foyers_tsang_fou
    formulation: La_Terre_procure_les_carburants_des_fonctions_organiques
  source: PVI-t1-p11

helice_ADN:
  constitution_de_oeuf:
    spermatozoide: apporte_une_moitie_entiere_helice_ADN
    ovule: apporte_autre_moitie_entiere_helice_ADN + ADN_mitochondriaque
    note: ovule apporte DEUX facteurs (hélice + vitalité mitochondriaque)
  mitose:
    principe: chaque_demi_helice_se_fracture_en_2_pour_donner_cellule_fille
    consequence_hereditaire: >
      Dans chaque cellule jusqu'à la mort :
      moitié héréditaire du père + moitié de la mère.
      Des modifications affectent l'ordre des éléments accrochés.
    implication: la_vie_est_personnelle_mais_support_hereditaire_invariable
  source: PVI-t1-p11

energie_ancestrale_paradoxe:
  loi: aucune_division_cellulaire_n_affaiblit_energie_ancestrale
  consequence: cellule_fille_possede_autant_que_cellule_mere
  exemple: si_1ere_cellule_a_10_chaque_cellule_fille_a_aussi_10
  paradoxe: >
    Capital non renouvelable qui se démultiplie sans s'épuiser.
    Mystère du développement embryologique.
  citation_Tao_To_King: >
    "Le Ciel dispense généreusement son énergie
    sans jamais qu'elle ne s'épuise."
  source: PVI-t1-p11_12

morula_differenciation:
  debut: fin_3eme_semaine_grossesse
  axes:
    - avant_arriere
    - gauche_droite
    - haut_bas
    - superficie_profondeur
  5_palais_uterins:
    avant: Palais_Sud
    arriere: Palais_Nord
    gauche: Palais_Est
    droite: Palais_Ouest
    haut_bas: axes_vertical
  source: PVI-t1-p12

constitution_geographique_organes:
  droite: foie_rein_droit_poumon_droit_ovaire_droit
  haut: poumons_coeur
  bas: sphere_genitale
  gauche: rate
  arriere: reins
  avant: estomac
  principe_forme: >
    Ce n'est PAS l'espace physique qui détermine la forme de l'organe
    mais l'INVERSE. L'organe exerce sa pression centrifuge sur les
    structures environnantes (ex: poumons → cage thoracique).
  implication_diagnostic: >
    Le corps apporte de précieux renseignements à l'acupuncteur
    par sa simple observation morphologique.
  source: PVI-t1-p14

ordre_fonctionnel_embryologique:
