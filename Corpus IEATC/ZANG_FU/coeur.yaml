physiologie_5_elements:
  mouvement: expansion_developpement
  application_3_plans:
    physique: tissus_se_developpent
    sentimental: sentiment_s_epanouit
    psychique: idee_reflexion_se_developpe
  intelligence: >
    L'intelligence propre au Feu et au coeur/Chen est
    le développement/épanouissement indissociable de
    l'éveil à Chen et de la sensibilité.
    Créativité spontanée (inspiration) ≠ imagination mentale.
  art: >
    Expression de la sensibilité à la beauté, au bien, au vrai.
    Inspiré à l'Homme par le Chen cosmique qui communique
    avec le Chen individuel.
  source: PVI-t2-p17_18

enrichissement_5_elements:
  element: Feu
  nature_fonctionnelle: bruler_et_monter
  Feu_Empereur: le_Chen_l_Esprit
  Tann_Tienn_superieur: >
    Entre les deux yeux, 3ème oeil. Vision séparée D/G
    réunifiée en vision verticale unique et synthétique.
  qualite_Sud: esprit_de_rite_rituel_conformite
  chaleur_benefique: >
    Produit la chaleur qui fait naître et croître.
    Le sang conduit le Chen à circuler dans l'Homme.
  nombre_2: >
    Séparation/division mais aussi réunion/mariage.
    Division de la conscience qui observe mental et sentimentalité.
  couleur: rouge_mariage_union_rivalite_effacee
  pathologie_5E: >
    Hypertensions dangereuses au cerveau (en haut du corps),
    hémorragies nasales, cérébrales, oculaires, glaucomes.
    Nature du Feu = brûler en montant.
  source: PVII-t1-p39_41

enrichissement_5E_t2:
  cour_imperiale:
    ete: Empereur_le_plus_puissant
    5eme_saison: Mere_faible
    automne: Conseiller_energique
    hiver: Ennemi_vaincu_soumis
    printemps: Fils_vigoureux
  Chao_Yin_ne_tue_pas: >
    De toutes les énergies saisonnières, seul le Chao Yin
