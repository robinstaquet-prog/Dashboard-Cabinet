# COEUR — PHYSIOLOGIE INDIVIDUELLE
# Source : PVI Physiologie tome 2, pp. 12-18
# Auteur : Thierry Bollet — IEATC

meta:
  fichier: coeur.yaml
  source: PVI_Physio_t2_p12_18
  statut: complet
  liens:
    - ZANG_FU/role_general_tsang.yaml
    - ZANG_FU/maitre_du_coeur.yaml
    - THEORIE/hierarchie_sang_energie.yaml
    - THEORIE/cinq_elements_par_element.yaml
