physiologie_dans_foyer:
  formation_du_sang:
    principe: >
      Le sang se forme dans le coeur par l'union des
      solides purs (du foie) et des liquides purs (rate via poumon).
    identite_avec_ancestrale: >
      Il y a identité entre cette description et celle
      de l'énergie ancestrale.
  coeur_poumon:
    synchronicite_absolue: poumon_dirige_le_rythme_du_couple
    sport: respiration_accelere_AVANT_rythme_cardiaque
    encombrement_en_aval: retentit_vers_arriere_souvent_jusqu_au_plus_loin
    vide_en_amont_foie: retentit_en_aval_jusqu_au_coeur
  foie_coeur:
    foie_congestionnee: >
      FS, coeur et poumon en vide de Yin → pathologie
      par plénitude d'énergie (chaleur) due au vide de Yin.
    causes_frequentes: spasme_diaphragme_stress_hernie_hiatale
  coeur_et_tsang:
    principe: >
      Toute pathologie du coeur se reporte sur ses sujets (tsang).
      Inversement toute pathologie des tsang dérègle le coeur.
    signes_dereglement:
      pouls: affaibli
      teint: assombri_ou_decolore
      regard: terni
  source: PVI-t2-p13_14_15

orifice:
  traditionnel: langue
  precision_IEATC: >
    L'association concerne la "Parole" au sens spirituel :
    la teneur et l'élévation spirituelle des propos tenus.
    Prophètes, Oracles, Chamans = ceux qui retransmettent
    la Parole du Ciel. PAS l'association physique avec la Rate
    (organe des sens).
  eclat_regard: >
    L'activité et l'intensité du Chen se voient à l'éclat de l'oeil.
    Oeil terne = Chen lésé.
  ATTENTION: blocage_parole_sous_emotion_est_du_ressort_du_MC
  So_Ouen_variantes: certains_ch_disent_yeux_ou_oreilles_perspectives_alchimistes
  examen_langue:
    rouge_vif_pointe_FS: feu_consume_le_coeur
    pale_blanche: vide_de_sang_et_du_coeur
  source: PVI-t2-p16

