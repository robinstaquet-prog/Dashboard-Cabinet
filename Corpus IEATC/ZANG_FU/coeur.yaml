    - THEORIE/cinq_elements_correspondances.yaml

identite:
  titre: Souverain_Empereur_Roi
  polarite: Yang_dans_le_Yang
  element: Feu_Empereur
  foyer: FS
  lateralite: gauche_Yang
  axe: partie_avale_du_Chao_Yin
  couple_Yang: IG
  rang_hierarchique: 1er_empereur
  role_So_Ouen_ch6: reequilibre_polarite_Yang_Yang_Feu_dans_le_corps

fonctions_energetiques:
  energie_la_plus_Yang: >
    Son énergie est la plus Yang/énergétique de tous les tsang.
    Seul tsang animé d'une action motrice Yang permanente (muscle).
    93600 battements/jour, 34164000/an.
  maitre_organisme: >
    La quantité et le rythme d'alimentation sanguine des tsang
    est déterminée par le coeur. Toutes les activités des tsang,
    qualités, efficacité et résultats, en dépendent.
  insuffisance_coeur:
    consequences:
      - faiblesse_pulsation
      - hypotension_et_vide_iong
      - tsang_moins_irrigues_et_refroidis
  exces_coeur:
    consequences:
      - chaleur_interne_par_exces_fonctions_tsang
      - hypertension_et_exces_iong
  double_feu:
    Feu_Empereur: C_IG
    Feu_Ministre: TR_MC
    reunion_dans_5E: confondus_en_un_seul
    So_Ouen_ch67: >
      "Il y a 6 pas, mais le Ciel n'a aucune influence sur
      le Feu Roi, c'est pourquoi l'on n'en compte que 5."
    implication_philosophique: >
      L'Esprit supérieur (Chen) est individuel. Son évolution
      spirituelle est le propre de l'Homme qui en décide seul.
      Seul passage du So Ouen affirmant le libre arbitre.
  source: PVI-t2-p12_13_18

