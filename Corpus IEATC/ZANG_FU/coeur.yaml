    fonction_groupe: capturer_les_energies_Yang_externes
    element_mouvement: Feu
    fou_maitre: Intestin_Grele
    Chao_Yin_specifique: >
      Axe vertical. Précurseur du Yin. Sexualité, élévation spirituelle.
      Interdépendance Tsiué Yin ↔ Chao Yang pour leurs mouvements.
  ko_emotionnel_clinique: peur_Rein_domine_joie_Coeur
  liens_nouveaux:
