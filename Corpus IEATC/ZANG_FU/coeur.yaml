enrichissement_5E_t4:
  pathologie_5E:
    Chen_autorite: >
      Le Chen = Feu Roi, Empereur, Souverain. Si puissant,
      l'esprit est en paix. Tout le psychisme (5 personnalités)
      doit être sous son autorité.
    interrogatoire_vide_plenitude:
