  source: PVII-t4-p17_91

# --- ENRICHISSEMENT SÉMINAIRE PVI t3 (EEA Tsang/Fou tome 3) ---
enrichissement_seminaire_t3:
  terminologie_hierarchique:
    DI: Empereur_titre_tres_eleve_depuis_221_av_JC
    WANG: Roi_trait_union_Ciel_Terre_Hommes
    JUN: Prince_Souverain_Suzerain_autorite_sur_territoire
    XIANG: Ministre_assistant_du_Souverain
    ZHU: Maitre_celui_qui_est_chez_lui_et_commande
    ZAI: Gouverneur_Intendant
    KE: Invite_celui_qui_nest_pas_chez_lui
    note: >
      Le terme "Feu Empereur" est une erreur de transcription, doit être remplacé
      par "Feu Souverain" (JUN HUO). Distinction importante avec XIANG HUO (Feu Ministre).
  souverain_maitre:
    citation_SW8: >
      Le Cœur c'est la charge du souverain et du maître, les SHEN MING en sortent.
      Si le Maître fait briller, alors il fait descendre la Paix. Si le Maître ne
      fait pas briller, les 12 charges sont menacées.
    SHEN_MING: >
      MING est formé du soleil et de la lune. Brillance par contraste. Si nous n'étions
      que soleil nous brûlerions, si nous n'étions que la lune nous serions obscurs.
      L'ensemble donne cette brillance. Le lieu de résidence des Jing Shen est le Cœur.
    Jing_Shen: >
      JING c'est la vie même, le substrat d'animation. SHEN : instances supérieures
      qui rattachent au Ciel et individualisent. L'ensemble = les "esprits vitaux",
      totalité au plus haut niveau de la vitalité et son entretien.
  decentralisation:
    principe: >
      L'organisme obéit aux structures de décentralisation : tout est décentralisé
      tout en restant attaché à la capitale. Le C et tous les Zang sont à la fois
      centralisés et décentralisés, chacun participant à l'harmonie de l'ensemble.
  Xue_Mo:
    definition: >
      XUE = sang, masse sanguine. MO = trajets d'énergie, mouvements qui animent.
      C'est au visage que les changements de couleur sont le plus perceptibles.
    diagnostic_visage:
      souffles_C_insuffisants: visage_exsangue_blanc_sans_eclat
      circulation_stagne: couleur_du_visage_tourne_au_violet
      C_en_bonne_sante: couleur_rouge_brillante_grande_prosperite_Shen
  relation_oeil:
    citation_LS80: L_oeil_c_est_le_messager_du_Coeur
    SHI: >
      Le messager (SHI) porte un ordre et revient vers son maître. Le méridien
      principal du C a une branche qui monte directement du C à l'œil. Par système
      de l'œil, on entend l'œil interne et toute la liaison avec le cerveau.
  relation_oreille:
    citation: >
      L'audition normale dépend nécessairement de la contribution totale des Souffles
      et du sang. Si le Mo du C est menu et stagnant, cela fait des bourdonnements
      d'oreille (Lin Shu chap. 4).
  sueur_ye_du_C: >
    Tout le sang est sous la dépendance du C. La sueur est le Yé du C car le C
    est le maître des Xué Mo. Dialectique d'équilibre sueur/sang.
  liens_nouveaux:
    - THEORIE/tsang_fou_physiologie_t3_seminaire.yaml
    - ZANG_FU/intestin_grele.yaml
    - CLINIQUE/pathologies_oreille.yaml
  source: PVI-t3-p30_37

# ─── Enrichissement EEA t1 (séminaire CLM déc. 1981) ──────

enrichissement_EEA_t1:
  shen_et_coeur: >
    Le Cœur est le LOGIS des Shen. Les Shen sont le principe
    d'individuation qui commande l'organisation, la concertation
    et la coordination de l'être entier. Sans Shen = éclatement,
    folie, perte de tout principe d'organisation. Le méridien
    du Cœur monte au cerveau pour montrer cette liaison concrète.
    « Intelligence du Cœur » = métaphore pour Shen (Schatz).
  shen_ming: >
    Quand le Cœur assure bien son rôle de maître, il en résulte
    SHEN MING = claire distinction, discernement précis de la
    réalité, non seulement par l'intellect mais par toute
    l'intelligence de l'être. Le Cœur obtient l'aide de Ming Men
    pour commander les Shen Ming et « faire la splendeur des
    Jing Shen ». Ming Men est source du Feu Ministre.
  radical_coeur: >
    TOUS les sentiments ont « cœur » comme radical dans leur
    idéogramme. Cela indique que la vie mentale, affective et
    sentimentale est mise sous ce radical = registre supérieur
    de subtilité, domaine de l'Empereur. Pas de rapport plus
    particulièrement privilégié avec Yi ou Zhi — c'est le maître
    de tous.
  feu_maitre_et_ming_men: >
    « Le Cœur fait le Feu Maître, le Yang authentique de Ming Men
    c'est la source du Feu Ministre. Ce qui se ressemble s'assemble,
    c'est pourquoi Ming Men est aussi appelé le Petit Cœur. »
    Les Jing Mo du Cœur et du Rein s'enfilent mutuellement.
  source: PVI-EEA-t1-p44_67

# ─── Enrichissement EEA t2 (séminaires CLM mai 1982 + juin 1984) ──────

enrichissement_EEA_t2:
  su_wen_chap8_premiere_charge: >
    Le Cœur est en 1ère position des 12 charges (Su Wen ch.8).
    Il a la double charge d'être le « Seigneur et le Maître »
    (JUN ZHU). Seigneur = Suzerain de droit qui contient la vertu
    d'être chef, à la tête du royaume. Maître (ZHU) = souveraineté,
    celui qui commande. Ce double versant engendre le MC (XIN ZHU)
    qui ne peut jamais être dissocié du Cœur.
  shen_ming_approfondi: >
    Quand le Cœur remplit sa charge, il en résulte SHEN MING =
    resplendissement des Esprits. Les Shen gardés par le Cœur
    et qui gardent le Cœur (action réciproque) commandent du Centre.
    Tout dans la vie doit se faire selon les Shen. Un Homme qui ne
    mène plus sa vie selon ses Esprits est déjà malade.
    SHEN MING se perçoit à l'œil (« messager du cœur »), acuité
    du regard, lumière qui transparaît. Toute la vertu d'un être
    se manifeste au-delà de l'harmonie visible.
  coeur_invisible: >
    Père Larre : « Le plus invisible de tous les invisibles, c'est
    tout de même le Cœur. » Quand l'essentiel marche, on n'entend
    rien (Su Wen ch.7). Les gens ne savent pas qu'ils sont en bonne
    santé. Le silencieux, l'inaudible, l'invisible = le Cœur.
  radical_coeur_sentiments: >
    De tout temps dans l'écriture chinoise, tous les sentiments
    s'écrivent avec le radical du Cœur. Le rattachement de la vie
    expérimentée au niveau du psychisme est fait grâce à cet endroit
    où se produisent les sentiments. Le Cœur peut être considéré
    comme une terre qui porte toute une floraison, une moisson.
  couple_C_R: >
    En prenant le 1 (Cœur) et le 10 (Rein), on sonde les deux
    pôles de la vie. Le 10 reprend le 1 dans la perfection de
    l'unité de 2ème ordre. Savoir-vivre du Cœur = savoir-vivre
    du Souverain. Savoir-vivre des Reins = savoir-vivre de tout
    le monde.
  numerologie: >
    Le Cœur = 1 = la voie. Premier dans la hiérarchie inexorable
    de la numérologie. Aspect céleste de la vie donné dans le nom
    Zang. Le Shen Ming est le premier et le dernier de l'énumération
    cyclique (position 1 et fermoir avec la V en position 12).
  circuit_su_wen_21_sang: >
    Les Souffles troubles des aliments font retour au Cœur.
    Le Cœur imbibe le Jing aux Mo (trajets d'énergie). À partir
    du Cœur, le Jing diffuse dans tout le corps par les vaisseaux.
    Le Cœur = maître des trajets d'énergie et du sang.
    Couple C/P = Sang/Souffle.
  source: PVI-EEA-t2-p38_49

enrichissement_YY_t2:
  chen_individuel_lumiere: >
    Le Ming (Mandat Céleste) est peut-être davantage la Lumière,
    le Chen individuel qui éclaire en permanence l'être humain
    sur son chemin. Cette Lumière intérieure est conforme à la
    pensée confucianiste (« La Grande Règle », « L'Invariable Milieu »).
    L'énergie ancestrale de Ming Menn nourrit le Chen quand elle
    rejoint le Cœur — d'où le couple C/R (1 et 10) comme les deux
    pôles fondamentaux de la conscience incarnée.
  chen_cosmique_et_coeur: >
    Le Chen cosmique accompagne la conception et préside à la
    grossesse. Le Chen individuel est l'expression de ce Chen
    cosmique dans l'être incarné. La conscience individuelle (Chen)
    régit tous les sentiments innés et acquis concrétisés par les
    actes. Les sentiments sont élaborés par les 5 organes → d'où
    l'obligation d'observer les lois naturelles et de réguler
    toutes les fonctions physiologiques.
  sept_orifices_coeur: >
    Dans la sectorisation céleste (état de Sagesse), le Cœur
    est le niveau de séparation Ciel/Terre (plexus solaire).
    Les 7 orifices du Cœur s'ouvrent par la transformation
    des 7 sentiments en 7 Vertus — perspective humaniste taoïste.
  source: PIV-YY-t2-p17_24

# ─── Enrichissement CP I (PIV YY tomes 4-5) ───
enrichissement_CP_I:
  transpiration_et_coeur: >
    Transpiration abondante de la tête le jour = vide du Cœur.
    Les gens qui transpirent beaucoup le jour, surtout de la
    tête, se vident l'énergie du Cœur → le Feu Empereur peut
    être vide. Si C vide → traiter par l'Eau (Rein).
  7C_joie_de_vivre: >
    7C t = point de la joie de vivre. Aide à surmonter les
    difficultés. Utilisé pour traiter l'aspect psychique
    dans les cas de troubles digestifs liés à l'émotionnel
    (cas Marie-Paule).
  chao_yin: >
    Le Chao Yin (R+C) se perçoit au pouls droit profond.
    Énergie céleste = chaleur. Le couple R-C est le plus
    profond des 3 Yin (peau→os sur le pouls).
  feu_empereur_vs_ministre: >
    Le Feu Ministre (Chao Yang = TR+VB) peut être trop
    important si le rafraîchissement (Tae Yang = V+IG) est
    insuffisant. Si le Feu Empereur (C) est vide par
    transpiration excessive → traiter par l'Eau (R).
  source: PIV_YY_tomes4-5_CP_I

# =============================================================================
# ENRICHISSEMENT 3 FOYERS TOME 1 (PV-3F-t1)
# =============================================================================

enrichissement_3F_t1:
  penetration_tsang: >
    La puissance de l'onde sanguine permet au sang de pénétrer les
    Tsang dont la densité (pleins) oppose une résistance. Un organe
    congestionné → ne permet pas la pénétration → "s'asphyxie" →
    accumule les toxines → sang stagne → chaleur s'élève. La cause
    initiale est en général un froid.
  rythme_organique: >
    Le rythme du Cœur impose aux organes leur rythme fonctionnel
    par l'irrigation sanguine. Accélération → chaleur organique,
    ralentissement → froid organique.
  eurythmie: >
    Le Cœur donne le rythme au sang, le Poumon donne le rythme à
    l'énergie. Rapport cardio-respiratoire : 5 pulsations cardiaques
    pour 1 respiration.
  souverain_confirme: >
    Du Cœur, le "Souverain", dépendent directement la vie et la mort.
    Sa fonction de Maître de l'Esprit et Résidence du Chen est située
    au-dessus des clavicules. Le Cœur est le Yang dans le Yang
    (= Yang/Yang, élément Feu).
  sept_orifices: >
    Le Cœur a 7 orifices pour 2 artères et 5 veines. Chacun correspond
    à une vertu à acquérir par transformation d'un des 7 sentiments.
    Quand une vertu est intégrée, l'orifice "s'ouvre". Les 7 orifices
    ouverts = le cœur ouvert à l'universel = le Sage.
  couleur_chen: >
    L'énergie ancestrale, venant des Reins et dynamisée par une "juste
    sexualité", est la "couleur du Chen", l'énergie de sa nourriture.
    Sans énergie ancestrale dans le Cœur, pas de Chen.
  source: PV-3F-t1

# =============================================================================
# ENRICHISSEMENT 3 FOYERS TOME 2 (PV-3F-t2)
# =============================================================================

enrichissement_3F_t2:
  gouverneur_sang: >
    Le Cœur gouverne le sang en lui imprimant son rythme et son
    amplitude pulsative initiale. Parmi les 4 organes qui gèrent
    le sang (C, Rte, F, P), c'est le gouverneur suprême.
  mouvement_respiration: >
    À l'expiration (Yang, énergie monte), l'énergie passe aux
    Poumons puis au Cœur successivement. Le Cœur est le Yang dans
    le Yang du foyer supérieur (+/+), dernier maillon de l'expiration.
  couleur_chen_tchrong_mo: >
    Branche ésotérique du Tchrong Mo : utérus → cœur = "couleur du
    Chen". Conditions : union corps/cœurs/esprits, calme des
    sentiments, MC filtre protecteur. F + MC = Tsiué Yin.
  troisieme_champ_cinabre: >
    Le 3ème Champ de Cinabre (Paï Tan = Cinabre blanc) au 25TM
    dépend du Chen et du Cœur. Élévation de soi vers les énergies
    spirituelles. Chen individuel en relation avec Chen cosmique.
  source: PV-3F-t2
