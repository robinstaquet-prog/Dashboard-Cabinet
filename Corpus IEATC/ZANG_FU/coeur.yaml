    sens: gout
    liquide: sueur
    organe_des_sens: langue
    expansion: teint
    tissu: vaisseaux
    entraille_curieuse: vaisseaux_sanguins
  resume_activites_PVII_t2: >
    Propulse sang artériel, siège du Chen (conscience,
    psychisme, mentalité), dirige la langue et la parole.
    MC = sentiments et émotions → mots de la parole.
  source: PVII-t2-p18_57

enrichissement_5E_t3:
  so_ouen_chap5_Feu: >
    Sud → chaleur → Feu → amer → Cœur → sang → Rate.
    Le Cœur gouverne la langue. CHEUN associé = CHEUN (conscient).
    Si le CHEUN reste dans le Cœur, sang et énergie circulent normalement.
    Sentiment : joie. Ko : peur (Eau/Rein) domine la joie.
    Blessure externe : chaleur fatigue l'énergie. Ko : froid domine chaleur.
  points_su_Coeur:
    Ting_Bois: 9C
    Iong_Feu: 8C
    Iu_Terre: 7C
    King_Metal: 4C
    Ro_Eau: 3C
  axes_5E_t3:
