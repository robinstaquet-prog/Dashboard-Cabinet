# FOIE — PHYSIOLOGIE INDIVIDUELLE
# Source : PVI Physiologie tome 2, pp. 38-45
# Auteur : Thierry Bollet — IEATC

meta:
  fichier: foie.yaml
  source: PVI_Physio_t2_p38_45
  statut: complet
  liens:
    - ZANG_FU/role_general_tsang.yaml
    - ZANG_FU/rein.yaml
    - THEORIE/hierarchie_sang_energie.yaml
