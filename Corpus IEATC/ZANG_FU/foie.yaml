identite:
  titre: Ministre_de_la_defense
  polarite: Yang_dans_le_Yin
  element: Bois
  foyer: anatomiquement_FM_fonction_appartient_au_FI
  lateralite: droite_Yin
  axe: partie_amont_du_Tsiue_Yin
  couple_Yang: VB
  rang_hierarchique: Ministre_defense_pas_guerre
  energie_la_plus_Yin: le_plus_sanguin_de_tous_les_tsang
  tsang_sanguins_ordre: foie_MC_rate
  role_So_Ouen_ch6: reequilibre_polarite_Yang_Yin_Bois

fonctions_energetiques:
  commande_oe:
    principe: >
      Responsable de la stratégie de défense de l'organisme
      contre les attaques de fong venant de l'extérieur.
    anticipation: >
      Le foie anticipe et prépare à satisfaire les futurs besoins.
      Informé à l'avance des situations climatiques.
      Utilise le Roun (conscient) et le I (mémoire) pour anticiper.
    quantite_oe: >
      Décide de l'intensité et de la nature de la réponse.
      Mobilise la quantité de oé nécessaire, sans plus.
    allergies: >
      Totalement différentes des empoisonnements/intoxications.
      = excès/abus de la réponse de oé par rapport à l'agression.
    repartition: >
      Répartit oé au niveau de la peau selon les situations.
      oé se déplace comme une troupe au combat vers la zone en besoin.
      oé circule dans les tching kan sans circuit fixe = libre et rapide.
    tching_kan_foie: >
      Siège par excellence de l'intelligence de oé.
      Se ramifie avec tous les tching kan du corps.
      Tous les tching kan se réunissent au 20TM Paé Roé.
    stockage_oe:
      zones: 16TM_et_17JM
      raison: >
        16TM = grande porte d'entrée d'énergies externes vers cerveau.
        17JM = commande toute l'activité fonctionnelle du FS.
    distinction_poumon_foie: >
      Le poumon amène oé en surface et détermine sa fabrication/quantité.
      Le foie gère la REPARTITION et la MOBILISATION de oé en surface.
      Le poumon ne gère pas la répartition une fois en surface.

  commande_sang:
    principe: >
      Maître de la circulation du bas du corps (18V point de commande).
      Réservoir de sang. Commande la répartition du sang
      selon les besoins et activités physiques.
    veines: >
      Commande le calibre des veines par énergie Bois
      (tonicité des parois veineuses). 4F = Métal = fermeté.
      Toute varice = déficience du foie.
      Muqueuse intérieure des veines = rate (5Rte).
    ATTENTION: sang_veineux_ne_veut_pas_dire_veines_qui_dependent_de_la_rate
    composants_sang:
      foie_dirige: pourcentages_equilibre_entre_composants
      rate_et_rein: quantites
      point_composants: 43V
      point_volume_sanguin: 10Rte_Ocean_de_sang
    circulation_veineuse_commande_arterielle: >
      Le sang veineux s'écoule laissant une vacuité que pénètre
      le sang artériel. C'est parce que le veineux s'écoule
      que l'artériel circule. Toute congestion veineuse (varices)
      = entrave à la circulation artérielle.
    foie_conserve: le_sang
    rate_commande: le_sang
    coeur_gouverne: le_sang

  perceptions_sensorielles:
    principe: >
      Procure la faculté de TOUTES les perceptions sensorielles.
      N'est pas à l'origine des 5 sens (dépendent de chaque tsang/élément)
      mais en détermine la PERCEPTION (conscience) et l'INTENSITE.
    foie_faible: intensite_sensations_faible_y_compris_sentiments
    VB: gere_sensibilite_cutanee_a_l_externe_commandee_par_foie
    influx_nerveux: >
      Permet la conduction de l'influx nerveux sur les nerfs périphériques.
      Clé de la contractilité musculaire et du tonus de base (VB).
      ATTENTION : les paralysies ne dépendent PAS du foie.
    proprioception: >
      Procure le sens proprioceptif (position de chaque segment
      du corps par rapport aux autres et dans l'espace, yeux fermés).

  source: PVI-t2-p38_42

physiologie_occidentale:
  circuit_veineux: dernier_organe_avant_coeur_3_lobes
  recoit: tout_sang_du_bas_du_corps
  commande: veines_saphenes_jusqu_a_veine_cave_inferieure
  filtre: sang_veineux_fabrique_bile_vers_VB
  recoit_de_IG: sang_charge_substances_nutritives_pures
  transmet_au_coeur: par_veine_cave_inferieure_a_travers_diaphragme
  diaphragme_orifice: >
    Oesophage + aorte abdominale + complexe sympathique =
    beaucoup pour un orifice souvent spasmé par stress.
  glycogenese: controle_sucre_avec_pancreas
  source: PVI-t2-p43

physiologie_dans_foyer:
  FM_digestif:
    recoit: solides_purs_des_1er_et_2eme_tris_par_IG
    transmet: au_coeur_pour_former_sang
    filtre: energies_impures_vers_poumons_et_narines
  FI_genital:
    maitre_sang_genital: erection_irrigation_regles
    kystes_ovariens: congestion_sanguine_foie
    kystes_eau: rate_drainage_lymphatique
    meridien_et_saphene: >
      Méridien principal, tching kan et lo longitudinal du foie
      sont la source de l'énergie génitale (le sang)
      en conduisant la saphène (encadrée par méridiens foie et rate).
    regles: >
      Épuration primaire du sang que l'homme ne possède pas.
      L'homme fabrique beaucoup de bile → plus tendu, colèrique.
      La femme a besoin de cette épuration (plus Yin, brûle moins bien).
    femme_et_VB: >
      Plus sang des règles abondant → moins VB forte en énergie →
      plus MC prend place importante (Tsiue Yin = sentiments).
    sterilites_modernes: >
      Femme active trop sa tension nerveuse → fabrique bile →
      affaiblit foie et sang génital → stérilités passives (FIV inefficaces).
    ovulation: >
      Descente et migration ovule dépendent du Tsiue Yin (foie + MC).
      Grossesses extra-utérines = insuffisance Tsiue Yin.
      Ovulation bloquée par stress/émotions négatives.
  source: PVI-t2-p43_44

