# REIN — PHYSIOLOGIE INDIVIDUELLE
# Source : PVI Physiologie tome 2, pp. 46-52
# Auteur : Thierry Bollet — IEATC

meta:
  fichier: rein.yaml
  source: PVI_Physio_t2_p46_52
  statut: complet
  liens:
    - ZANG_FU/role_general_tsang.yaml
    - THEORIE/embryologie_constitution.yaml
    - THEORIE/hierarchie_sang_energie.yaml
    - THEORIE/cinq_elements_par_element.yaml
    - THEORIE/cinq_elements_cycles.yaml
    - THEORIE/cinq_elements_correspondances.yaml

identite:
  titre: Feu_Ministre_conservateur_energie_ancestrale
  polarite: Yin_dans_le_Yin
  element: Eau
  foyer: FI
  position: >
    Très haut, en arrière du foie et de la rate, en avant
    de la colonne vertébrale. Ne dépassent pas les basses côtes.
    Impossibles à palper. Douleur se projette au dos D10-L2.
    ATTENTION : "mal aux reins" ≠ lombaires.
  axe: partie_amont_du_Chao_Yin
  couple_Yang: Vessie
  energie: >
    La plus Yin mais possède plus d'énergie que de sang.
    Juste après le coeur en quantité d'énergie.
  dedouble: rein_gauche_Yang_rein_droit_Yin
  role_So_Ouen_ch6: reequilibre_polarite_Yin_Yin_Eau

fonctions_energetiques:
  uro_genital: >
    Englobe la totalité du système uro-génital :
    fonction de filtre/équilibre hydrique ET procréation.

  rein_Yin:
    commande: rein_droit
    organe: couleur_blanche_filtration_sang_fonction_urinaire
    dirige: prostate_glandes_seminales_et_liquide
    intelligence_particuliere: >
      Reconnaît et distingue les "vieux liquides" usagés
      des "liquides neufs" de l'alimentation.
      Capable de connaître les besoins du corps et de distinguer
      ce qui est à conserver ou à rejeter.
      Conserve le neuf, élimine le vieux vers la vessie.
    relation_foie: >
      Nécessairement en relation avec le foie (prévision des besoins).
      Le foie puiserait dans la mémoire du rein (inconscient du Roun)
      l'expérience dont il a besoin.
    circuit_R_moins: R_moins_rate_foie_poumon
    vide_R_moins: engendre_vide_Yin_du_foie_et_de_la_rate
    fonctions:
      - filtre_plasma_sanguin_pas_les_globules
      - elimine_vieux_elements_et_surplus
      - controle_squelette_articulations_cortysol
      - dirige_osteoblastes_osteoclastes
      - dirige_perioste
      - emission_essences_reproduction
      - spermatozoides_ovules
      - glandes_seminales_prostate
      - muqueuses_trompes_uterus_vagin
    source: PVI-t2-p46_51

  rein_Yang:
    commande: rein_gauche
    organe: glandes_surrenales_couleur_rouge_fonce
    produit:
      adrenaline: stimulant_fonction_cardiaque
      cortysol: hormone_squelette_articulations
      hormones_sexuelles: stimulent_gonades
    conserve: vitalite_de_Ming_Men_par_chaleur_Feu_Chao_Yin
    entretient: energie_ancestrale
    commande_distribution: racine_du_Tchrong_Mo
    circuit_R_plus: R_plus_rate_et_estomac_poumon_coeur
    vide_R_plus: >
      Engendre vide du poumon et du coeur.
      Rate en excès de Yin (sans Yang pour fonctionner).
    source: PVI-t2-p47_51

  deux_racines:
    principe: >
      Les deux reins sont l'origine, dès la vie embryonnaire,
      des deux racines fondamentales du Yin et du Yang.
    R_moins: Racine_Yin_source_tout_Yin_eau_Eau
    R_plus: Racine_Yang_source_tout_Yang_sel_Feu
    R_plus_alimente_estomac: >
      Sans Yang du R+, l'estomac est vide de Yang
      et ne peut plus en fabriquer.
      Tout vide de Yang au FM → vérifier rein Yang.

  Feu_Ministre:
    MC_et_Rein: les_2_Feux_Ministres_du_Coeur
    MC_role: fonctions_sexuelles_genitales_reproduction_pulsions
    Rein_Yang_role: assiste_coeur_adrenaline_Chao_Yin
    Ming_Menn: aussi_nomme_Feu_Ministre_par_extension
    Chao_Yang: >
      Physiologie comme 1er Ministre d'un pays.
      TR = psychisme/mental outil de l'Esprit.
      VB = chef de la police, outil d'application.

  energie_ancestrale:
    3_energies: [Yuan_Tchi, Tsing_Tchi, Tsong_Tchi]
    provenance: chacune_des_deux_parents
    bipolarite: feminin_et_masculin_en_chaque_etre
    lien_entites: Chen_Roun_Pro_dans_energie_ancestrale_et_moelles
    support_physique: spermatozoide_et_ovule
    localisation: Ming_Menn_et_moelles_osseuses

  commande_FI:
    - vessie_toute_energie_en_provient
    - GI_regule_quantite_eau_reabsorbee
    - TR_rigole_des_eaux_liquides_interstitiels
    - sphere_genitale_uterus_ovaires_trompes_testicules

  puissance_creatrice:
    principe: >
      Source de la puissance créatrice. Force intérieure.
      Mouvement dans la vie.
    faiblesse: timidite_manque_confiance_manque_idee_realisatrice
    puissance: personnalite_enrichissement_spiritualite
    sexualite: manifestation_et_expression_7R_charme_ou_virilite
  source: PVI-t2-p46_52

periodes_activite:
  quadrant: inferieur_droit_tronc_et_MI_droit
  cycle_iong: 17h_a_19h
  lune: 4eme_periode
  saison: hiver
  planete: Mercure_quand_avance
  etoiles: Tae_Yang_au_Ciel
